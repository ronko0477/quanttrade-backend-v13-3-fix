<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>v15.2</title>
<style>
body{font-family:Arial;background:#0b1a3a;color:white;text-align:center;padding:20px}
.btn{display:block;margin:10px auto;padding:15px;border-radius:10px;background:#5b6cff;color:white;width:200px}
</style>
</head>
<body>
<h1>V15.2</h1>
<div id="status">READY</div>
<button class="btn" onclick="send()">SEND ORDER</button>
<button class="btn" onclick="refresh()">REFRESH</button>
<script>
const API="https://quanttrade-backend-v13-3-fix-1.onrender.com/api";

async function refresh(){
 try{
  const r=await fetch(API+"/status");
  const d=await r.json();
  document.getElementById("status").innerText=d.guard;
 }catch(e){
  document.getElementById("status").innerText="ERROR";
 }
}

async function send(){
 await fetch(API+"/send",{method:"POST"});
 refresh();
}

refresh();
</script>
</body>
</html>
