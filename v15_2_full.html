<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>V15.2 FULL</title>
<style>
body{margin:0;background:#06164a;color:#fff;font-family:sans-serif}
.wrap{max-width:700px;margin:auto;padding:20px}
.panel{background:#24356f;border-radius:20px;padding:20px;margin-bottom:15px}
.big{font-size:42px;font-weight:bold;text-align:center}
.pnl{text-align:center;font-size:28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:bold}
.log{font-size:12px;background:#314783;padding:10px;border-radius:10px;margin-bottom:5px}
.green{color:#9be06a}.red{color:#f39a90}.yellow{color:#f1ce67}
</style>
</head>
<body>
<div class="wrap">

<h2>V15.2 FULL</h2>

<div class="panel">
<div id="status" class="big">READY</div>
<div class="pnl">PnL: <span id="pnl">0</span></div>
<div>
Orders: <span id="orders">0</span>/10 |
Cooldown: <span id="cooldown">0</span>s |
HardBlock: <span id="hb">OFF</span>
</div>
<div>
WinStreak: <span id="ws">0</span> |
LossStreak: <span id="ls">0</span>
</div>
</div>

<div class="grid">
<button onclick="send()">SEND</button>
<button onclick="refresh()">REFRESH</button>
<button onclick="win()">+WIN</button>
<button onclick="loss()">-LOSS</button>
<button onclick="reset()">RESET</button>
<button onclick="cool()">COOLDOWN</button>
<button onclick="hbOn()">HB ON</button>
<button onclick="hbOff()">HB OFF</button>
</div>

<h3>Log</h3>
<div id="log"></div>

</div>

<script>
let s={
pnl:0,
orders:0,
cooldown:0,
hard:false,
winStreak:0,
lossStreak:0,
max:10,
autoBlock:-30,
log:[]
};

function log(t,m){
s.log.unshift(t+" - "+m+" "+new Date().toISOString());
s.log=s.log.slice(0,30);
renderLog();
}

function renderLog(){
let l=document.getElementById("log");l.innerHTML="";
s.log.forEach(x=>{
let d=document.createElement("div");
d.className="log";
d.innerText=x;
l.appendChild(d);
});
}

function guard(){
if(s.hard) return "HARD";
if(s.cooldown>0) return "COOLDOWN";
if(s.pnl<=s.autoBlock) return "BLOCK";
return "READY";
}

function render(){
document.getElementById("pnl").innerText=s.pnl;
document.getElementById("orders").innerText=s.orders;
document.getElementById("cooldown").innerText=s.cooldown;
document.getElementById("hb").innerText=s.hard?"ON":"OFF";
document.getElementById("ws").innerText=s.winStreak;
document.getElementById("ls").innerText=s.lossStreak;

let g=guard();
let el=document.getElementById("status");

if(g=="READY"){el.innerText="READY";el.className="big green";}
if(g=="COOLDOWN"){el.innerText="COOLDOWN";el.className="big yellow";}
if(g=="BLOCK"){el.innerText="BLOCKED";el.className="big red";}
if(g=="HARD"){el.innerText="HARD LOCK";el.className="big red";}
}

function send(){
if(guard()!="READY"){log("BLOCK","Send blocked");return;}
if(s.orders>=s.max){log("LIMIT","Max orders");return;}
s.orders++;
log("ORDER","sent");
render();
}

function win(){
s.pnl+=4;
s.winStreak++;
s.lossStreak=0;
log("WIN","+4");
render();
}

function loss(){
s.pnl-=5;
s.lossStreak++;
s.winStreak=0;
log("LOSS","-5");

if(s.pnl<=s.autoBlock && !s.hard){
s.hard=true;
log("AUTO HB","Auto HardBlock ausgelöst");
}

render();
}

function cool(){
s.cooldown=15;
log("COOLDOWN","15s gestartet");
render();
}

function reset(){
s={...s,pnl:0,orders:0,cooldown:0,hard:false,winStreak:0,lossStreak:0};
log("RESET","System reset");
render();
}

function hbOn(){s.hard=true;log("HB","ON");render();}
function hbOff(){s.hard=false;log("HB","OFF");render();}
function refresh(){render();}

setInterval(()=>{
if(s.cooldown>0) s.cooldown--;
render();
},1000);

render();
</script>

</body>
</html>
