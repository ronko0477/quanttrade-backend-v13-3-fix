<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>V19.9.4 HARD LIVE</title>

<style>
:root{
  --bg:#01030a;
  --panel:#1c255c;
  --panel2:#28337f;
  --line:rgba(255,255,255,.06);
  --text:#f4f7ff;
  --muted:#aeb7d6;
  --green:#b9dc9e;
  --red:#e2b6b6;
  --yellow:#dcd089;
  --cyan:#a8d5f0;
  --safeBottom:env(safe-area-inset-bottom,0px);
  --dockPeek:60px;
}

/* RESET */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:var(--text);
  background:
    radial-gradient(circle at 50% 10%, rgba(70,90,220,.10), transparent 30%),
    linear-gradient(180deg,#01030a,#020612);
}

/* LAYOUT */
.wrap{
  max-width:460px;
  margin:auto;
  padding:10px 12px calc(var(--dockPeek)+var(--safeBottom)+18px);
}

/* TITLE */
.title{
  text-align:center;
  font-size:22px;
  font-weight:900;
  letter-spacing:.5px;
  margin:6px 0 12px;
}

/* HERO */
.hero{
  border-radius:24px;
  padding:10px;
  background:linear-gradient(180deg,#4a5bd4,#313fa0);
  border:1px solid var(--line);
}

.heroInner{
  border-radius:20px;
  padding:18px 12px;
  text-align:center;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
}

.guard{
  font-size:54px;
  font-weight:900;
  letter-spacing:-1px;
}
.guard.ready{color:var(--green)}
.guard.block{color:var(--yellow)}
.guard.fail{color:var(--red)}

.heroHint{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.pnl{
  font-size:52px;
  font-weight:900;
  margin-top:6px;
}
.pnlSub{
  font-size:13px;
  color:var(--muted);
}

/* GRID */
.grid2{
  margin-top:8px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.card{
  border-radius:18px;
  padding:12px;
  background:linear-gradient(180deg,#2b388a,#1c2663);
}

.cardLabel{
  font-size:13px;
  color:var(--muted);
  margin-bottom:4px;
}
.cardVal{
  font-size:22px;
  font-weight:900;
}

/* BUTTONS */
.actionGrid{
  margin-top:8px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

button{
  border:none;
  border-radius:16px;
  font-weight:900;
  font-size:14px;
  min-height:52px;
}

.buy{background:#a8d192;color:#fff}
.sell{background:#d8c4c4}
.win{background:#a8d192}
.loss{background:#d8c4c4}
.reset{
  grid-column:1/-1;
  background:#d8cf8a;
}

/* MINI */
.miniGrid{
  margin-top:8px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.mini{
  background:#202a6e;
  border-radius:16px;
  padding:10px;
}
.miniTop{
  font-size:11px;
  color:var(--muted);
}
.miniVal{
  font-size:18px;
  font-weight:900;
}

/* SCORE */
.score{
  margin-top:8px;
  padding:12px;
  border-radius:20px;
  background:linear-gradient(180deg,#4050b8,#2d3c97);
}

.scoreHead{
  display:flex;
  justify-content:space-between;
}

.scoreVal{
  font-size:48px;
  font-weight:900;
}

.bar{
  height:12px;
  border-radius:10px;
  margin-top:6px;
  background:#ffffff22;
}
.fill{
  height:100%;
  border-radius:10px;
  background:linear-gradient(90deg,#e6b7b3,#b7db98,#a9d8ef);
}

/* LOG */
.log{
  margin-top:8px;
  padding:12px;
  border-radius:20px;
  background:#202a6e;
  font-size:13px;
}

/* DOCK */
.dock{
  position:fixed;
  left:12px;
  right:12px;
  bottom:calc(var(--safeBottom)+6px);
}

.dockPanel{
  border-radius:20px;
  background:linear-gradient(180deg,#8c96f7,#6c75e2);
  overflow:hidden;
}

.dockHead{
  padding:10px;
  font-size:14px;
}

.dockBody{
  padding:10px;
}

</style>
</head>

<body>
<div class="wrap">

<div class="title">V19.9.4 HARD LIVE ⚡</div>

<div class="hero">
  <div class="heroInner">
    <div class="guard ready">READY</div>
    <div class="heroHint">System bereit.</div>
    <div class="pnl">0</div>
    <div class="pnlSub">Net PnL</div>
  </div>
</div>

<div class="grid2">
  <div class="card"><div class="cardLabel">STATUS</div><div class="cardVal">OK</div></div>
  <div class="card"><div class="cardLabel">BUY POST</div><div class="cardVal">OK</div></div>
  <div class="card"><div class="cardLabel">SELL POST</div><div class="cardVal">OK</div></div>
  <div class="card"><div class="cardLabel">CONF</div><div class="cardVal">62%</div></div>
</div>

<div class="actionGrid">
  <button class="buy">BUY</button>
  <button class="sell">SELL</button>
  <button class="win">WIN</button>
  <button class="loss">LOSS</button>
  <button class="reset">RESET</button>
</div>

<div class="miniGrid">
  <div class="mini"><div class="miniTop">QUEUE</div><div class="miniVal">0</div></div>
  <div class="mini"><div class="miniTop">PROCESSING</div><div class="miniVal">OFF</div></div>
</div>

<div class="score">
  <div class="scoreHead">
    <div>AI SCORE</div>
    <div class="scoreVal">82</div>
  </div>
  <div class="bar"><div class="fill" style="width:82%"></div></div>
</div>

<div class="log">Keine Einträge.</div>

</div>

<div class="dock">
  <div class="dockPanel">
    <div class="dockHead">Quick Dock</div>
    <div class="dockBody">
      <button class="buy">BUY</button>
      <button class="sell">SELL</button>
    </div>
  </div>
</div>

</body>
</html>
