<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V20.5 HARD LIVE</title>
  <style>
    :root{
      --bg:#02040a;
      --panel:#252f79;
      --panelDeep:#1a2256;
      --panelHero1:#6675ee;
      --panelHero2:#3a49b2;
      --line:rgba(255,255,255,.07);
      --text:#f5f7ff;
      --muted:#bec5df;
      --green:#b9d99b;
      --red:#dfb8b8;
      --yellow:#ddd08a;
      --cyan:#afd8ef;
      --shadow:0 18px 42px rgba(0,0,0,.34);
      --okGlow:0 0 0 1px rgba(185,217,155,.22), 0 0 22px rgba(185,217,155,.10);
      --warnGlow:0 0 0 1px rgba(221,208,138,.18), 0 0 20px rgba(221,208,138,.08);
      --dangerGlow:0 0 0 1px rgba(223,184,184,.18), 0 0 18px rgba(223,184,184,.07);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 12%, rgba(87,103,232,.10), transparent 28%),
        radial-gradient(circle at 50% 52%, rgba(20,33,105,.08), transparent 34%),
        linear-gradient(180deg,#010309 0%,#020713 100%);
    }

    .wrap{
      width:min(100%,460px);
      margin:0 auto;
      padding:12px 10px 30px;
    }

    .title{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-align:center;
      font-size:24px;
      font-weight:1000;
      letter-spacing:.32px;
      margin:2px 0 13px;
      text-shadow:0 2px 12px rgba(0,0,0,.34);
    }

    .liveDot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#8ef0ba;
      box-shadow:0 0 0 0 rgba(142,240,186,.55);
      animation:pulseDot 1.8s infinite;
      flex:0 0 auto;
    }

    @keyframes pulseDot{
      0%{box-shadow:0 0 0 0 rgba(142,240,186,.55)}
      70%{box-shadow:0 0 0 10px rgba(142,240,186,0)}
      100%{box-shadow:0 0 0 0 rgba(142,240,186,0)}
    }

    .hero{
      position:relative;
      border-radius:26px;
      padding:11px;
      background:linear-gradient(180deg, rgba(102,117,238,.96), rgba(58,73,178,.94));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,.10), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 28%);
      pointer-events:none;
    }

    .heroInner{
      position:relative;
      z-index:1;
      min-height:226px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px 14px;
    }

    .guard{
      margin:0;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:.9;
      letter-spacing:-1.8px;
      font-size:74px;
      font-weight:1000;
    }
    .guard.ready{color:var(--green)}
    .guard.warn{color:#bfd9ef}
    .guard.block{color:var(--yellow)}
    .guard.fail{color:#e2b4b4}

    .heroHint{
      margin-top:8px;
      min-height:22px;
      font-size:15px;
      font-weight:800;
      color:rgba(255,255,255,.72);
    }

    .pnl{
      margin-top:8px;
      font-size:72px;
      line-height:.94;
      letter-spacing:-2px;
      font-weight:1000;
    }

    .pnlSub{
      margin-top:4px;
      font-size:17px;
      font-weight:900;
      color:rgba(255,255,255,.76);
    }

    .heroMetaRow{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .heroMeta{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:6px 11px;
      background:rgba(11,17,48,.20);
      border:1px solid rgba(255,255,255,.06);
      font-size:11px;
      font-weight:900;
      color:rgba(255,255,255,.82);
    }

    .heroMeta.live{box-shadow:none}
    .heroMeta.auto{box-shadow:var(--okGlow)}
    .heroMeta.queue{box-shadow:var(--warnGlow)}
    .heroMeta.block{box-shadow:var(--dangerGlow)}

    .grid2{
      margin-top:13px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:11px;
    }

    .card{
      min-height:102px;
      border-radius:21px;
      padding:14px 17px;
      background:linear-gradient(180deg, rgba(46,58,145,.98), rgba(29,39,101,.98));
      border:1px solid var(--line);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .cardLabel{
      font-size:15px;
      font-weight:900;
      color:rgba(255,255,255,.70);
      margin-bottom:8px;
      line-height:1;
      letter-spacing:.14px;
    }

    .cardVal{
      font-size:25px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.4px;
    }

    .ok{color:var(--green)}
    .fail{color:#e2b1b1}
    .mid{color:var(--yellow)}
    .ice{color:var(--cyan)}

    .actionGrid{
      margin-top:11px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:11px;
    }

    button{
      border:none;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
      font-family:inherit;
      cursor:pointer;
      transition:transform .08s ease, opacity .15s ease, filter .15s ease, box-shadow .18s ease, border-color .18s ease;
    }

    button:active{transform:scale(.985)}
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter:grayscale(.2) brightness(.86);
      box-shadow:none !important;
    }

    .actBtn{
      min-height:58px;
      border-radius:17px;
      font-size:14px;
      font-weight:1000;
      letter-spacing:.16px;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.14);
    }

    .actBtn.flash{
      animation:btnFlash .34s ease;
    }

    @keyframes btnFlash{
      0%{transform:scale(1)}
      35%{transform:scale(.98)}
      70%{transform:scale(1.015)}
      100%{transform:scale(1)}
    }

    .buyBtn,.winBtn{
      background:linear-gradient(90deg,#b9dca3,#a7d08f);
      color:#fff;
    }

    .sellBtn,.lossBtn{
      background:linear-gradient(90deg,#d9bcbc,#cfaeae);
      color:#fff;
    }

    .resetBtn{
      grid-column:1 / -1;
      min-height:60px;
      background:linear-gradient(90deg,#d7cf8d,#d9d18c);
      color:#fff;
      opacity:.90;
    }

    .miniGrid{
      margin-top:11px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:11px;
    }

    .toggleBtn{
      grid-column:1 / -1;
      min-height:76px;
      border-radius:20px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(46,58,145,.97), rgba(29,39,101,.97));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 9px 20px rgba(0,0,0,.20);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      text-align:left;
    }

    .toggleBtn.active{
      border-color:rgba(185,217,155,.34);
      box-shadow:var(--okGlow), 0 9px 20px rgba(0,0,0,.20);
    }

    .toggleLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .toggleDot{
      width:14px;
      height:14px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
      flex:0 0 auto;
    }

    .toggleBtn.active .toggleDot{
      background:#9fe3bc;
      box-shadow:0 0 0 0 rgba(159,227,188,.42);
      animation:togglePulse 1.8s infinite;
    }

    @keyframes togglePulse{
      0%{box-shadow:0 0 0 0 rgba(159,227,188,.42)}
      70%{box-shadow:0 0 0 8px rgba(159,227,188,0)}
      100%{box-shadow:0 0 0 0 rgba(159,227,188,0)}
    }

    .toggleTextWrap{
      min-width:0;
    }

    .toggleTop{
      font-size:12px;
      font-weight:1000;
      color:rgba(255,255,255,.70);
      line-height:1;
      margin-bottom:6px;
      letter-spacing:.14px;
    }

    .toggleMain{
      font-size:22px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.25px;
      color:#eef4ff;
    }

    .toggleState{
      font-size:13px;
      font-weight:1000;
      color:rgba(255,255,255,.80);
      border-radius:999px;
      padding:7px 10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      white-space:nowrap;
    }

    .miniCard{
      min-height:82px;
      border-radius:20px;
      padding:13px 15px;
      background:linear-gradient(180deg, rgba(46,58,145,.96), rgba(29,39,101,.96));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 9px 20px rgba(0,0,0,.20);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .miniTop{
      font-size:11px;
      font-weight:1000;
      color:rgba(255,255,255,.78);
      margin-bottom:7px;
      line-height:1;
      letter-spacing:.14px;
    }

    .miniBig{
      font-size:19px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.25px;
    }

    .queuePulse .miniBig{
      animation:miniPulse 1.2s infinite;
    }

    .processingPulse .miniBig{
      animation:miniPulseBlue 1s infinite;
    }

    @keyframes miniPulse{
      0%,100%{text-shadow:none; opacity:1}
      50%{text-shadow:0 0 14px rgba(221,208,138,.32); opacity:.92}
    }

    @keyframes miniPulseBlue{
      0%,100%{text-shadow:none; opacity:1}
      50%{text-shadow:0 0 14px rgba(175,216,239,.32); opacity:.92}
    }

    .scoreCard{
      margin-top:11px;
      border-radius:24px;
      padding:15px;
      background:linear-gradient(180deg, rgba(71,85,198,.94), rgba(50,63,158,.94));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
    }

    .scoreHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
      margin-bottom:8px;
    }

    .scoreTitle{
      font-size:17px;
      font-weight:1000;
      line-height:1;
      letter-spacing:.16px;
      color:#f6f8ff;
    }

    .scoreVal{
      font-size:64px;
      line-height:.86;
      font-weight:1000;
      letter-spacing:-2px;
      color:var(--cyan);
    }

    .barTrack{
      height:15px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.05);
    }

    .barFill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#e6b7b3 0%,#dbd389 30%,#b7db98 60%,#a9d8ef 100%);
      transition:width .25s ease;
    }

    .factorGrid{
      margin-top:11px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
    }

    .factor{
      min-height:80px;
      border-radius:18px;
      padding:12px 13px;
      background:rgba(26,36,108,.42);
      border:1px solid rgba(255,255,255,.045);
      display:flex;
      flex-direction:column;
      justify-content:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }

    .factorTop{
      font-size:12px;
      font-weight:900;
      color:rgba(255,255,255,.66);
      margin-bottom:7px;
      line-height:1;
    }

    .factorVal{
      font-size:22px;
      font-weight:1000;
      letter-spacing:-.3px;
      line-height:1;
    }

    .logCard{
      margin-top:14px;
      border-radius:24px;
      padding:15px;
      background:linear-gradient(180deg, rgba(42,54,137,.98), rgba(30,41,106,.98));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 12px 26px rgba(0,0,0,.24);
    }

    .logHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .logTitle{
      font-size:18px;
      font-weight:1000;
      line-height:1;
      color:#f6f8ff;
      letter-spacing:.14px;
    }

    .syncBadge{
      font-size:11px;
      font-weight:1000;
      color:rgba(255,255,255,.72);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      transition:all .18s ease;
    }

    .syncBadge.ok{color:rgba(255,255,255,.72)}
    .syncBadge.pending{color:var(--yellow); box-shadow:var(--warnGlow)}
    .syncBadge.fail{color:#f0cccc; box-shadow:var(--dangerGlow)}

    .logList{
      max-height:340px;
      overflow:auto;
      padding-right:4px;
      scrollbar-width:thin;
    }

    .logEntry{
      padding:10px 2px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
      line-height:1.36;
      word-break:break-word;
      color:rgba(243,246,255,.92);
    }
    .logEntry:last-child{border-bottom:none}
    .logQueued{color:#dbe0f8}
    .logProcessing{color:#e4cf84}
    .logExecuted{color:#eef2ff}
    .logWin{color:var(--green)}
    .logLoss{color:#e3b1b1}
    .logReset{color:#eef2ff}
    .logSystem{color:#d6ddf7}

    @media (max-width:420px){
      .wrap{padding-left:10px;padding-right:10px}
      .title{font-size:22px;margin-bottom:12px}
      .hero{padding:10px}
      .heroInner{min-height:206px}
      .guard{font-size:66px}
      .heroHint{font-size:14px}
      .pnl{font-size:66px}
      .pnlSub{font-size:16px}
      .grid2,.actionGrid,.miniGrid{gap:10px}
      .card{min-height:98px;padding:14px 16px}
      .cardLabel{font-size:14px}
      .cardVal{font-size:24px}
      .actBtn{min-height:56px;font-size:14px}
      .resetBtn{min-height:58px}
      .toggleBtn{min-height:72px}
      .toggleMain{font-size:20px}
      .miniCard{min-height:80px}
      .miniBig{font-size:18px}
      .scoreVal{font-size:56px}
      .factor{min-height:76px}
      .factorVal{font-size:21px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <span>V20.5 HARD LIVE ⚡</span>
      <span class="liveDot"></span>
    </div>

    <section class="hero">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="heroHint" class="heroHint">System bereit.</div>
        <div id="pnl" class="pnl">0</div>
        <div class="pnlSub">Net PnL</div>
        <div class="heroMetaRow">
          <div id="heroMeta" class="heroMeta live">
            <span id="heroMetaText">LIVE</span>
          </div>
        </div>
      </div>
    </section>

    <section class="grid2">
      <div class="card">
        <div class="cardLabel">STATUS</div>
        <div id="healthStatus" class="cardVal ok">OK</div>
      </div>
      <div class="card">
        <div class="cardLabel">BUY POST</div>
        <div id="healthBuy" class="cardVal ok">OK</div>
      </div>
      <div class="card">
        <div class="cardLabel">SELL POST</div>
        <div id="healthSell" class="cardVal ok">OK</div>
      </div>
      <div class="card">
        <div class="cardLabel">CONF</div>
        <div id="confVal" class="cardVal mid">62%</div>
      </div>
    </section>

    <section class="actionGrid">
      <button id="btnBuy" class="actBtn buyBtn">BUY</button>
      <button id="btnSell" class="actBtn sellBtn">SELL</button>
      <button id="btnWin" class="actBtn winBtn">WIN</button>
      <button id="btnLoss" class="actBtn lossBtn">LOSS</button>
      <button id="btnReset" class="actBtn resetBtn">RESET</button>
    </section>

    <section class="miniGrid">
      <button id="autoToggleBtn" class="toggleBtn">
        <div class="toggleLeft">
          <div id="toggleDot" class="toggleDot"></div>
          <div class="toggleTextWrap">
            <div class="toggleTop">AUTO MODE</div>
            <div id="toggleMain" class="toggleMain">AUTO OFF</div>
          </div>
        </div>
        <div id="toggleState" class="toggleState">OFF</div>
      </button>

      <div id="queueCard" class="miniCard">
        <div class="miniTop">QUEUE</div>
        <div id="queueVal" class="miniBig">0</div>
      </div>

      <div id="processingCard" class="miniCard">
        <div class="miniTop">PROCESSING</div>
        <div id="processingVal" class="miniBig">OFF</div>
      </div>
    </section>

    <section class="scoreCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreVal" class="scoreVal">82</div>
      </div>
      <div class="barTrack">
        <div id="scoreBar" class="barFill"></div>
      </div>

      <div class="factorGrid">
        <div class="factor">
          <div class="factorTop">Trend</div>
          <div id="trendVal" class="factorVal mid">72.3</div>
        </div>
        <div class="factor">
          <div class="factorTop">Volume</div>
          <div id="volumeVal" class="factorVal mid">65.5</div>
        </div>
        <div class="factor">
          <div class="factorTop">Structure</div>
          <div id="structureVal" class="factorVal ok">80.1</div>
        </div>
        <div class="factor">
          <div class="factorTop">Volatility</div>
          <div id="volatilityVal" class="factorVal fail">51.2</div>
        </div>
        <div class="factor">
          <div class="factorTop">Liquidity</div>
          <div id="liquidityVal" class="factorVal ok">81.9</div>
        </div>
        <div class="factor">
          <div class="factorTop">Session</div>
          <div id="sessionVal" class="factorVal mid">68.0</div>
        </div>
      </div>
    </section>

    <section class="logCard">
      <div class="logHead">
        <div class="logTitle">LOG</div>
        <div id="syncBadge" class="syncBadge ok">SYNC OK</div>
      </div>
      <div id="logList" class="logList">
        <div class="logEntry">Keine Einträge.</div>
      </div>
    </section>
  </div>

  <script>
    const fallbackState = {
      pnl: 0,
      guard: "READY",
      reasonHint: "System bereit.",
      processing: false,
      queueLength: 0,
      confidence: 62,
      score: 82,
      autoEnabled: false,
      health: {
        status: true,
        buy: true,
        sell: true
      },
      factors: {
        trend: 72.3,
        volume: 65.5,
        structure: 80.1,
        volatility: 51.2,
        liquidity: 81.9,
        session: 68.0
      },
      log: []
    };

    const $ = id => document.getElementById(id);

    const els = {
      guard: $("guard"),
      heroHint: $("heroHint"),
      heroMeta: $("heroMeta"),
      heroMetaText: $("heroMetaText"),
      pnl: $("pnl"),
      healthStatus: $("healthStatus"),
      healthBuy: $("healthBuy"),
      healthSell: $("healthSell"),
      confVal: $("confVal"),
      queueVal: $("queueVal"),
      processingVal: $("processingVal"),
      queueCard: $("queueCard"),
      processingCard: $("processingCard"),
      scoreVal: $("scoreVal"),
      scoreBar: $("scoreBar"),
      trendVal: $("trendVal"),
      volumeVal: $("volumeVal"),
      structureVal: $("structureVal"),
      volatilityVal: $("volatilityVal"),
      liquidityVal: $("liquidityVal"),
      sessionVal: $("sessionVal"),
      logList: $("logList"),
      syncBadge: $("syncBadge"),
      autoToggleBtn: $("autoToggleBtn"),
      toggleMain: $("toggleMain"),
      toggleState: $("toggleState"),
      btnBuy: $("btnBuy"),
      btnSell: $("btnSell"),
      btnWin: $("btnWin"),
      btnLoss: $("btnLoss"),
      btnReset: $("btnReset")
    };

    function safeNum(v, fb = 0){
      const n = Number(v);
      return Number.isFinite(n) ? n : fb;
    }

    function fmtPnL(v){
      const n = safeNum(v, 0);
      if (Number.isInteger(n)) return String(n);
      return n.toFixed(2);
    }

    function shortGuard(raw){
      const g = String(raw || "").toUpperCase().trim();
      if (g === "READY" || g === "SYSTEM_READY") return "READY";
      if (g.includes("SESSION")) return "SESSION...";
      if (g.includes("QUEUE")) return "LOCKED";
      if (g.includes("PROCESS")) return "LOCKED";
      if (g.includes("BLOCK") || g.includes("LOCK")) return "LOCKED";
      if (g.includes("HEALTH")) return "FAIL";
      if (g.includes("FAIL")) return "FAIL";
      if (g.includes("LOSS")) return "LOSS...";
      return g || "READY";
    }

    function guardClass(raw){
      const g = String(raw || "").toUpperCase();
      if (g.includes("READY")) return "ready";
      if (g.includes("SESSION")) return "block";
      if (g.includes("QUEUE") || g.includes("PROCESS")) return "warn";
      if (g.includes("BLOCK") || g.includes("LOCK") || g.includes("FAIL") || g.includes("HEALTH") || g.includes("LOSS")) return "fail";
      return "warn";
    }

    function boolText(v){ return v ? "OK" : "FAIL"; }
    function boolClass(v){ return v ? "ok" : "fail"; }

    function factorClass(v){
      const n = safeNum(v);
      if (n >= 75) return "ok";
      if (n >= 60) return "mid";
      return "fail";
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normalizeState(api){
      const s = JSON.parse(JSON.stringify(fallbackState));

      s.pnl = safeNum(api.pnl, 0);
      s.guard = String(api.guard || "READY");
      s.reasonHint = String(api.reasonHint || "System bereit.");
      s.processing = !!api.processing;
      s.queueLength = safeNum(api.queueLength, Array.isArray(api.queue) ? api.queue.length : 0);
      s.confidence = safeNum(api.confidence, 62);
      s.score = safeNum(api.score, 82);
      s.autoEnabled = !!api.autoEnabled;

      s.health = {
        status: !!(api.health?.status ?? true),
        buy: !!(api.health?.buy ?? true),
        sell: !!(api.health?.sell ?? true)
      };

      s.factors = {
        trend: safeNum(api.factors?.trend, 72.3),
        volume: safeNum(api.factors?.volume, 65.5),
        structure: safeNum(api.factors?.structure, 80.1),
        volatility: safeNum(api.factors?.volatility, 51.2),
        liquidity: safeNum(api.factors?.liquidity, 81.9),
        session: safeNum(api.factors?.session, 68.0)
      };

      s.log = Array.isArray(api.log) ? api.log.slice().reverse() : [];
      return s;
    }

    function isSessionGuard(guard){
      return String(guard || "").toUpperCase().includes("SESSION");
    }

    function isBlockedGuard(guard){
      const g = String(guard || "").toUpperCase();
      return g.includes("BLOCK") || g.includes("LOCK") || g.includes("FAIL") || g.includes("HEALTH");
    }

    function isBusyGuard(guard){
      const g = String(guard || "").toUpperCase();
      return g.includes("QUEUE") || g.includes("PROCESS");
    }

    function isTradableState(state){
      const g = String(state.guard || "").toUpperCase();
      const guardReady = g === "READY" || g === "SYSTEM_READY";
      if (!guardReady) return false;
      if (state.processing) return false;
      if (safeNum(state.queueLength, 0) > 0) return false;
      if (!state.health.buy || !state.health.sell) return false;
      return true;
    }

    function renderHealth(el, ok){
      el.textContent = boolText(ok);
      el.className = `cardVal ${boolClass(ok)}`;
    }

    function renderFactor(el, value){
      el.textContent = safeNum(value).toFixed(1);
      el.className = `factorVal ${factorClass(value)}`;
    }

    function formatLogTime(input){
      if (!input) return "--:--:--";

      const str = String(input).trim();

      if (/^\d{2}:\d{2}:\d{2}$/.test(str)) return str;

      const d = new Date(str);
      if (!Number.isNaN(d.getTime())) {
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      const match = str.match(/(\d{2}):(\d{2}):(\d{2})/);
      if (match) return `${match[1]}:${match[2]}:${match[3]}`;

      return "--:--:--";
    }

    function prettifyLogMessage(item){
      const type = String(item.type || "").toUpperCase();
      const raw = String(item.msg || item.message || "-");

      if (type === "QUEUE") return raw.replace(/^BUY queued$/i, "BUY queued").replace(/^SELL queued$/i, "SELL queued");
      if (type === "PROCESSING") return raw.replace(/^BUY processing$/i, "BUY processing").replace(/^SELL processing$/i, "SELL processing");
      if (type === "EXECUTED") return raw.replace(/^BUY executed$/i, "BUY executed").replace(/^SELL executed$/i, "SELL executed");
      if (type === "WIN") return raw;
      if (type === "LOSS") return raw;
      if (type === "RESET") return raw;
      if (type === "AUTO") return raw;
      return raw;
    }

    function renderLog(log){
      if (!Array.isArray(log) || !log.length) {
        els.logList.innerHTML = `<div class="logEntry">Keine Einträge.</div>`;
        return;
      }

      const html = log.slice(0, 28).map(item => {
        const type = String(item.type || "").toUpperCase();
        const time = escapeHtml(formatLogTime(item.localTime || item.time || item.ts));
        const msg = escapeHtml(prettifyLogMessage(item));

        let cls = "logSystem";
        if (type.includes("QUEUE")) cls = "logQueued";
        else if (type.includes("PROCESS")) cls = "logProcessing";
        else if (type.includes("EXECUT")) cls = "logExecuted";
        else if (type.includes("WIN")) cls = "logWin";
        else if (type.includes("LOSS")) cls = "logLoss";
        else if (type.includes("RESET")) cls = "logReset";
        else if (type.includes("AUTO")) cls = "logSystem";

        return `<div class="logEntry ${cls}">${time} - ${msg}</div>`;
      }).join("");

      els.logList.innerHTML = html;
    }

    function pulseButton(el){
      el.classList.remove("flash");
      void el.offsetWidth;
      el.classList.add("flash");
    }

    function renderMeta(state){
      const q = safeNum(state.queueLength, 0);
      const session = isSessionGuard(state.guard);
      const blocked = isBlockedGuard(state.guard);
      const busy = isBusyGuard(state.guard) || state.processing || q > 0;

      els.heroMeta.className = "heroMeta";

      if (session) {
        els.heroMeta.classList.add("block");
        els.heroMetaText.textContent = "SESSION LIMIT";
      } else if (blocked) {
        els.heroMeta.classList.add("block");
        els.heroMetaText.textContent = "BLOCKED";
      } else if (busy) {
        els.heroMeta.classList.add("queue");
        els.heroMetaText.textContent = `QUEUE ${q}`;
      } else if (state.autoEnabled) {
        els.heroMeta.classList.add("auto");
        els.heroMetaText.textContent = "AUTO ON";
      } else {
        els.heroMeta.classList.add("live");
        els.heroMetaText.textContent = "LIVE";
      }
    }

    function renderAuto(state){
      const active = !!state.autoEnabled;
      els.autoToggleBtn.classList.toggle("active", active);
      els.toggleMain.textContent = active ? "AUTO ON" : "AUTO OFF";
      els.toggleState.textContent = active ? "ON" : "OFF";
    }

    function renderQueueProcessing(state){
      const q = safeNum(state.queueLength, 0);
      els.queueVal.textContent = String(q);
      els.processingVal.textContent = state.processing ? "ON" : "OFF";

      els.queueCard.classList.toggle("queuePulse", q > 0);
      els.processingCard.classList.toggle("processingPulse", !!state.processing);
    }

    function renderSync(status){
      els.syncBadge.className = "syncBadge";
      if (status === "pending") {
        els.syncBadge.classList.add("pending");
        els.syncBadge.textContent = "SYNC...";
      } else if (status === "fail") {
        els.syncBadge.classList.add("fail");
        els.syncBadge.textContent = "SYNC FAIL";
      } else {
        els.syncBadge.classList.add("ok");
        els.syncBadge.textContent = "SYNC OK";
      }
    }

    function render(state){
      els.guard.textContent = shortGuard(state.guard);
      els.guard.className = `guard ${guardClass(state.guard)}`;
      els.heroHint.textContent = state.reasonHint || "System bereit.";
      els.pnl.textContent = fmtPnL(state.pnl);

      renderHealth(els.healthStatus, !!state.health.status);
      renderHealth(els.healthBuy, !!state.health.buy);
      renderHealth(els.healthSell, !!state.health.sell);

      els.confVal.textContent = `${safeNum(state.confidence, 62)}%`;

      const score = Math.max(0, Math.min(100, safeNum(state.score, 82)));
      els.scoreVal.textContent = String(Math.round(score));
      els.scoreBar.style.width = `${score}%`;

      renderFactor(els.trendVal, state.factors.trend);
      renderFactor(els.volumeVal, state.factors.volume);
      renderFactor(els.structureVal, state.factors.structure);
      renderFactor(els.volatilityVal, state.factors.volatility);
      renderFactor(els.liquidityVal, state.factors.liquidity);
      renderFactor(els.sessionVal, state.factors.session);

      renderMeta(state);
      renderAuto(state);
      renderQueueProcessing(state);
      renderLog(state.log);

      const tradesAllowed = isTradableState(state);
      const guardIsSession = isSessionGuard(state.guard);
      const guardBlocked = isBlockedGuard(state.guard);
      const queueBusy = safeNum(state.queueLength, 0) > 0;

      els.btnBuy.disabled = !tradesAllowed;
      els.btnSell.disabled = !tradesAllowed;
      els.btnWin.disabled = guardIsSession || state.processing || queueBusy;
      els.btnLoss.disabled = guardIsSession || state.processing || queueBusy;
      els.btnReset.disabled = state.processing;
      els.autoToggleBtn.disabled = state.processing || guardBlocked;
    }

    async function getStatus(){
      const res = await fetch("/api/status", { cache: "no-store" });
      if (!res.ok) throw new Error("status failed");
      return await res.json();
    }

    async function postJSON(url, body = {}){
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(`${url} failed`);
      return await res.json();
    }

    async function performAction(url, btn){
      try{
        if (btn) pulseButton(btn);
        const data = await postJSON(url, {});
        render(normalizeState(data.status || data || {}));
        if (url === "/api/reset") {
          setTimeout(syncNow, 260);
        }
      } catch(e){
        console.error(e);
        renderSync("fail");
      }
    }

    async function toggleAuto(){
      try{
        pulseButton(els.autoToggleBtn);
        const current = await getStatus();
        const nextUrl = current.autoEnabled ? "/api/auto/off" : "/api/auto/on";
        const data = await postJSON(nextUrl, {});
        render(normalizeState(data.status || data || {}));
      } catch(e){
        console.error(e);
        renderSync("fail");
      }
    }

    async function syncNow(){
      renderSync("pending");
      try{
        const data = await getStatus();
        render(normalizeState(data || {}));
        renderSync("ok");
      } catch(e){
        console.error(e);
        renderSync("fail");
      }
    }

    els.btnBuy.onclick = () => performAction("/api/buy", els.btnBuy);
    els.btnSell.onclick = () => performAction("/api/sell", els.btnSell);
    els.btnWin.onclick = () => performAction("/api/win", els.btnWin);
    els.btnLoss.onclick = () => performAction("/api/loss", els.btnLoss);
    els.btnReset.onclick = () => performAction("/api/reset", els.btnReset);
    els.autoToggleBtn.onclick = toggleAuto;

    render(fallbackState);
    renderSync("pending");
    syncNow();
    setInterval(syncNow, 2200);
  </script>
</body>
</html>
