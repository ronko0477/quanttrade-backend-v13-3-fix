<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantTrade V19.8.10</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0a0f2a, #000000);
  color: white;
  padding: 14px;
}

/* HEADER */
h1 {
  text-align: center;
  margin-bottom: 14px;
  font-size: 18px;
  letter-spacing: 1px;
}

/* MAIN CARD */
.main {
  background: linear-gradient(180deg, #2c3570, #1a2255);
  border-radius: 22px;
  padding: 20px;
  text-align: center;
  margin-bottom: 14px;
  box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
}

.main h2 {
  font-size: 46px;
  color: #a8e063;
}

.pnl {
  font-size: 40px;
  margin-top: 8px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.card {
  background: linear-gradient(180deg, rgba(40,50,120,.92), rgba(25,35,95,.95));
  border-radius: 16px;
  padding: 14px;
  text-align: center;
}

.card span {
  font-size: 13px;
  opacity: 0.7;
}

.card b {
  display: block;
  margin-top: 6px;
  font-size: 18px;
}

/* BUTTONS */
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 0;
}

button {
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 14px;
  font-weight: bold;
  color: white;
}

/* COLORS toned down */
.buy { background: linear-gradient(90deg, #7fbf7f, #6aa96a); }
.sell { background: linear-gradient(90deg, #caa9a9, #b89393); }
.win { background: linear-gradient(90deg, #7fbf7f, #6aa96a); }
.loss { background: linear-gradient(90deg, #caa9a9, #b89393); }

.reset {
  width: 100%;
  margin-top: 8px;
  background: linear-gradient(90deg, #c9c27a, #b4ac63);
}

/* AI SCORE */
.score {
  background: linear-gradient(180deg, #2c3570, #1a2255);
  border-radius: 20px;
  padding: 16px;
  margin-top: 14px;
}

.scoreTop {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.scoreTop h3 {
  font-size: 14px;
}

.scoreValue {
  font-size: 32px;
  text-shadow: 0 0 10px rgba(160,200,255,.25);
}

.bar {
  height: 8px;
  border-radius: 10px;
  background: #2a2f5c;
  margin: 10px 0;
  overflow: hidden;
}

.barInner {
  height: 100%;
  width: 70%;
  background: linear-gradient(90deg, #d9a, #9df);
}

/* SUB GRID */
.subgrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.subcard {
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  font-size: 13px;
}

/* LOG */
.log {
  margin-top: 14px;
  background: #1a2255;
  border-radius: 16px;
  padding: 12px;
  font-size: 12px;
  max-height: 180px;
  overflow-y: auto;
}

.entry {
  margin-bottom: 6px;
  opacity: 0.9;
}

.entry.processing {
  color: #ffd36a;
  opacity: 1;
}

/* QUICK DOCK */
.dock {
  position: fixed;
  bottom: 14px;
  left: 14px;
  right: 14px;
  background: linear-gradient(180deg, #6c79d6, #5a65c7);
  border-radius: 20px;
  padding: 14px;
  backdrop-filter: blur(12px);
}

.dock h4 {
  font-size: 14px;
  margin-bottom: 8px;
}

.dockButtons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
</style>
</head>

<body>

<h1>V19.8.10 HARD LIVE ⚡</h1>

<div class="main">
  <h2>READY</h2>
  <div class="pnl">0.00</div>
  <div>Net PnL</div>
</div>

<div class="grid">
  <div class="card"><span>STATUS</span><b>OK</b></div>
  <div class="card"><span>BUY POST</span><b>OK</b></div>
  <div class="card"><span>SELL POST</span><b>OK</b></div>
  <div class="card"><span>CONF</span><b>62%</b></div>
</div>

<div class="buttons">
  <button class="buy">BUY</button>
  <button class="sell">SELL</button>
  <button class="win">WIN</button>
  <button class="loss">LOSS</button>
</div>

<button class="reset">RESET</button>

<div class="grid">
  <div class="card"><span>AUTO ON</span><b>AUTO ON</b></div>
  <div class="card"><span>AUTO OFF</span><b>AUTO OFF</b></div>
  <div class="card"><span>QUEUE</span><b>0</b></div>
  <div class="card"><span>PROCESSING</span><b>OFF</b></div>
  <div class="card"><span>AUTO</span><b>OFF</b></div>
  <div class="card"><span>TRIGGER</span><b>80</b></div>
</div>

<div class="score">
  <div class="scoreTop">
    <h3>AI SCORE</h3>
    <div class="scoreValue">82</div>
  </div>

  <div class="bar">
    <div class="barInner"></div>
  </div>

  <div class="subgrid">
    <div class="subcard">Trend 72.3</div>
    <div class="subcard">Volume 65.5</div>
    <div class="subcard">Structure 80.1</div>
    <div class="subcard">Volatility 51.2</div>
    <div class="subcard">Liquidity 81.9</div>
    <div class="subcard">Session 68</div>
  </div>
</div>

<div class="log">
  <div class="entry">Keine Einträge.</div>
</div>

<div class="dock">
  <h4>Quick Dock • auto off • queue 0</h4>
  <div class="dockButtons">
    <button class="buy">BUY</button>
    <button class="sell">SELL</button>
    <button style="background:#7a8ed6;">SYNC</button>
  </div>
</div>

</body>
</html>
