<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V19.8.4 HARD LIVE</title>
  <style>
    :root{
      --bg1:#07124d;
      --bg2:#030b35;
      --card:#263271;
      --card2:#32408f;
      --line:rgba(255,255,255,.08);
      --text:#f3f5ff;
      --muted:rgba(255,255,255,.72);
      --green:#b5e28e;
      --red:#e7a5a5;
      --yellow:#e8d37b;
      --cyan:#a9dbf5;
      --safeBottom:env(safe-area-inset-bottom, 0px);
      --dockClosedH:74px;
      --dockOpenH:228px;
      --activeDockHeight:var(--dockClosedH);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(74,95,210,.28), transparent 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    .wrap{
      width:min(980px, 100%);
      margin:0 auto;
      padding:22px 18px calc(var(--activeDockHeight) + var(--safeBottom) + 34px);
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:1000;
      letter-spacing:.5px;
      margin:10px 0 18px;
      text-transform:uppercase;
    }

    .hero{
      background:linear-gradient(180deg, rgba(65,81,182,.32), rgba(39,52,123,.32));
      border:1px solid var(--line);
      border-radius:34px;
      padding:22px;
      box-shadow:0 20px 55px rgba(0,0,0,.22);
    }

    .heroInner{
      background:linear-gradient(180deg, rgba(82,96,196,.20), rgba(44,56,131,.18));
      border:1px solid var(--line);
      border-radius:30px;
      padding:34px 18px 28px;
      text-align:center;
      overflow:hidden;
    }

    .guard{
      font-size:96px;
      line-height:.92;
      font-weight:1000;
      letter-spacing:-1px;
      margin:0 auto 8px;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-transform:uppercase;
    }

    .guard.ready{color:var(--green)}
    .guard.warn{color:var(--yellow)}
    .guard.blocked{color:var(--red)}
    .guard.cooldown,.guard.locked,.guard.session_limit{color:var(--cyan)}

    .guardSub{
      color:var(--muted);
      font-size:22px;
      font-weight:800;
      margin-top:4px;
      margin-bottom:16px;
    }

    .pnl{
      font-size:92px;
      line-height:.92;
      font-weight:1000;
      margin:0;
    }

    .pnl small{
      display:block;
      margin-top:10px;
      font-size:20px;
      color:var(--muted);
      font-weight:800;
    }

    .healthGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:22px;
    }

    .healthBox,.miniBox,.factor,.logCard,.sectionCard{
      background:linear-gradient(180deg, rgba(65,81,182,.24), rgba(39,52,123,.24));
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:0 14px 34px rgba(0,0,0,.18);
    }

    .healthBox{
      padding:26px 28px;
      min-height:170px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .healthName{
      font-size:28px;
      font-weight:1000;
      text-transform:uppercase;
      margin-bottom:18px;
    }

    .healthVal{
      font-size:64px;
      font-weight:1000;
      line-height:1;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .ok{color:var(--green)}
    .mid{color:var(--yellow)}
    .bad{color:var(--red)}
    .flat{color:var(--cyan)}

    .actionWrap{
      margin-top:22px;
    }

    .actionBar,.actionBarSecondary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .actionBarSecondary{
      grid-template-columns:1fr 1fr;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:22px;
      min-height:90px;
      font-size:24px;
      font-weight:1000;
      color:#fff;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease;
      box-shadow:0 10px 28px rgba(0,0,0,.16);
    }
    button:active{transform:scale(.985)}

    .btnBuy{background:linear-gradient(90deg,#b4e4a6,#bde8af)}
    .btnSell{background:linear-gradient(90deg,#e7bcbc,#e4c2c2)}
    .btnWin{background:linear-gradient(90deg,#b4e4a6,#bde8af)}
    .btnLoss{background:linear-gradient(90deg,#dcb7b7,#d8bcbc)}
    .btnReset{
      background:linear-gradient(90deg,#d8cb77,#e5d58b);
      grid-column:1 / -1;
    }

    .miniGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .miniBox{
      padding:22px 24px;
      min-height:150px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .miniLabel{
      font-size:18px;
      font-weight:900;
      text-transform:uppercase;
      color:rgba(255,255,255,.86);
      margin-bottom:14px;
    }

    .miniValue{
      font-size:34px;
      font-weight:1000;
      line-height:1.04;
      text-transform:uppercase;
    }

    .scoreCard{
      margin-top:18px;
      padding:24px;
    }

    .scoreHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .scoreTitle{
      font-size:28px;
      font-weight:1000;
      text-transform:uppercase;
    }

    .scoreValue{
      font-size:82px;
      line-height:.9;
      font-weight:1000;
      color:var(--cyan);
    }

    .barTrack{
      height:20px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.10);
      border:1px solid var(--line);
      margin-bottom:18px;
    }

    .barFill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#e3a8a8,#dfd67f,#aee29e,#9fd6f0);
      transition:width .25s ease;
    }

    .factorGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .factor{
      padding:18px 20px;
      min-height:118px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .factorTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .factorName{
      color:var(--muted);
      font-size:18px;
      font-weight:900;
    }

    .factorVal{
      font-size:26px;
      font-weight:1000;
    }

    .logCard{
      margin-top:18px;
      padding:24px;
    }

    .logTitle{
      font-size:28px;
      font-weight:1000;
      text-transform:uppercase;
      margin-bottom:18px;
    }

    .log{
      max-height:520px;
      overflow:auto;
      padding-right:6px;
    }

    .entry{
      padding:16px 2px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:18px;
      line-height:1.35;
      word-break:break-word;
    }
    .entry:last-child{border-bottom:none}

    .entry.processing{color:var(--yellow)}
    .entry.executed{color:var(--cyan)}
    .entry.queued{color:#d9ddff}
    .entry.loss,.entry.hard_block{color:var(--red)}
    .entry.win,.entry.reset,.entry.sync,.entry.auto{color:var(--yellow)}

    /* dock */
    .dock{
      position:fixed;
      left:14px;
      right:14px;
      bottom:calc(var(--safeBottom) + 10px);
      z-index:60;
      pointer-events:none;
    }

    .dockPanel{
      pointer-events:auto;
      background:linear-gradient(180deg, rgba(98,112,219,.96), rgba(73,86,188,.96));
      border:1px solid rgba(255,255,255,.11);
      border-radius:26px;
      box-shadow:0 16px 36px rgba(0,0,0,.24);
      overflow:hidden;
      backdrop-filter:blur(10px);
    }

    .dockHandle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      min-height:74px;
      cursor:pointer;
    }

    .dockLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .dockGrip{
      width:42px;
      height:6px;
      border-radius:999px;
      background:rgba(255,255,255,.28);
      flex:0 0 auto;
    }

    .dockTextWrap{
      min-width:0;
    }

    .dockTitle{
      font-size:22px;
      font-weight:1000;
      line-height:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .dockMeta{
      margin-top:5px;
      color:rgba(255,255,255,.78);
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .dockChevron{
      font-size:24px;
      color:#fff;
      opacity:.9;
      transition:transform .2s ease;
      flex:0 0 auto;
    }

    body.dock-open .dockChevron{
      transform:rotate(180deg);
    }

    .dockBody{
      max-height:0;
      overflow:hidden;
      transition:max-height .22s ease;
    }

    body.dock-open .dockBody{
      max-height:220px;
    }

    .dockButtons{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      padding:0 14px 14px;
    }

    .dockBtn{
      min-height:56px;
      border-radius:16px;
      font-size:16px;
      font-weight:1000;
      box-shadow:none;
    }

    .dockBuy{background:linear-gradient(90deg,#b4e4a6,#bde8af)}
    .dockSell{background:linear-gradient(90deg,#e7bcbc,#e4c2c2)}
    .dockSync{background:linear-gradient(90deg,#8da2ff,#98b6ff)}

    @media (max-width: 760px){
      .wrap{
        padding:16px 14px calc(var(--activeDockHeight) + var(--safeBottom) + 30px);
      }

      .title{
        font-size:24px;
        margin:8px 0 14px;
      }

      .hero{
        border-radius:26px;
        padding:16px;
      }

      .heroInner{
        border-radius:24px;
        padding:26px 14px 22px;
      }

      .guard{
        font-size:clamp(40px, 15vw, 82px);
        letter-spacing:-.5px;
      }

      .guardSub{
        font-size:16px;
        margin-bottom:12px;
      }

      .pnl{
        font-size:clamp(54px, 18vw, 84px);
      }

      .pnl small{
        font-size:14px;
      }

      .healthGrid,.miniGrid,.factorGrid,
      .actionBar,.actionBarSecondary{
        grid-template-columns:1fr 1fr;
        gap:12px;
      }

      .healthBox{
        min-height:126px;
        padding:18px;
        border-radius:22px;
      }

      .healthName{
        font-size:18px;
        margin-bottom:12px;
      }

      .healthVal{
        font-size:32px;
      }

      button{
        min-height:76px;
        border-radius:18px;
        font-size:18px;
      }

      .miniBox{
        min-height:112px;
        padding:16px;
        border-radius:22px;
      }

      .miniLabel{
        font-size:13px;
        margin-bottom:10px;
      }

      .miniValue{
        font-size:28px;
      }

      .scoreCard,.logCard{
        padding:18px;
        border-radius:24px;
      }

      .scoreTitle,.logTitle{
        font-size:18px;
      }

      .scoreValue{
        font-size:58px;
      }

      .factor{
        min-height:90px;
        padding:14px;
        border-radius:20px;
      }

      .factorName{
        font-size:12px;
      }

      .factorVal{
        font-size:22px;
      }

      .entry{
        font-size:15px;
        padding:14px 0;
      }

      .dock{
        left:12px;
        right:12px;
        bottom:calc(var(--safeBottom) + 8px);
      }

      .dockHandle{
        min-height:72px;
        padding:12px 14px;
      }

      .dockTitle{
        font-size:19px;
      }

      .dockMeta{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">V19.8.4 HARD LIVE ⚡</div>

    <div class="hero">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="guardSub" class="guardSub">System bereit.</div>
        <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
      </div>
    </div>

    <div class="healthGrid">
      <div class="healthBox">
        <div class="healthName">STATUS</div>
        <div id="healthStatus" class="healthVal ok">OK</div>
      </div>
      <div class="healthBox">
        <div class="healthName">BUY POST</div>
        <div id="healthBuy" class="healthVal ok">OK</div>
      </div>
      <div class="healthBox">
        <div class="healthName">SELL POST</div>
        <div id="healthSell" class="healthVal ok">OK</div>
      </div>
      <div class="healthBox">
        <div class="healthName">CONF</div>
        <div id="conf" class="healthVal mid">62%</div>
      </div>
    </div>

    <div class="actionWrap">
      <div class="actionBar">
        <button class="btnBuy" onclick="performAction('/api/buy')">BUY</button>
        <button class="btnSell" onclick="performAction('/api/sell')">SELL</button>
        <button class="btnWin" onclick="performAction('/api/win')">WIN</button>
        <button class="btnLoss" onclick="performAction('/api/loss')">LOSS</button>
      </div>

      <div class="actionBarSecondary">
        <button class="btnReset" onclick="performAction('/api/reset')">RESET</button>
      </div>
    </div>

    <div class="miniGrid">
      <div class="miniBox">
        <div class="miniLabel">AUTO ON</div>
        <div class="miniValue flat" id="autoOnState">AUTO ON</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">AUTO OFF</div>
        <div class="miniValue" id="autoOffState">AUTO OFF</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">QUEUE</div>
        <div class="miniValue" id="queueLength">0</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">PROCESSING</div>
        <div class="miniValue" id="processingState">OFF</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">AUTO</div>
        <div class="miniValue" id="autoState">OFF</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">TRIGGER</div>
        <div class="miniValue" id="triggerVal">80</div>
      </div>
    </div>

    <div class="scoreCard sectionCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreValue" class="scoreValue">82</div>
      </div>
      <div class="barTrack">
        <div id="scoreBar" class="barFill" style="width:82%"></div>
      </div>

      <div class="factorGrid">
        <div class="factor"><div class="factorTop"><div class="factorName">Trend</div><div id="trendVal" class="factorVal mid">72.3</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Volume</div><div id="volumeVal" class="factorVal mid">65.5</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Structure</div><div id="structureVal" class="factorVal ok">80.1</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Volatility</div><div id="volatilityVal" class="factorVal bad">51.2</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Liquidity</div><div id="liquidityVal" class="factorVal ok">81.9</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Session</div><div id="sessionVal" class="factorVal mid">68.0</div></div></div>
      </div>
    </div>

    <div class="logCard">
      <div class="logTitle">LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <div class="dock" id="dock">
    <div class="dockPanel">
      <div class="dockHandle" onclick="toggleDock()">
        <div class="dockLeft">
          <div class="dockGrip"></div>
          <div class="dockTextWrap">
            <div class="dockTitle">Quick Dock</div>
            <div class="dockMeta" id="dockMetaText">tap to open</div>
          </div>
        </div>
        <div class="dockChevron">⌃</div>
      </div>

      <div class="dockBody">
        <div class="dockButtons">
          <button class="dockBtn dockBuy" onclick="performAction('/api/buy')">BUY</button>
          <button class="dockBtn dockSell" onclick="performAction('/api/sell')">SELL</button>
          <button class="dockBtn dockSync" onclick="performAction('/api/sync')">SYNC</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    function apiUrl(path){
      return `${API_BASE}${path}`;
    }

    async function getStatus(){
      const res = await fetch(apiUrl('/api/status'));
      if(!res.ok) throw new Error('status failed');
      return res.json();
    }

    async function postJSON(url, body = {}){
      const res = await fetch(apiUrl(url), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if(!res.ok) {
        throw data;
      }
      return data;
    }

    function fmt(n){
      const num = Number(n || 0);
      return num.toFixed(2);
    }

    function factorClass(v){
      if (v >= 80) return 'ok';
      if (v >= 60) return 'mid';
      return 'bad';
    }

    function setText(id, val){
      const el = document.getElementById(id);
      if(el) el.textContent = val;
    }

    function renderLog(list){
      const box = document.getElementById('log');
      box.innerHTML = '';

      (list || []).forEach(item => {
        const div = document.createElement('div');
        const type = String(item.type || '').toLowerCase();
        div.className = `entry ${type}`;
        div.textContent = `${item.time} - ${item.type} ${item.msg}`;
        box.appendChild(div);
      });
    }

    function renderStatus(data){
      const guard = document.getElementById('guard');
      const guardSub = document.getElementById('guardSub');

      guard.className = 'guard';
      const g = String(data.guard || '').toLowerCase();
      if (g === 'ready') guard.classList.add('ready');
      else if (g === 'warn') guard.classList.add('warn');
      else if (g === 'blocked') guard.classList.add('blocked');
      else if (g === 'locked') guard.classList.add('locked');
      else if (g === 'cooldown') guard.classList.add('cooldown');
      else if (g === 'session_limit') guard.classList.add('session_limit');
      else guard.classList.add('flat');

      guard.textContent = data.reasonLabel || data.guard || 'READY';
      guardSub.textContent = data.reasonHint || 'System bereit.';

      document.getElementById('pnl').innerHTML = `${fmt(data.pnl)}<small>Net PnL</small>`;

      setText('healthStatus', data.health && data.health.status ? 'OK' : 'FAIL');
      setText('healthBuy', data.health && data.health.buy ? 'OK' : 'FAIL');
      setText('healthSell', data.health && data.health.sell ? 'OK' : 'FAIL');
      setText('conf', `${Number(data.confidence || 0)}%`);

      setText('queueLength', String(data.queueLength || 0));
      setText('processingState', data.processing ? 'ON' : 'OFF');
      setText('autoState', data.autoEnabled ? 'ON' : 'OFF');
      setText('autoOnState', 'AUTO ON');
      setText('autoOffState', 'AUTO OFF');
      setText('triggerVal', String(data.trigger || 80));

      setText('scoreValue', String(data.aiScore || 0));
      document.getElementById('scoreBar').style.width = `${Math.max(0, Math.min(100, Number(data.aiScore || 0)))}%`;

      const f = data.factors || {};
      setText('trendVal', Number(f.trend || 0).toFixed(1));
      setText('volumeVal', Number(f.volume || 0).toFixed(1));
      setText('structureVal', Number(f.structure || 0).toFixed(1));
      setText('volatilityVal', Number(f.volatility || 0).toFixed(1));
      setText('liquidityVal', Number(f.liquidity || 0).toFixed(1));
      setText('sessionVal', Number(f.session || 0).toFixed(1));

      document.getElementById('trendVal').className = `factorVal ${factorClass(f.trend || 0)}`;
      document.getElementById('volumeVal').className = `factorVal ${factorClass(f.volume || 0)}`;
      document.getElementById('structureVal').className = `factorVal ${factorClass(f.structure || 0)}`;
      document.getElementById('volatilityVal').className = `factorVal ${factorClass(f.volatility || 0)}`;
      document.getElementById('liquidityVal').className = `factorVal ${factorClass(f.liquidity || 0)}`;
      document.getElementById('sessionVal').className = `factorVal ${factorClass(f.session || 0)}`;

      document.getElementById('healthStatus').className = `healthVal ${(data.health && data.health.status) ? 'ok' : 'bad'}`;
      document.getElementById('healthBuy').className = `healthVal ${(data.health && data.health.buy) ? 'ok' : 'bad'}`;
      document.getElementById('healthSell').className = `healthVal ${(data.health && data.health.sell) ? 'ok' : 'bad'}`;
      document.getElementById('conf').className = 'healthVal mid';

      const dockMeta = [];
      dockMeta.push(data.autoEnabled ? 'auto on' : 'auto off');
      dockMeta.push(`queue ${data.queueLength || 0}`);
      document.getElementById('dockMetaText').textContent = dockMeta.join(' • ');

      renderLog(data.log || []);
    }

    async function runHealthChecks(){
      try { await postJSON('/api/buy', { dryRun:true }); } catch {}
      try { await postJSON('/api/sell', { dryRun:true }); } catch {}
      try {
        const data = await getStatus();
        renderStatus(data);
      } catch (e) {
        console.error(e);
      }
    }

    async function performAction(url){
      try{
        const data = await postJSON(url, {});
        renderStatus(data.status || data);

        if (url === '/api/reset') {
          setTimeout(async () => {
            await runHealthChecks();
          }, 300);
        }
      } catch(e){
        console.error(e);
        if (e && e.status) {
          renderStatus(e.status);
        }
      }
    }

    function applyDockHeight(){
      const open = document.body.classList.contains('dock-open');
      document.documentElement.style.setProperty(
        '--activeDockHeight',
        open ? 'var(--dockOpenH)' : 'var(--dockClosedH)'
      );
    }

    function toggleDock(){
      document.body.classList.toggle('dock-open');
      applyDockHeight();
    }

    async function boot(){
      applyDockHeight();
      await runHealthChecks();

      setInterval(async () => {
        try{
          const data = await getStatus();
          renderStatus(data);
        } catch(e){
          console.error(e);
        }
      }, 2000);
    }

    boot();
  </script>
</body>
</html>
