<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V16.0 UI PRO</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1530;
  color:white;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  background:#0b1530;
  padding:15px;
  text-align:center;
}

.title {
  font-size:22px;
  opacity:0.8;
}

/* STATUS BAR */
.status-bar {
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:10px;
}

.chip {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  background:#1c2b55;
}

/* MAIN CARD */
.card {
  background:#5c66a5;
  margin:15px;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.big {
  font-size:42px;
  font-weight:bold;
}

.pnl {
  font-size:28px;
  margin:10px 0;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.box {
  background:#6c75b5;
  padding:12px;
  border-radius:12px;
}

/* BUTTONS */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}

button {
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:#8892d0;
  color:white;
}

button:active {
  transform:scale(0.95);
}

/* LOG */
.log {
  margin:15px;
}

.log-header {
  display:flex;
  justify-content:space-between;
}

.log-entry {
  background:#5c66a5;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

/* 🚀 STATUS COLORS */
.ready { background:#2ecc71 !important; }
.warn { background:#f39c12 !important; }
.blocked { background:#e74c3c !important; }

/* ⚡ COOLDOWN BLINK */
.cooldown {
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity:1; }
  50% { opacity:0.3; }
  100% { opacity:1; }
}
</style>
</head>

<body>

<div class="header">
  <div class="title">V16.0 UI PRO</div>

  <div class="status-bar">
    <div class="chip" id="chipStatus">READY</div>
    <div class="chip" id="chipOrders">0/10</div>
    <div class="chip" id="chipCooldown">0s</div>
    <div class="chip" id="chipHB">HB OFF</div>
  </div>
</div>

<div class="card">
  <div class="big" id="statusText">READY</div>
  <div class="pnl" id="pnl">PnL: 0</div>

  <div class="grid">
    <div class="box">Wins: <span id="wins">0</span></div>
    <div class="box">Losses: <span id="losses">0</span></div>
    <div class="box">Winrate: <span id="winrate">0%</span></div>
    <div class="box">Queue: <span id="queue">0</span></div>
  </div>
</div>

<div class="buttons">
  <button onclick="send('/api/order')">SEND</button>
  <button onclick="send('/api/win')">+WIN</button>
  <button onclick="send('/api/loss')">-LOSS</button>
  <button onclick="send('/api/reset')">RESET</button>
  <button onclick="send('/api/cooldown')">COOLDOWN</button>
  <button onclick="send('/api/hardblock/on')">HB ON</button>
  <button onclick="send('/api/hardblock/off')">HB OFF</button>
  <button onclick="loadStatus()">REFRESH</button>
</div>

<div class="log">
  <div class="log-header">
    <h3>Log</h3>
    <button onclick="clearLog()">Clear</button>
  </div>
  <div id="log"></div>
</div>

<script>

// 🔊 SOUND
const beep = () => {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
};

// SEND ACTION
async function send(url){
  await fetch(url, {method:'POST'});
  loadStatus();
}

// LOAD STATUS
async function loadStatus(){
  const res = await fetch('/api/status');
  const data = await res.json();

  // TEXT
  document.getElementById('statusText').innerText = data.guard;
  document.getElementById('pnl').innerText = "PnL: " + data.pnl;

  document.getElementById('wins').innerText = data.totalWins;
  document.getElementById('losses').innerText = data.totalLosses;
  document.getElementById('queue').innerText = data.queueLength;

  // WINRATE
  const wr = data.totalWins + data.totalLosses > 0
    ? (data.totalWins / (data.totalWins + data.totalLosses) * 100).toFixed(1)
    : 0;
  document.getElementById('winrate').innerText = wr + "%";

  // CHIPS
  document.getElementById('chipStatus').innerText = data.guard;
  document.getElementById('chipOrders').innerText =
    data.ordersToday + "/" + data.maxOrdersPerSession;
  document.getElementById('chipCooldown').innerText =
    data.cooldownLeft + "s";
  document.getElementById('chipHB').innerText =
    data.hardBlocked ? "HB ON" : "HB OFF";

  // 🎨 COLOR
  const statusEl = document.getElementById('statusText');
  statusEl.className = "big";

  if (data.guard === "READY") statusEl.classList.add("ready");
  if (data.guard === "WARN") statusEl.classList.add("warn");
  if (data.guard === "BLOCKED") statusEl.classList.add("blocked");

  // ⚡ COOLDOWN BLINK
  const cd = document.getElementById('chipCooldown');
  cd.classList.remove("cooldown");

  if (data.cooldownLeft > 0) {
    cd.classList.add("cooldown");
  }

  // 🔊 SOUND
  if (data.guard === "BLOCKED") beep();

  // LOG
  const logDiv = document.getElementById('log');
  logDiv.innerHTML = "";

  data.log.forEach(l=>{
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerText = l.type + " - " + l.msg;
    logDiv.appendChild(el);
  });
}

// CLEAR LOG
function clearLog(){
  document.getElementById('log').innerHTML = "";
}

// AUTO REFRESH
setInterval(loadStatus, 2000);
loadStatus();

</script>

</body>
</html>
