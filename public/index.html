<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V16.2 UI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1530;
color:white;
}

.header{
position:sticky;
top:0;
padding:15px;
text-align:center;
background:#0b1530;
}

.title{
font-size:22px;
margin-bottom:8px;
opacity:0.9;
}

.status-bar{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}

.chip{
padding:6px 10px;
border-radius:10px;
font-size:12px;
background:#1c2b55;
}

.ready{background:#2ecc71;}
.warn{background:#f1c40f;color:#000;}
.blocked{background:#e74c3c;}

.card{
background:#6c75b8;
margin:15px;
padding:20px;
border-radius:20px;
text-align:center;
}

.status-main{
font-size:48px;
font-weight:bold;
}

.status-sub{
font-size:18px;
margin-bottom:10px;
}

.pnl{
font-size:32px;
margin:10px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#7c84c3;
padding:10px;
border-radius:12px;
}

.chart{
padding:10px;
}

canvas{
width:100%;
height:200px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

button{
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
color:white;
cursor:pointer;
}

.btn1{background:#7f89e8;}
.btn2{background:#98b97d;}
.btn3{background:#c58d80;}
.btn4{background:#bfa45d;}

.log{
padding:15px;
}

.log-entry{
background:#6c75b8;
margin-bottom:8px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<div class="title">V16.2 UI PRO</div>

<div class="status-bar">
<div id="chipStatus" class="chip">READY</div>
<div id="chipOrders" class="chip">0/10</div>
<div id="chipCooldown" class="chip">0s</div>
<div id="chipHB" class="chip">HB OFF</div>
</div>
</div>

<div class="card">
<div id="statusText" class="status-main">READY</div>
<div id="statusSub" class="status-sub">SYSTEM READY</div>

<div id="pnl" class="pnl">PnL: 0.00</div>

<div class="grid">
<div class="box">Orders<br><span id="orders">0/10</span></div>
<div class="box">Queue<br><span id="queue">0</span></div>
<div class="box">Cooldown<br><span id="cooldown">0s</span></div>
<div class="box">HardBlock<br><span id="hb">AUS</span></div>
<div class="box">Wins<br><span id="wins">0</span></div>
<div class="box">Losses<br><span id="losses">0</span></div>
<div class="box">Winrate<br><span id="winrate">0%</span></div>
<div class="box">Streak<br><span id="streak">W0 / L0</span></div>
</div>

<div id="hint">System bereit.</div>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

<div class="buttons">
<button class="btn1" onclick="send('/api/order')">SEND</button>
<button class="btn2" onclick="send('/api/win')">+WIN</button>
<button class="btn3" onclick="send('/api/loss')">-LOSS</button>
<button class="btn4" onclick="send('/api/reset')">RESET</button>

<button class="btn1" onclick="send('/api/cooldown')">COOLDOWN</button>
<button class="btn2" onclick="send('/api/hardblock/on')">HB ON</button>
<button class="btn3" onclick="send('/api/hardblock/off')">HB OFF</button>
<button class="btn4" onclick="load()">REFRESH</button>
</div>

<div class="log">
<h3>Log</h3>
<div id="log"></div>
</div>

<script>
let chart;
let history=[];

function initChart(){
const ctx=document.getElementById('chart');
chart=new Chart(ctx,{
type:'line',
data:{labels:[],datasets:[{data:[],borderWidth:3}]},
options:{plugins:{legend:{display:false}}}
});
}

async function send(url){
await fetch(url,{method:'POST'});
load();
}

function colorStatus(g){
const el=document.getElementById('chipStatus');
el.className='chip';
if(g==='READY')el.classList.add('ready');
else if(g==='WARN')el.classList.add('warn');
else el.classList.add('blocked');
}

async function load(){
const r=await fetch('/api/status');
const d=await r.json();

document.getElementById('statusText').innerText=d.guard;
document.getElementById('statusSub').innerText=d.reasonLabel||d.guard;
document.getElementById('pnl').innerText='PnL: '+d.pnl.toFixed(2);

document.getElementById('orders').innerText=d.ordersToday+'/'+d.maxOrdersPerSession;
document.getElementById('queue').innerText=d.queueLength;
document.getElementById('cooldown').innerText=d.cooldownLeft+'s';
document.getElementById('hb').innerText=d.hardBlocked?'AN':'AUS';

document.getElementById('wins').innerText=d.totalWins;
document.getElementById('losses').innerText=d.totalLosses;

let wr=(d.totalWins+d.totalLosses)>0?(d.totalWins/(d.totalWins+d.totalLosses)*100).toFixed(1):0;
document.getElementById('winrate').innerText=wr+'%';

document.getElementById('streak').innerText='W'+d.winStreak+' / L'+d.lossStreak;

document.getElementById('chipStatus').innerText=d.guard;
document.getElementById('chipOrders').innerText=d.ordersToday+'/'+d.maxOrdersPerSession;
document.getElementById('chipCooldown').innerText=d.cooldownLeft+'s';
document.getElementById('chipHB').innerText=d.hardBlocked?'HB ON':'HB OFF';

colorStatus(d.guard);

history.push(d.pnl);
if(history.length>60)history.shift();

chart.data.labels=history.map((_,i)=>i);
chart.data.datasets[0].data=history;
chart.update();

const logDiv=document.getElementById('log');
logDiv.innerHTML='';
d.log.forEach(l=>{
const el=document.createElement('div');
el.className='log-entry';
el.innerText=l.type+' - '+l.msg;
logDiv.appendChild(el);
});
}

initChart();
load();
setInterval(load,2000);
</script>

</body>
</html>
