<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V19.5 HARD LIVE ⚡</title>
  <style>
    :root{
      --bg1:#03113f;
      --bg2:#081a5c;
      --card:#202d6d;
      --line:rgba(255,255,255,.08);
      --text:#f5f7ff;
      --muted:#b7bee7;
      --green:#9be49d;
      --red:#ef9b9b;
      --yellow:#ecd57c;
      --blue:#8fb3ff;
      --shadow:0 12px 30px rgba(0,0,0,.25);
      --safeBottom:env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 28%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      min-height:100vh;
    }

    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:18px 14px 220px;
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:900;
      margin:8px 0 18px;
      letter-spacing:.4px;
    }

    .card{
      background:rgba(32,45,109,.94);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
    }

    .hero{
      padding:26px 18px;
      text-align:center;
      margin-bottom:18px;
    }

    .guard{
      font-size:74px;
      font-weight:900;
      line-height:1;
      margin-top:4px;
    }

    .ready{color:var(--green)}
    .warn{color:var(--yellow)}
    .blocked{color:var(--red)}

    .pnl{
      font-size:68px;
      font-weight:900;
      line-height:1;
      margin-top:12px;
    }

    .pnl small{
      display:block;
      font-size:16px;
      color:var(--muted);
      font-weight:700;
      margin-top:10px;
    }

    .miniGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-bottom:18px;
    }

    .miniBox{
      padding:26px 20px;
      border-radius:26px;
      background:rgba(32,45,109,.94);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .miniLabel{
      font-size:17px;
      font-weight:900;
      margin-bottom:14px;
    }

    .miniValue{
      font-size:36px;
      line-height:1.05;
    }

    .ok{color:var(--green)}
    .fail{color:var(--red)}
    .mid{color:var(--yellow)}

    .actionBar{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-bottom:18px;
    }

    .actionBar.single{
      grid-template-columns:1fr;
    }

    button{
      border:none;
      border-radius:24px;
      min-height:78px;
      font-size:24px;
      font-weight:900;
      color:#fff;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease;
      box-shadow:var(--shadow);
    }

    button:active{transform:scale(.985)}
    button:disabled{opacity:.55;cursor:not-allowed}

    .btnBuy{background:linear-gradient(90deg,#9ad89b,#a8eaa8)}
    .btnSell{background:linear-gradient(90deg,#e8a6a6,#e0b0b0)}
    .btnWin{background:linear-gradient(90deg,#a3e2a4,#b2edb3)}
    .btnLoss{background:linear-gradient(90deg,#d9a0a0,#ddb0b0)}
    .btnReset{background:linear-gradient(90deg,#d9c66b,#ead98c)}
    .btnAuto{background:linear-gradient(90deg,#86a0ff,#98b1ff)}

    .logCard{
      margin-top:12px;
      margin-bottom:32px;
      padding:22px 20px 90px;
      min-height:260px;
    }

    .logTitle{
      font-size:20px;
      font-weight:900;
      margin-bottom:16px;
    }

    .log{
      max-height:360px;
      overflow:auto;
      padding-right:4px;
    }

    .entry{
      padding:8px 0;
      font-size:17px;
      line-height:1.4;
      color:#d9def7;
      border-bottom:1px solid rgba(255,255,255,.04);
    }

    .dock{
      position:fixed;
      left:14px;
      right:14px;
      bottom:10px;
      z-index:60;
      pointer-events:none;
    }

    .dockPanel{
      pointer-events:auto;
      background:rgba(34,45,110,.96);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 14px 34px rgba(0,0,0,.30);
      backdrop-filter:blur(10px);
    }

    .dockHandle{
      padding:16px 18px;
      font-size:18px;
      color:#dfe5ff;
      min-height:58px;
      display:flex;
      align-items:center;
    }

    .toastWrap{
      position:fixed;
      left:0;
      right:0;
      top:18px;
      display:flex;
      justify-content:center;
      z-index:100;
      pointer-events:none;
    }

    .toast{
      background:rgba(15,20,45,.92);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      padding:12px 16px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      box-shadow:0 12px 24px rgba(0,0,0,.24);
      opacity:0;
      transform:translateY(-8px);
      transition:.18s ease;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    @media (max-width:760px){
      .wrap{padding:14px 12px 220px}
      .title{font-size:25px}
      .guard{font-size:72px}
      .pnl{font-size:64px}
      .miniGrid{gap:12px}
      .miniBox{padding:22px 18px}
      .miniLabel{font-size:15px}
      .miniValue{font-size:28px}
      .actionBar{gap:12px}
      button{min-height:66px;font-size:22px}
      .logCard{padding:20px 18px 86px}
    }
  </style>
</head>
<body>
  <div class="toastWrap">
    <div id="toast" class="toast">SYNC</div>
  </div>

  <div class="wrap">
    <div class="title">V19.5 HARD LIVE ⚡</div>

    <div class="card hero">
      <div id="guard" class="guard ready">READY</div>
      <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
    </div>

    <div class="miniGrid">
      <div class="miniBox">
        <div class="miniLabel">STATUS</div>
        <div id="healthStatus" class="miniValue mid">CHECK</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">BUY POST</div>
        <div id="healthBuy" class="miniValue fail">FAIL</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">SELL POST</div>
        <div id="healthSell" class="miniValue fail">FAIL</div>
      </div>
      <div class="miniBox">
        <div class="miniLabel">CONF</div>
        <div id="conf" class="miniValue mid">62%</div>
      </div>
    </div>

    <div class="actionBar">
      <button id="btnBuy" class="btnBuy" onclick="performAction('/api/buy','BUY gesendet')">BUY</button>
      <button id="btnSell" class="btnSell" onclick="performAction('/api/sell','SELL gesendet')">SELL</button>
      <button id="btnWin" class="btnWin" onclick="performAction('/api/win','WIN verbucht')">WIN</button>
      <button id="btnLoss" class="btnLoss" onclick="performAction('/api/loss','LOSS verbucht')">LOSS</button>
    </div>

    <div class="actionBar single">
      <button id="btnReset" class="btnReset" onclick="performAction('/api/reset','System reset')">RESET</button>
    </div>

    <div class="logCard card">
      <div class="logTitle">LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <div class="dock">
    <div class="dockPanel">
      <div class="dockHandle">Quick Dock</div>
    </div>
  </div>

  <script>
    const state = {
      health: {
        status: false,
        buy: false,
        sell: false
      }
    };

    function setText(id, value){
      const el = document.getElementById(id);
      if(el) el.textContent = value;
    }

    function setClass(el, cls){
      el.className = cls;
    }

    function formatTime(ts){
      try{
        return new Date(ts).toLocaleTimeString('de-DE');
      }catch{
        return '--:--:--';
      }
    }

    function toast(msg){
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        el.classList.remove('show');
      }, 1500);
    }

    async function postJSON(url, body = {}){
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = {}; }

      if (!res.ok) {
        const err = new Error(data.message || 'Request failed');
        err.data = data;
        throw err;
      }

      return data;
    }

    async function getStatus(){
      const res = await fetch('/api/status');
      if(!res.ok) throw new Error('status failed');
      return res.json();
    }

    function renderHealth(){
      const hs = document.getElementById('healthStatus');
      const hb = document.getElementById('healthBuy');
      const hsell = document.getElementById('healthSell');

      hs.textContent = state.health.status ? 'OK' : 'CHECK';
      hb.textContent = state.health.buy ? 'OK' : 'FAIL';
      hsell.textContent = state.health.sell ? 'OK' : 'FAIL';

      hs.className = 'miniValue ' + (state.health.status ? 'ok' : 'mid');
      hb.className = 'miniValue ' + (state.health.buy ? 'ok' : 'fail');
      hsell.className = 'miniValue ' + (state.health.sell ? 'ok' : 'fail');
    }

    function renderLog(log){
      const el = document.getElementById('log');
      el.innerHTML = (log || []).map(item => {
        return `<div class="entry">${formatTime(item.ts)} - ${(item.type || '').toLowerCase()} OK</div>`;
      }).join('');
      el.scrollTop = 0;
    }

    function renderStatus(data){
      const guardEl = document.getElementById('guard');

      setText('guard', data.guard || 'READY');
      setText('pnl', Number(data.pnl || 0).toFixed(2));
      setText('conf', `${Number(data.confidence || 0)}%`);

      let cls = 'guard ready';
      if ((data.guard || '') === 'WARN') cls = 'guard warn';
      if ((data.guard || '') === 'BLOCKED') cls = 'guard blocked';
      guardEl.className = cls;

      renderLog(data.log || []);
    }

    async function runHealthChecks(){
      state.health.status = false;
      state.health.buy = false;
      state.health.sell = false;
      renderHealth();

      try{
        await getStatus();
        state.health.status = true;
      }catch{}

      try{
        await postJSON('/api/buy', { dryRun: true });
        state.health.buy = true;
      }catch{}

      try{
        await postJSON('/api/sell', { dryRun: true });
        state.health.sell = true;
      }catch{}

      renderHealth();

      try{
        const data = await getStatus();
        renderStatus(data);
      }catch(e){
        console.error(e);
      }
    }

    function setButtonsDisabled(disabled){
      document.querySelectorAll('button').forEach(btn => btn.disabled = disabled);
    }

    async function performAction(url, successMsg){
      setButtonsDisabled(true);

      try{
        const data = await postJSON(url, {});
        renderStatus(data.status || data);
        toast(successMsg || 'OK');

        if (url === '/api/reset') {
          setTimeout(async () => {
            await runHealthChecks();
          }, 300);
        }
      }catch(e){
        console.error(e);
        if (e.data && e.data.status) {
          renderStatus(e.data.status);
        }
        toast(e.message || 'Fehler');
      }

      setButtonsDisabled(false);
    }

    async function boot(){
      await runHealthChecks();

      setInterval(async () => {
        try{
          const data = await getStatus();
          renderStatus(data);
        }catch(e){
          console.error(e);
        }
      }, 2000);
    }

    boot();
  </script>
</body>
</html>
