<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V16.6 ELITE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#08142f;
  --bg2:#0d1d47;
  --panel:#747dc2;
  --panel2:#8991d4;
  --box:rgba(143,151,212,.42);
  --chip:#1b2b5f;
  --text:#fff;
  --muted:rgba(255,255,255,.82);

  --green:#72d87f;
  --green2:#a9e89f;
  --yellow:#f1cb63;
  --yellow2:#ffe18c;
  --red:#e29d8f;
  --red2:#f1b5aa;
  --purple:#9184ea;
  --blue:#818cf1;
  --gold:#c1a55d;

  --btnBlue:#838df1;
  --btnGreen:#a7c37f;
  --btnRed:#c99488;
  --btnGold:#bfa45c;
  --btnPurple:#9286e9;

  --shadow:0 20px 48px rgba(0,0,0,.24);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top, rgba(255,255,255,.06), transparent 22%),
    linear-gradient(180deg,var(--bg),var(--bg2));
}

body{min-height:100vh}

.wrap{
  max-width:860px;
  margin:0 auto;
  padding:14px 14px 34px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:30;
  padding:16px 0 12px;
  background:linear-gradient(180deg, rgba(8,20,47,.97), rgba(8,20,47,.84));
  backdrop-filter:blur(12px);
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  letter-spacing:.5px;
  margin-bottom:12px;
  opacity:.96;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.chip{
  min-width:86px;
  text-align:center;
  padding:10px 12px;
  border-radius:14px;
  background:var(--chip);
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
  transition:.2s ease;
}

.chip.ready{background:var(--green)}
.chip.warn{background:var(--yellow); color:#3a2f09}
.chip.blocked{background:var(--red)}
.chip.cooldown{background:var(--purple)}
.chip.locked{background:#dca596}
.chip.hbon{background:#8fa96d}

.hero{
  margin-top:18px;
  border-radius:30px;
  padding:24px 16px 20px;
  background:linear-gradient(180deg, rgba(126,136,201,.98), rgba(112,122,188,.98));
  box-shadow:var(--shadow);
  transition:box-shadow .25s ease, transform .18s ease;
}

.hero.readyGlow{
  box-shadow:0 0 40px rgba(114,216,127,.18), var(--shadow);
}
.hero.warnGlow{
  box-shadow:0 0 40px rgba(241,203,99,.18), var(--shadow);
}
.hero.blockGlow{
  box-shadow:0 0 40px rgba(226,157,143,.20), var(--shadow);
}
.hero.lockGlow{
  box-shadow:0 0 42px rgba(220,165,150,.18), var(--shadow);
}

.banner{
  text-align:center;
  font-size:72px;
  line-height:.94;
  font-weight:900;
  letter-spacing:1px;
  margin:0 0 8px;
  transition:transform .16s ease;
}
.banner.ready{color:var(--green2)}
.banner.warn{color:var(--yellow2)}
.banner.blocked{color:var(--red2)}
.banner.cooldown{color:#d3ccff}
.banner.locked{color:#f6f7ff}
.banner.pulse{
  animation:pulseText 1.2s ease-in-out infinite;
}

@keyframes pulseText{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.02)}
}

.sub{
  text-align:center;
  font-size:24px;
  font-weight:900;
  margin-bottom:14px;
}
.sub.ready{color:var(--green2)}
.sub.warn{color:var(--yellow2)}
.sub.blocked{color:var(--red2)}
.sub.cooldown{color:#d3ccff}
.sub.locked{color:#f5f6ff}

.pnl{
  text-align:center;
  font-size:58px;
  font-weight:900;
  margin:8px 0 18px;
  transition:transform .16s ease;
}
.pnl.bumpUp{transform:scale(1.04)}
.pnl.bumpDown{transform:scale(.97)}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.box{
  background:var(--box);
  border-radius:20px;
  padding:16px 12px;
  text-align:center;
}

.label{
  font-size:18px;
  color:var(--muted);
  margin-bottom:8px;
}

.value{
  font-size:24px;
  font-weight:900;
}

.hint{
  text-align:center;
  font-size:18px;
  margin-top:18px;
  color:rgba(255,255,255,.95);
}

.chartCard{
  margin-top:18px;
  border-radius:24px;
  padding:10px 6px 0;
  background:rgba(7,16,44,.14);
}

.chartHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 8px 10px;
}

.chartTitle{
  font-size:20px;
  font-weight:900;
}

.chartSub{
  font-size:13px;
  color:rgba(255,255,255,.7);
}

.chartWrap{
  position:relative;
  height:330px;
}

.controls{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

button{
  border:none;
  border-radius:20px;
  padding:19px 14px;
  font-size:20px;
  font-weight:900;
  color:#fff;
  box-shadow:0 12px 26px rgba(0,0,0,.16);
  transition:transform .08s ease, opacity .18s ease, filter .18s ease;
}
button:active{transform:scale(.98)}
button:disabled{opacity:.45; filter:saturate(.55)}

.btnSend{background:var(--btnBlue)}
.btnWin{background:var(--btnGreen)}
.btnLoss{background:var(--btnRed)}
.btnReset{background:var(--btnGold)}
.btnCooldown{background:var(--btnPurple)}
.btnHbOn{background:#96b974}
.btnHbOff{background:#bb8f85}
.btnRefresh{background:#bda66a}

.logWrap{
  margin-top:20px;
}

.logHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.logTitle{
  font-size:28px;
  font-weight:900;
}

.logButtons{
  display:flex;
  gap:10px;
}

.smallBtn{
  width:auto;
  min-width:100px;
  padding:13px 14px;
  font-size:15px;
  border-radius:16px;
  background:#97a0e6;
}

.log{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.entry{
  border-radius:18px;
  padding:14px 15px 12px;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.entry.win{background:rgba(121,211,178,.34)}
.entry.loss{background:rgba(226,157,143,.34)}
.entry.exec{background:rgba(102,175,255,.30)}
.entry.queue{background:rgba(255,255,255,.14)}
.entry.block{background:rgba(241,203,99,.24)}
.entry.default{background:rgba(119,128,191,.96)}

.entryType{
  font-size:17px;
  font-weight:900;
  margin-bottom:5px;
}
.entryMsg{
  font-size:17px;
  line-height:1.3;
}
.entryTime{
  margin-top:7px;
  font-size:12px;
  opacity:.76;
}

.toast{
  position:fixed;
  top:88px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  min-width:220px;
  max-width:84vw;
  text-align:center;
  padding:14px 18px;
  border-radius:18px;
  background:#63cb73;
  color:#fff;
  font-size:17px;
  font-weight:900;
  box-shadow:var(--shadow);
  display:none;
}
.toast.err{background:#d78776}

.footerSpace{height:8px}

@media (max-width:540px){
  .title{font-size:23px}
  .banner{font-size:56px}
  .sub{font-size:21px}
  .pnl{font-size:46px}
  .value{font-size:22px}
  button{font-size:18px;padding:18px 12px}
  .chartWrap{height:290px}
}
</style>
</head>
<body>
<div id="toast" class="toast">OK</div>

<div class="wrap">
  <div class="topbar">
    <div class="title">V16.6 ELITE</div>
    <div class="chips">
      <div id="chipStatus" class="chip ready">READY</div>
      <div id="chipOrders" class="chip">0/10</div>
      <div id="chipCooldown" class="chip">0s</div>
      <div id="chipHB" class="chip">HB OFF</div>
    </div>
  </div>

  <div id="hero" class="hero readyGlow">
    <div id="guard" class="banner ready">READY</div>
    <div id="sub" class="sub ready">SYSTEM READY</div>
    <div id="pnl" class="pnl">PnL: 0.00</div>

    <div class="stats">
      <div class="box">
        <div class="label">Orders</div>
        <div id="orders" class="value">0/10</div>
      </div>
      <div class="box">
        <div class="label">Queue</div>
        <div id="queue" class="value">0</div>
      </div>

      <div class="box">
        <div class="label">Cooldown</div>
        <div id="cooldown" class="value">0s</div>
      </div>
      <div class="box">
        <div class="label">HardBlock</div>
        <div id="hb" class="value">AUS</div>
      </div>

      <div class="box">
        <div class="label">Wins</div>
        <div id="wins" class="value">0</div>
      </div>
      <div class="box">
        <div class="label">Losses</div>
        <div id="losses" class="value">0</div>
      </div>

      <div class="box">
        <div class="label">Winrate</div>
        <div id="winrate" class="value">0.0%</div>
      </div>
      <div class="box">
        <div class="label">Streak</div>
        <div id="streak" class="value">W0 / L0</div>
      </div>
    </div>

    <div id="hint" class="hint">System bereit.</div>
  </div>

  <div class="chartCard">
    <div class="chartHead">
      <div class="chartTitle">PnL Chart</div>
      <div class="chartSub">manuell · mit Sound · nur bei echter Änderung</div>
    </div>
    <div class="chartWrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="controls">
    <button id="btnSend" class="btnSend" onclick="act('/api/order','Order angenommen')">SEND</button>
    <button class="btnWin" onclick="act('/api/win','Win gebucht')">+WIN</button>
    <button class="btnLoss" onclick="act('/api/loss','Loss gebucht')">-LOSS</button>
    <button class="btnReset" onclick="act('/api/reset','Reset ausgeführt')">RESET</button>

    <button class="btnCooldown" onclick="act('/api/cooldown','Cooldown gestartet')">COOLDOWN</button>
    <button class="btnHbOn" onclick="act('/api/hardblock/on','HardBlock aktiviert')">HB ON</button>
    <button class="btnHbOff" onclick="act('/api/hardblock/off','HardBlock deaktiviert')">HB OFF</button>
    <button class="btnRefresh" onclick="loadStatus(true)">REFRESH</button>
  </div>

  <div class="logWrap">
    <div class="logHead">
      <div class="logTitle">Log</div>
      <div class="logButtons">
        <button class="smallBtn" onclick="clearChart()">Chart Reset</button>
        <button class="smallBtn" onclick="clearLogLocal()">Log Clear</button>
      </div>
    </div>
    <div id="log" class="log"></div>
  </div>

  <div class="footerSpace"></div>
</div>

<script>
let chart;
let pnlHistory = [];
let lastPnl = null;
let lastGuard = null;
let audioCtx = null;

const STORAGE_KEY = 'qt_v166_elite_history';

function ensureAudio(){
  if(!audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) audioCtx = new Ctx();
  }
  if(audioCtx && audioCtx.state === 'suspended'){
    audioCtx.resume().catch(()=>{});
  }
}

function beep(freq=700, duration=0.12, type='sine', volume=0.03){
  try{
    ensureAudio();
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

function soundWin(){
  beep(880,0.07,'sine',0.04);
  setTimeout(()=>beep(1180,0.10,'sine',0.035),70);
}

function soundLoss(){
  beep(320,0.12,'triangle',0.045);
  setTimeout(()=>beep(220,0.16,'triangle',0.04),90);
}

function soundLock(){
  beep(500,0.08,'square',0.035);
  setTimeout(()=>beep(420,0.10,'square',0.03),80);
}

function soundReady(){
  beep(760,0.08,'sine',0.03);
}

function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = isErr ? 'toast err' : 'toast';
  t.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.style.display='none'; }, 1700);
}

function saveHistory(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pnlHistory.slice(-80)));
  }catch(e){}
}

function loadHistory(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr)) pnlHistory = arr;
    }
  }catch(e){}
}

function clearChart(){
  pnlHistory = [];
  saveHistory();
  if(chart){
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();
  }
  showToast('Chart reset');
}

function clearLogLocal(){
  document.getElementById('log').innerHTML = '';
  showToast('Log lokal geleert');
}

function safeNum(v, fallback=0){
  return (typeof v === 'number' && !Number.isNaN(v)) ? v : fallback;
}

function guardClass(g){
  if(g === 'READY') return 'ready';
  if(g === 'WARN') return 'warn';
  if(g === 'COOLDOWN') return 'cooldown';
  if(g === 'LOCKED') return 'locked';
  if(g === 'SESSION_LIMIT') return 'warn';
  return 'blocked';
}

function hintText(reason){
  if(reason === 'SYSTEM_READY') return 'System bereit.';
  if(reason === 'QUEUE_LOCK') return 'Eine Order läuft bereits oder wartet in der Queue.';
  if(reason === 'COOLDOWN_TIMER') return 'Cooldown aktiv. Bitte warten.';
  if(reason === 'HARD_LOCK') return 'Trading bleibt gesperrt bis Reset oder HB OFF.';
  if(reason === 'PNL_LIMIT') return 'PnL-Limit unterschritten.';
  if(reason === 'WARN_LIMIT') return 'Warnbereich erreicht.';
  if(reason === 'SESSION_LIMIT') return 'Tageslimit erreicht.';
  return 'System bereit.';
}

function updateStyles(guard, pnl){
  const hero = document.getElementById('hero');
  const banner = document.getElementById('guard');
  const sub = document.getElementById('sub');
  const chipStatus = document.getElementById('chipStatus');

  hero.classList.remove('readyGlow','warnGlow','blockGlow','lockGlow');
  banner.className = 'banner ' + guardClass(guard);
  sub.className = 'sub ' + guardClass(guard);
  chipStatus.className = 'chip ' + guardClass(guard);

  if(guard === 'READY'){
    hero.classList.add(pnl >= 0 ? 'readyGlow' : 'blockGlow');
  }else if(guard === 'WARN' || guard === 'SESSION_LIMIT'){
    hero.classList.add('warnGlow');
  }else if(guard === 'LOCKED'){
    hero.classList.add('lockGlow');
    banner.classList.add('pulse');
  }else{
    hero.classList.add('blockGlow');
    banner.classList.add('pulse');
  }

  if(guard !== 'LOCKED' && guard !== 'BLOCKED'){
    banner.classList.remove('pulse');
  }
}

function animatePnlChange(newPnl){
  const pnlEl = document.getElementById('pnl');
  pnlEl.classList.remove('bumpUp','bumpDown');
  void pnlEl.offsetWidth;
  if(lastPnl === null) return;
  if(newPnl > lastPnl){
    pnlEl.classList.add('bumpUp');
    setTimeout(()=>pnlEl.classList.remove('bumpUp'),180);
  }else if(newPnl < lastPnl){
    pnlEl.classList.add('bumpDown');
    setTimeout(()=>pnlEl.classList.remove('bumpDown'),180);
  }
}

function makeGradient(ctx, area){
  const gradient = ctx.createLinearGradient(0, area.top, 0, area.bottom);
  gradient.addColorStop(0, 'rgba(121,211,178,1)');
  gradient.addColorStop(.5, 'rgba(103,175,255,.92)');
  gradient.addColorStop(1, 'rgba(226,157,143,.95)');
  return gradient;
}

function initChart(){
  const ctx = document.getElementById('chart').getContext('2d');

  chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:[],
      datasets:[{
        data:[],
        borderWidth:5,
        tension:.34,
        fill:false,
        pointRadius:5,
        pointHoverRadius:6,
        pointBorderWidth:2,
        borderColor:'#6fb7ff',
        pointBackgroundColor:(context)=>{
          const i = context.dataIndex;
          const v = context.dataset.data[i] ?? 0;
          return v >= 0 ? '#91df8a' : '#e4a193';
        },
        pointBorderColor:(context)=>{
          const i = context.dataIndex;
          const v = context.dataset.data[i] ?? 0;
          return v >= 0 ? '#91df8a' : '#e4a193';
        }
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:260,easing:'easeOutCubic'},
      plugins:{legend:{display:false}},
      scales:{
        x:{
          ticks:{color:'rgba(255,255,255,.42)'},
          grid:{color:'rgba(255,255,255,.04)'}
        },
        y:{
          ticks:{color:'rgba(255,255,255,.42)'},
          grid:{color:'rgba(255,255,255,.05)'}
        }
      }
    },
    plugins:[{
      id:'dynamicGradient',
      beforeDatasetsDraw(chartInstance){
        const {ctx, chartArea} = chartInstance;
        if(!chartArea) return;
        chartInstance.data.datasets[0].borderColor = makeGradient(ctx, chartArea);
      }
    }]
  });

  if(pnlHistory.length){
    chart.data.labels = pnlHistory.map((_,i)=>i);
    chart.data.datasets[0].data = pnlHistory;
    chart.update();
  }
}

function logClass(type=''){
  const t = type.toUpperCase();
  if(t.includes('WIN')) return 'win';
  if(t.includes('LOSS')) return 'loss';
  if(t.includes('EXECUTED') || t.includes('PROCESSING')) return 'exec';
  if(t.includes('QUEUED')) return 'queue';
  if(t.includes('BLOCK') || t.includes('COOLDOWN') || t.includes('SESSION')) return 'block';
  return 'default';
}

function renderLog(logList){
  const log = document.getElementById('log');
  log.innerHTML = '';

  if(!Array.isArray(logList) || !logList.length){
    const row = document.createElement('div');
    row.className = 'entry default';
    row.innerHTML = '<div class="entryMsg">Noch kein Log.</div>';
    log.appendChild(row);
    return;
  }

  logList.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'entry ' + logClass(item.type || '');
    row.innerHTML =
      '<div class="entryType">' + (item.type || 'INFO') + '</div>' +
      '<div class="entryMsg">' + (item.msg || '') + '</div>' +
      '<div class="entryTime">' + (item.ts || '') + '</div>';
    log.appendChild(row);
  });
}

function playStateSound(newGuard, newPnl){
  if(lastGuard === null && lastPnl === null) return;

  if(lastPnl !== null){
    if(newPnl > lastPnl) soundWin();
    else if(newPnl < lastPnl) soundLoss();
  }

  if(lastGuard !== newGuard){
    if(newGuard === 'LOCKED' || newGuard === 'BLOCKED') soundLock();
    if(newGuard === 'READY' && lastGuard !== 'READY') soundReady();
  }
}

function renderStatus(d){
  const pnl = safeNum(d.pnl, 0);
  const ordersToday = safeNum(d.ordersToday, 0);
  const maxOrders = safeNum(d.maxOrdersPerSession, 10);
  const queueLength = safeNum(d.queueLength, 0);
  const cooldownLeft = safeNum(d.cooldownLeft, 0);
  const hardBlocked = !!d.hardBlocked;
  const wins = safeNum(d.totalWins, 0);
  const losses = safeNum(d.totalLosses, 0);
  const winStreak = safeNum(d.winStreak, 0);
  const lossStreak = safeNum(d.lossStreak, 0);
  const winrate = (wins + losses) > 0 ? ((wins / (wins + losses)) * 100).toFixed(1) : '0.0';
  const guard = d.guard || 'READY';
  const reasonLabel = d.reasonLabel || guard;

  playStateSound(guard, pnl);
  updateStyles(guard, pnl);

  document.getElementById('guard').innerText = guard;
  document.getElementById('sub').innerText = reasonLabel;
  document.getElementById('pnl').innerText = 'PnL: ' + pnl.toFixed(2);

  document.getElementById('orders').innerText = ordersToday + '/' + maxOrders;
  document.getElementById('queue').innerText = queueLength;
  document.getElementById('cooldown').innerText = cooldownLeft + 's';
  document.getElementById('hb').innerText = hardBlocked ? 'AN' : 'AUS';
  document.getElementById('wins').innerText = wins;
  document.getElementById('losses').innerText = losses;
  document.getElementById('winrate').innerText = winrate + '%';
  document.getElementById('streak').innerText = 'W' + winStreak + ' / L' + lossStreak;
  document.getElementById('hint').innerText = hintText(d.reason);

  document.getElementById('chipStatus').innerText = guard;
  document.getElementById('chipOrders').innerText = ordersToday + '/' + maxOrders;
  document.getElementById('chipCooldown').innerText = cooldownLeft + 's';
  document.getElementById('chipHB').innerText = hardBlocked ? 'HB ON' : 'HB OFF';

  const cdChip = document.getElementById('chipCooldown');
  cdChip.className = cooldownLeft > 0 ? 'chip cooldown' : 'chip';

  const hbChip = document.getElementById('chipHB');
  hbChip.className = hardBlocked ? 'chip hbon' : 'chip';

  const sendDisabled = ['BLOCKED','COOLDOWN','LOCKED','SESSION_LIMIT'].includes(guard);
  document.getElementById('btnSend').disabled = sendDisabled;

  animatePnlChange(pnl);

  if(pnlHistory.length === 0 || pnlHistory[pnlHistory.length - 1] !== pnl){
    pnlHistory.push(pnl);
    if(pnlHistory.length > 80) pnlHistory.shift();
    saveHistory();
    chart.data.labels = pnlHistory.map((_,i)=>i);
    chart.data.datasets[0].data = pnlHistory;
    chart.update();
  }

  renderLog(d.log || []);

  lastPnl = pnl;
  lastGuard = guard;
}

async function loadStatus(withToast=false){
  try{
    const res = await fetch('/api/status');
    const d = await res.json();
    renderStatus(d);
    if(withToast) showToast('Status geladen');
  }catch(e){
    showToast('Status Fehler', true);
  }
}

async function act(url, okText){
  try{
    ensureAudio();
    const res = await fetch(url, { method:'POST' });
    let data = {};
    try{ data = await res.json(); }catch(e){}

    await loadStatus(false);

    if(res.ok){
      showToast(okText || 'OK');
    }else{
      showToast((data && data.message) ? data.message : 'Fehler', true);
    }
  }catch(e){
    showToast('Netzwerkfehler', true);
  }
}

document.body.addEventListener('touchstart', ensureAudio, { once:true });
document.body.addEventListener('click', ensureAudio, { once:true });

loadHistory();
initChart();
loadStatus(false);
</script>
</body>
</html>
