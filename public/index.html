<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V19.7 HARD LIVE</title>
  <style>
    :root{
      --bg1:#03103f;
      --bg2:#071a63;
      --card:#253072;
      --card2:#2b367d;
      --line:rgba(255,255,255,.08);
      --text:#f4f6ff;
      --muted:#b8c1ea;
      --green:#a5e39c;
      --red:#f0a5a5;
      --yellow:#e6d27b;
      --cyan:#9adcf2;
      --dockH:88px;
      --safeBottom:env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(110,125,255,.18), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      min-height:100vh;
    }

    .wrap{
      width:min(980px,100%);
      margin:0 auto;
      padding:18px 16px calc(var(--dockH) + var(--safeBottom) + 42px);
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:900;
      letter-spacing:.5px;
      margin:14px 0 24px;
    }

    .hero{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:32px;
      padding:18px;
      box-shadow:0 14px 40px rgba(0,0,0,.25);
    }

    .heroInner{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:28px;
      padding:24px 14px 18px;
      text-align:center;
    }

    .guard{
      text-align:center;
      font-weight:900;
      line-height:1;
      margin:0 0 12px;
      color:var(--green);
      font-size:clamp(34px, 10vw, 84px);
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .guard.warn{color:var(--yellow)}
    .guard.blocked{color:var(--red)}
    .guard.locked{color:var(--cyan)}
    .guard.flat{color:var(--text)}

    .pnl{
      text-align:center;
      font-size:clamp(36px, 10vw, 82px);
      font-weight:900;
      line-height:1;
    }

    .pnl small{
      display:block;
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .card{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
    }

    .miniTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:18px;
      text-transform:uppercase;
    }

    .miniValue{
      font-size:28px;
      font-weight:900;
      color:var(--green);
    }

    .miniValue.red{color:var(--red)}
    .miniValue.yellow{color:var(--yellow)}
    .miniValue.white{color:var(--text)}

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .actions .full{
      grid-column:1 / -1;
    }

    button{
      border:none;
      outline:none;
      border-radius:24px;
      min-height:76px;
      font-size:24px;
      font-weight:900;
      color:#fff;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    button:active{transform:scale(.985)}

    .btnBuy{background:linear-gradient(90deg,#9ad89b,#bae9af)}
    .btnSell{background:linear-gradient(90deg,#e5b0b0,#dfbcbc)}
    .btnWin{background:linear-gradient(90deg,#9ad89b,#bae9af)}
    .btnLoss{background:linear-gradient(90deg,#dca0a0,#dfbcbc)}
    .btnReset{background:linear-gradient(90deg,#dccb75,#e6d891)}
    .btnAuto{background:linear-gradient(90deg,#95a8ff,#aebcff)}
    .btnOff{background:linear-gradient(90deg,#7e85ad,#9097bd)}

    .subGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .aiCard{
      margin-top:18px;
    }

    .scoreHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .scoreTitle{
      font-size:24px;
      font-weight:900;
      text-transform:uppercase;
    }

    .scoreValue{
      font-size:60px;
      font-weight:900;
      color:var(--cyan);
      line-height:1;
    }

    .barTrack{
      height:16px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      overflow:hidden;
      margin-bottom:18px;
    }

    .barFill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#e9a8a8,#dfd37f,#a8dfa6,#8fd6f1);
      transition:width .25s ease;
    }

    .factorGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .factor{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
    }

    .factorTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .factorName{
      font-size:14px;
      color:var(--muted);
      font-weight:800;
    }

    .factorVal{
      font-size:18px;
      font-weight:900;
    }

    .ok{color:var(--green)}
    .mid{color:var(--yellow)}
    .bad{color:var(--red)}

    .log{
      margin-top:18px;
      max-height:420px;
      overflow:auto;
      padding-right:4px;
    }

    .entry{
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:18px;
      color:var(--muted);
      line-height:1.35;
    }

    .entry:last-child{border-bottom:none}

    .dock{
      position:fixed;
      left:16px;
      right:16px;
      bottom:calc(var(--safeBottom) + 10px);
      z-index:70;
      pointer-events:none;
    }

    .dockPanel{
      pointer-events:auto;
      background:linear-gradient(180deg,rgba(41,56,130,.95),rgba(36,51,120,.93));
      border:1px solid rgba(255,255,255,.10);
      border-radius:26px;
      backdrop-filter:blur(10px);
      box-shadow:0 14px 36px rgba(0,0,0,.28);
      overflow:hidden;
    }

    .dockHandle{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-height:72px;
      padding:0 18px;
      font-size:22px;
      color:#fff;
      font-weight:500;
    }

    @media (max-width:760px){
      .wrap{padding:14px 14px calc(var(--dockH) + var(--safeBottom) + 40px)}
      .title{font-size:24px}
      .grid2,.actions,.subGrid,.factorGrid{grid-template-columns:1fr 1fr}
      button{
        min-height:72px;
        font-size:22px;
      }
      .scoreValue{font-size:50px}
      .scoreTitle{font-size:20px}
      .miniTitle{font-size:16px}
      .miniValue{font-size:24px}
      .entry{font-size:16px}
    }

    @media (max-width:520px){
      .factorGrid{grid-template-columns:1fr 1fr}
      .guard{
        font-size:clamp(32px, 12vw, 72px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">V19.7 HARD LIVE ⚡</div>

    <div class="hero">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="miniTitle">STATUS</div>
        <div id="healthStatus" class="miniValue">CHECK</div>
      </div>

      <div class="card">
        <div class="miniTitle">BUY POST</div>
        <div id="healthBuy" class="miniValue">CHECK</div>
      </div>

      <div class="card">
        <div class="miniTitle">SELL POST</div>
        <div id="healthSell" class="miniValue">CHECK</div>
      </div>

      <div class="card">
        <div class="miniTitle">CONF</div>
        <div id="conf" class="miniValue yellow">62%</div>
      </div>
    </div>

    <div class="actions">
      <button class="btnBuy" onclick="performAction('/api/buy')">BUY</button>
      <button class="btnSell" onclick="performAction('/api/sell')">SELL</button>
      <button class="btnWin" onclick="performAction('/api/win')">WIN</button>
      <button class="btnLoss" onclick="performAction('/api/loss')">LOSS</button>
      <button class="btnReset full" onclick="performAction('/api/reset')">RESET</button>
    </div>

    <div class="actions">
      <button class="btnAuto" onclick="performAction('/api/auto/on')">AUTO ON</button>
      <button class="btnOff" onclick="performAction('/api/auto/off')">AUTO OFF</button>
    </div>

    <div class="subGrid">
      <div class="card">
        <div class="miniTitle">QUEUE</div>
        <div id="queueBox" class="miniValue white">0</div>
      </div>

      <div class="card">
        <div class="miniTitle">PROCESSING</div>
        <div id="processingBox" class="miniValue white">OFF</div>
      </div>

      <div class="card">
        <div class="miniTitle">AUTO</div>
        <div id="autoBox" class="miniValue white">OFF</div>
      </div>

      <div class="card">
        <div class="miniTitle">TRIGGER</div>
        <div id="triggerBox" class="miniValue white">80</div>
      </div>
    </div>

    <div class="card aiCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreValue" class="scoreValue">82</div>
      </div>

      <div class="barTrack">
        <div id="scoreBar" class="barFill" style="width:82%"></div>
      </div>

      <div class="factorGrid">
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Trend</div>
            <div class="factorVal mid">72.3</div>
          </div>
        </div>

        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Volume</div>
            <div class="factorVal mid">65.5</div>
          </div>
        </div>

        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Structure</div>
            <div class="factorVal ok">80.1</div>
          </div>
        </div>

        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Volatility</div>
            <div class="factorVal bad">51.2</div>
          </div>
        </div>

        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Liquidity</div>
            <div class="factorVal ok">81.9</div>
          </div>
        </div>

        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Session</div>
            <div class="factorVal mid">68.0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="miniTitle">LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <div class="dock">
    <div class="dockPanel">
      <div class="dockHandle">Quick Dock</div>
    </div>
  </div>

  <script>
    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function guardClass(guard) {
      if (guard === 'READY') return 'guard ready';
      if (guard === 'WARN') return 'guard warn';
      if (guard === 'LOCKED') return 'guard locked';
      if (guard === 'COOLDOWN') return 'guard warn';
      if (guard === 'SESSION_LIMIT') return 'guard warn';
      if (guard === 'BLOCKED') return 'guard blocked';
      return 'guard flat';
    }

    async function postJSON(url, body = {}) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      return { ok: res.ok, data };
    }

    async function getStatus() {
      const res = await fetch('/api/status');
      return await res.json();
    }

    function renderLog(items) {
      const box = document.getElementById('log');
      if (!box) return;

      if (!items || !items.length) {
        box.innerHTML = '<div class="entry">Keine Einträge</div>';
        return;
      }

      box.innerHTML = items.map(item => {
        const time = new Date(item.ts).toLocaleTimeString('de-DE');
        return `<div class="entry">${time} - ${item.type} ${item.msg}</div>`;
      }).join('');
    }

    function renderStatus(data) {
      const guardEl = document.getElementById('guard');
      if (guardEl) {
        guardEl.className = guardClass(data.guard);
        guardEl.textContent = data.guard;
      }

      setText('pnl', Number(data.pnl || 0).toFixed(2));
      document.getElementById('pnl').innerHTML = `${Number(data.pnl || 0).toFixed(2)}<small>Net PnL</small>`;

      setText('conf', '62%');
      setText('queueBox', String(data.queueLength || 0));
      setText('autoBox', data.autoEnabled ? 'ON' : 'OFF');
      setText('triggerBox', '80');

      // processing cleaner
      let procLabel = 'OFF';
      if (data.processing && data.queueLength > 0) procLabel = 'ON';
      else if (data.processing) procLabel = 'LAST';
      setText('processingBox', procLabel);

      renderLog(data.log || []);
    }

    async function runHealthChecks() {
      // STATUS
      try {
        const data = await getStatus();
        renderStatus(data);
        const el = document.getElementById('healthStatus');
        el.textContent = 'OK';
        el.className = 'miniValue';
      } catch (e) {
        const el = document.getElementById('healthStatus');
        el.textContent = 'FAIL';
        el.className = 'miniValue red';
      }

      // BUY
      try {
        const r = await postJSON('/api/buy', { dryRun: true });
        const ok = !!(r && r.data && r.data.status);
        const el = document.getElementById('healthBuy');
        el.textContent = ok ? 'OK' : 'FAIL';
        el.className = ok ? 'miniValue' : 'miniValue red';
      } catch (e) {
        const el = document.getElementById('healthBuy');
        el.textContent = 'FAIL';
        el.className = 'miniValue red';
      }

      // SELL
      try {
        const r = await postJSON('/api/sell', { dryRun: true });
        const ok = !!(r && r.data && r.data.status);
        const el = document.getElementById('healthSell');
        el.textContent = ok ? 'OK' : 'FAIL';
        el.className = ok ? 'miniValue' : 'miniValue red';
      } catch (e) {
        const el = document.getElementById('healthSell');
        el.textContent = 'FAIL';
        el.className = 'miniValue red';
      }

      try {
        const data = await getStatus();
        renderStatus(data);
      } catch (e) {
        console.error(e);
      }
    }

    async function performAction(url) {
      try {
        const { data } = await postJSON(url, {});
        renderStatus(data.status || data);

        // Reset -> kurze Nachprüfung
        if (url === '/api/reset') {
          setTimeout(async () => {
            await runHealthChecks();
          }, 350);
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function boot() {
      await runHealthChecks();

      setInterval(async () => {
        try {
          const data = await getStatus();
          renderStatus(data);
        } catch (e) {
          console.error(e);
        }
      }, 2000);
    }

    boot();
  </script>
</body>
</html>
