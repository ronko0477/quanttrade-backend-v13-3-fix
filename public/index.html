<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V19.3.2 HARD LIVE</title>

<style>
:root{
  --bg:#081432;
  --card:#0f1f4a;
  --line:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#9fb3ff;
  --green:#5cf7a4;
  --red:#ff7f7f;
  --yellow:#ffd166;
}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#081432,#0c1c40);
  color:var(--text);
}

.wrap{
  padding:16px;
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

/* HERO */

.hero{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  border:1px solid var(--line);
}

.guard{
  font-size:40px;
  font-weight:900;
  text-align:center;
}

.pnl{
  text-align:center;
  font-size:34px;
  font-weight:900;
}

.smallHint{
  text-align:center;
  font-size:11px;
  color:var(--muted);
}

/* GRID */

.mainGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  border:1px solid var(--line);
}

.scoreTitle{
  font-size:14px;
  font-weight:900;
  margin-bottom:8px;
}

/* BUTTONS */

button{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:900;
  color:#fff;
}

.btnBuy{background:linear-gradient(90deg,#3fcf7f,#64ffa0);}
.btnSell{background:linear-gradient(90deg,#ff7f7f,#ff9a9a);}
.btnWin{background:linear-gradient(90deg,#5cd98d,#7bffb1);}
.btnLoss{background:linear-gradient(90deg,#dd7e7e,#ffaaaa);}
.btnReset{background:linear-gradient(90deg,#ffd166,#ffdf85);}

.actionBar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

/* LOG */

.log{
  max-height:200px;
  overflow:auto;
  font-size:12px;
}

/* DOCK */

.dock{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
}

.dockPanel{
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--line);
  padding:10px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">V19.3.2 HARD LIVE ⚡</div>

<div class="hero">
  <div id="guard" class="guard">READY</div>
  <div id="pnl" class="pnl">0.00</div>
  <div class="smallHint">Net PnL</div>
</div>

<div class="mainGrid">

  <div class="card">
    <div class="scoreTitle">STATUS</div>
    <div id="healthStatus">CHECK</div>
  </div>

  <div class="card">
    <div class="scoreTitle">BUY POST</div>
    <div id="healthBuy">FAIL</div>
  </div>

  <div class="card">
    <div class="scoreTitle">SELL POST</div>
    <div id="healthSell">FAIL</div>
  </div>

  <div class="card">
    <div class="scoreTitle">CONF</div>
    <div id="conf">0%</div>
  </div>

</div>

<div class="actionBar">
  <button class="btnBuy" onclick="send('buy')">BUY</button>
  <button class="btnSell" onclick="send('sell')">SELL</button>
  <button class="btnWin" onclick="send('win')">WIN</button>
  <button class="btnLoss" onclick="send('loss')">LOSS</button>
  <button class="btnReset" onclick="send('reset')">RESET</button>
</div>

<div class="card" style="margin-top:12px;">
  <div class="scoreTitle">LOG</div>
  <div id="log" class="log"></div>
</div>

</div>

<!-- DOCK -->
<div class="dock">
  <div class="dockPanel">
    Quick Dock
  </div>
</div>

<script>

const API_BASE = "";

const ENDPOINTS = {
  status:'/api/status',
  buy:'/api/buy',
  sell:'/api/sell',
  win:'/api/win',
  loss:'/api/loss',
  reset:'/api/reset'
};

function setText(id,val){
  const el=document.getElementById(id);
  if(el) el.textContent=val;
}

function log(msg){
  const el=document.getElementById('log');
  const div=document.createElement('div');
  div.textContent=new Date().toLocaleTimeString()+" - "+msg;
  el.prepend(div);
}

async function send(type){
  try{
    const res=await fetch(API_BASE+ENDPOINTS[type],{method:'POST'});
    const data=await res.json();
    log(type+" OK");
    update(data);
  }catch(e){
    log(type+" ERROR");
  }
}

async function fetchStatus(){
  try{
    const res=await fetch(API_BASE+ENDPOINTS.status);
    const data=await res.json();
    update(data);
  }catch(e){
    log("status error");
  }
}

function update(d){
  if(!d) return;

  setText("pnl", Number(d.pnl||0).toFixed(2));
  setText("guard", d.guard || "READY");

  setText("healthStatus", d.processing ? "RUN" : "CHECK");
  setText("healthBuy", d.lastBuy ? "OK" : "FAIL");
  setText("healthSell", d.lastSell ? "OK" : "FAIL");

  setText("conf", (d.confidence||0)+"%");
}

setInterval(fetchStatus,3000);
fetchStatus();

</script>

</body>
</html>
