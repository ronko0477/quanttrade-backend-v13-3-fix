<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V19.8.3 HARD LIVE ⚡</title>
  <style>
    :root{
      --bg1:#06144a;
      --bg2:#0a1f6d;
      --card:rgba(45,57,132,.88);
      --card2:rgba(57,69,150,.88);
      --line:rgba(255,255,255,.08);
      --text:#f5f7ff;
      --muted:rgba(255,255,255,.72);
      --green:#b8f08f;
      --red:#efb0b0;
      --yellow:#ecd982;
      --cyan:#aeeaff;
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --dockClosedH: 58px;
      --dockOpenH: 122px;
      --activeDockHeight: var(--dockClosedH);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 35%, rgba(76,92,195,.18), transparent 38%),
        linear-gradient(180deg, #13297c 0%, #06144a 26%, #04104a 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrap{
      width:min(980px,100%);
      margin:0 auto;
      padding:14px 14px calc(var(--activeDockHeight) + var(--safeBottom) + 26px);
    }

    .title{
      text-align:center;
      font-weight:900;
      font-size:19px;
      letter-spacing:.4px;
      margin:4px 0 10px;
      color:#f8f7f2;
    }

    .heroShell{
      background:linear-gradient(180deg, rgba(59,73,162,.92), rgba(39,51,126,.92));
      border:1px solid rgba(255,255,255,.08);
      border-radius:26px;
      padding:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.22);
      margin-bottom:14px;
    }

    .heroInner{
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(67,79,168,.92), rgba(47,59,145,.92));
      padding:22px 12px 18px;
      text-align:center;
      min-height:0;
    }

    .guard{
      font-size:64px;
      line-height:.96;
      font-weight:1000;
      letter-spacing:.3px;
      margin:0;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .guard.ready{color:var(--green)}
    .guard.locked{color:var(--cyan)}
    .guard.blocked{color:var(--red)}
    .guard.warn{color:var(--yellow)}
    .guard.cooldown{color:#d5d9ff}
    .guard.limit{color:#f2f1de}

    .guardSub{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      min-height:16px;
    }

    .pnl{
      margin-top:10px;
      font-size:64px;
      line-height:.95;
      font-weight:1000;
      color:#f4f5fb;
    }

    .pnl small{
      display:block;
      margin-top:6px;
      font-size:11px;
      color:var(--muted);
      font-weight:800;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    .card{
      background:linear-gradient(180deg, rgba(43,54,132,.92), rgba(36,47,122,.92));
      border:1px solid rgba(255,255,255,.07);
      border-radius:22px;
      padding:18px 18px 16px;
      box-shadow:0 16px 44px rgba(0,0,0,.18);
    }

    .miniLabel{
      font-size:14px;
      font-weight:1000;
      color:#fffdf5;
      margin-bottom:10px;
    }

    .miniValue{
      font-size:30px;
      font-weight:1000;
      line-height:1;
    }

    .ok{color:var(--green)}
    .bad{color:var(--red)}
    .mid{color:var(--yellow)}
    .cyan{color:var(--cyan)}

    .actionGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:20px;
      min-height:74px;
      font-size:22px;
      font-weight:1000;
      color:#fff;
      cursor:pointer;
      box-shadow:none;
    }

    .btn:active{transform:scale(.99)}
    .btnBuy{background:linear-gradient(90deg,#b7e8a9,#c6f1b7)}
    .btnSell{background:linear-gradient(90deg,#efc1c1,#e7c2c2)}
    .btnWin{background:linear-gradient(90deg,#b9eab0,#c9efbe)}
    .btnLoss{background:linear-gradient(90deg,#dbb5b5,#dbb7b7)}
    .btnReset{
      grid-column:1 / -1;
      background:linear-gradient(90deg,#d7c86c,#e3d68a);
      color:#fffef7;
    }

    .subGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    .smallCard{
      background:linear-gradient(180deg, rgba(43,54,132,.92), rgba(36,47,122,.92));
      border:1px solid rgba(255,255,255,.07);
      border-radius:20px;
      padding:16px;
    }

    .smallTitle{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .smallValue{
      font-size:26px;
      font-weight:1000;
      line-height:1.05;
    }

    .scoreCard{
      background:linear-gradient(180deg, rgba(48,59,144,.95), rgba(40,51,128,.95));
      border:1px solid rgba(255,255,255,.07);
      border-radius:24px;
      padding:16px;
      margin-bottom:14px;
    }

    .scoreHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      margin-bottom:14px;
    }

    .scoreTitle{
      font-size:18px;
      font-weight:1000;
    }

    .scoreValue{
      font-size:54px;
      line-height:.9;
      font-weight:1000;
      color:var(--cyan);
    }

    .barTrack{
      height:14px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.07);
      margin-bottom:14px;
    }

    .barFill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#efb0b0 0%, #e6d67f 35%, #b8efaa 65%, #9fe7ff 100%);
      transition:width .25s ease;
    }

    .factorGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .factor{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.03);
      padding:13px 14px;
    }

    .factorTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .factorName{
      font-size:11px;
      color:var(--muted);
      font-weight:900;
    }

    .factorVal{
      font-size:18px;
      font-weight:1000;
    }

    .logCard{
      background:linear-gradient(180deg, rgba(43,54,132,.94), rgba(35,46,120,.94));
      border:1px solid rgba(255,255,255,.07);
      border-radius:24px;
      padding:16px;
      margin-bottom:14px;
    }

    .logTitle{
      font-size:18px;
      font-weight:1000;
      margin-bottom:10px;
    }

    .logList{
      display:flex;
      flex-direction:column;
      gap:0;
      max-height:none;
      overflow:visible;
    }

    .logEntry{
      padding:11px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .logEntry:last-child{border-bottom:none}

    .logLine{
      font-size:13px;
      line-height:1.35;
      color:#dfe5ff;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .logLine.processing{color:var(--yellow)}
    .logLine.executed{color:var(--cyan)}
    .logLine.queued{color:#c6ccff}
    .logLine.reset{color:#efe6b0}
    .logLine.auto{color:#e7d27d}
    .logLine.sync{color:#efe6b0}
    .logLine.hard_block{color:#f1bbbb}
    .logLine.loss{color:#f1c0c0}
    .logLine.win{color:#ccefbf}
    .logLine.cooldown{color:#d8dcff}
    .logLine.info{color:#dfe5ff}

    .dock{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(var(--safeBottom) + 8px);
      z-index:60;
      pointer-events:none;
    }

    .dockPanel{
      pointer-events:auto;
      background:linear-gradient(180deg, rgba(90,102,202,.96), rgba(63,74,170,.96));
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      box-shadow:0 12px 34px rgba(0,0,0,.26);
      overflow:hidden;
      backdrop-filter:blur(10px);
    }

    .dockHandle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      min-height:58px;
      cursor:pointer;
    }

    .dockLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .dockGrip{
      width:34px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.28);
      flex:0 0 auto;
    }

    .dockMeta{
      font-size:11px;
      color:rgba(255,255,255,.82);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .dockChevron{
      font-size:16px;
      color:#fff;
      opacity:.9;
      transition:transform .2s ease;
    }

    body.dock-open .dockChevron{transform:rotate(180deg)}

    .dockBody{
      max-height:0;
      overflow:hidden;
      transition:max-height .22s ease;
    }

    body.dock-open .dockBody{
      max-height:130px;
    }

    .dockButtons{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      padding:0 12px 12px;
    }

    .dockBtn{
      min-height:40px;
      border:none;
      border-radius:12px;
      font-size:12px;
      font-weight:1000;
      color:#fff;
    }

    .dockBuy{background:linear-gradient(90deg,#a9e3a0,#b9ebb0)}
    .dockSell{background:linear-gradient(90deg,#e6b1b1,#dfb2b2)}
    .dockSave{background:linear-gradient(90deg,#8ea1ff,#95b3ff)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">V19.8.3 HARD LIVE ⚡</div>

    <div class="heroShell">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="guardSub" class="guardSub">System bereit.</div>
        <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="miniLabel">STATUS</div>
        <div id="healthStatus" class="miniValue ok">OK</div>
      </div>
      <div class="card">
        <div class="miniLabel">BUY POST</div>
        <div id="healthBuy" class="miniValue ok">OK</div>
      </div>
      <div class="card">
        <div class="miniLabel">SELL POST</div>
        <div id="healthSell" class="miniValue ok">OK</div>
      </div>
      <div class="card">
        <div class="miniLabel">CONF</div>
        <div id="confValue" class="miniValue mid">62%</div>
      </div>
    </div>

    <div class="actionGrid">
      <button class="btn btnBuy" onclick="performAction('/api/buy')">BUY</button>
      <button class="btn btnSell" onclick="performAction('/api/sell')">SELL</button>
      <button class="btn btnWin" onclick="performAction('/api/win')">WIN</button>
      <button class="btn btnLoss" onclick="performAction('/api/loss')">LOSS</button>
      <button class="btn btnReset" onclick="performAction('/api/reset')">RESET</button>
    </div>

    <div class="subGrid">
      <div class="smallCard">
        <div class="smallTitle">AUTO ON</div>
        <div id="autoOnText" class="smallValue cyan">AUTO ON</div>
      </div>
      <div class="smallCard">
        <div class="smallTitle">AUTO OFF</div>
        <div id="autoOffText" class="smallValue">AUTO OFF</div>
      </div>
      <div class="smallCard">
        <div class="smallTitle">QUEUE</div>
        <div id="queueValue" class="smallValue">0</div>
      </div>
      <div class="smallCard">
        <div class="smallTitle">PROCESSING</div>
        <div id="processingValue" class="smallValue">OFF</div>
      </div>
      <div class="smallCard">
        <div class="smallTitle">AUTO</div>
        <div id="autoValue" class="smallValue">OFF</div>
      </div>
      <div class="smallCard">
        <div class="smallTitle">TRIGGER</div>
        <div id="triggerValue" class="smallValue">80</div>
      </div>
    </div>

    <div class="scoreCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreValue" class="scoreValue">82</div>
      </div>
      <div class="barTrack">
        <div id="scoreBar" class="barFill"></div>
      </div>

      <div class="factorGrid">
        <div class="factor"><div class="factorTop"><div class="factorName">Trend</div><div id="trendVal" class="factorVal mid">72.3</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Volume</div><div id="volumeVal" class="factorVal mid">65.5</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Structure</div><div id="structureVal" class="factorVal ok">80.1</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Volatility</div><div id="volatilityVal" class="factorVal bad">51.2</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Liquidity</div><div id="liquidityVal" class="factorVal ok">81.9</div></div></div>
        <div class="factor"><div class="factorTop"><div class="factorName">Session</div><div id="sessionVal" class="factorVal mid">68.0</div></div></div>
      </div>
    </div>

    <div class="logCard">
      <div class="logTitle">LOG</div>
      <div id="logList" class="logList"></div>
    </div>
  </div>

  <div class="dock" id="quickDock">
    <div class="dockPanel">
      <div class="dockHandle" onclick="toggleDock()">
        <div class="dockLeft">
          <div class="dockGrip"></div>
          <div>
            <div style="font-weight:1000;font-size:20px;">Quick Dock</div>
            <div class="dockMeta" id="dockMetaText">tap to open</div>
          </div>
        </div>
        <div class="dockChevron">⌃</div>
      </div>

      <div class="dockBody">
        <div class="dockButtons">
          <button class="dockBtn dockBuy" onclick="performAction('/api/buy')">BUY</button>
          <button class="dockBtn dockSell" onclick="performAction('/api/sell')">SELL</button>
          <button class="dockBtn dockSave" onclick="manualSync()">SYNC</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    const CONF_VALUE = 62;
    const AI_SCORE = 82;
    const FACTORS = {
      trend: 72.3,
      volume: 65.5,
      structure: 80.1,
      volatility: 51.2,
      liquidity: 81.9,
      session: 68.0
    };

    let appState = {
      auto: false
    };

    function apiUrl(path){
      return `${API_BASE}${path}`;
    }

    async function getStatus(){
      const res = await fetch(apiUrl('/api/status'), { cache:'no-store' });
      if(!res.ok) throw new Error('Status fetch failed');
      return await res.json();
    }

    async function postJSON(path, body = {}){
      const res = await fetch(apiUrl(path), {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if(!res.ok){
        throw data;
      }
      return data;
    }

    function setText(id, val){
      const el = document.getElementById(id);
      if(el) el.textContent = val;
    }

    function fmtPnL(v){
      const n = Number(v || 0);
      return n.toFixed(2);
    }

    function guardClass(guard){
      const g = String(guard || 'READY').toUpperCase();
      if (g === 'READY') return 'ready';
      if (g === 'LOCKED') return 'locked';
      if (g === 'BLOCKED') return 'blocked';
      if (g === 'WARN') return 'warn';
      if (g === 'COOLDOWN') return 'cooldown';
      if (g === 'SESSION_LIMIT') return 'limit';
      return 'ready';
    }

    function prettyGuard(guard){
      const map = {
        READY:'READY',
        LOCKED:'LOCKED',
        BLOCKED:'BLOCKED',
        WARN:'WARN',
        COOLDOWN:'COOLDOWN',
        SESSION_LIMIT:'LIMIT'
      };
      return map[String(guard || 'READY').toUpperCase()] || String(guard || 'READY');
    }

    function healthClass(ok){
      return ok ? 'miniValue ok' : 'miniValue bad';
    }

    function factorClass(v){
      const n = Number(v || 0);
      if(n >= 75) return 'factorVal ok';
      if(n >= 60) return 'factorVal mid';
      return 'factorVal bad';
    }

    function logTypeClass(type){
      const t = String(type || '').toLowerCase();
      if(t.includes('processing')) return 'processing';
      if(t.includes('executed')) return 'executed';
      if(t.includes('queued')) return 'queued';
      if(t.includes('reset')) return 'reset';
      if(t.includes('auto')) return 'auto';
      if(t.includes('sync')) return 'sync';
      if(t.includes('hard_block')) return 'hard_block';
      if(t.includes('loss')) return 'loss';
      if(t.includes('win')) return 'win';
      if(t.includes('cooldown')) return 'cooldown';
      return 'info';
    }

    function renderLog(log){
      const box = document.getElementById('logList');
      if(!box) return;
      box.innerHTML = '';

      const items = Array.isArray(log) ? log : [];
      if(!items.length){
        box.innerHTML = '<div class="logEntry"><div class="logLine info">Keine Einträge.</div></div>';
        return;
      }

      items.slice(0, 12).forEach(entry => {
        const row = document.createElement('div');
        row.className = 'logEntry';

        const line = document.createElement('div');
        line.className = `logLine ${logTypeClass(entry.type)}`;

        const time = entry.ts
          ? new Date(entry.ts).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
          : '--:--:--';

        const type = entry.type || 'INFO';
        const msg = entry.msg || '';

        line.textContent = `${time} - ${type} ${msg}`.trim();
        row.appendChild(line);
        box.appendChild(row);
      });
    }

    function renderStaticScore(){
      setText('scoreValue', String(AI_SCORE));
      document.getElementById('scoreBar').style.width = `${AI_SCORE}%`;

      setText('trendVal', FACTORS.trend.toFixed(1));
      setText('volumeVal', FACTORS.volume.toFixed(1));
      setText('structureVal', FACTORS.structure.toFixed(1));
      setText('volatilityVal', FACTORS.volatility.toFixed(1));
      setText('liquidityVal', FACTORS.liquidity.toFixed(1));
      setText('sessionVal', FACTORS.session.toFixed(1));

      document.getElementById('trendVal').className = factorClass(FACTORS.trend);
      document.getElementById('volumeVal').className = factorClass(FACTORS.volume);
      document.getElementById('structureVal').className = factorClass(FACTORS.structure);
      document.getElementById('volatilityVal').className = factorClass(FACTORS.volatility);
      document.getElementById('liquidityVal').className = factorClass(FACTORS.liquidity);
      document.getElementById('sessionVal').className = factorClass(FACTORS.session);

      setText('confValue', `${CONF_VALUE}%`);
    }

    function renderAutoBlock(){
      setText('autoOnText', 'AUTO ON');
      setText('autoOffText', 'AUTO OFF');
      setText('autoValue', appState.auto ? 'ON' : 'OFF');
      setText('triggerValue', '80');
    }

    function renderStatus(data){
      const guard = String(data.guard || 'READY').toUpperCase();
      const guardEl = document.getElementById('guard');

      guardEl.textContent = prettyGuard(guard);
      guardEl.className = `guard ${guardClass(guard)}`;

      setText('guardSub', data.reasonHint || 'System bereit.');
      setText('pnl', fmtPnL(data.pnl || 0));

      const statusOk = true;
      const buyOk = guard !== 'BLOCKED' && guard !== 'SESSION_LIMIT' ? true : true;
      const sellOk = guard !== 'BLOCKED' && guard !== 'SESSION_LIMIT' ? true : true;

      const healthStatus = document.getElementById('healthStatus');
      const healthBuy = document.getElementById('healthBuy');
      const healthSell = document.getElementById('healthSell');

      healthStatus.className = healthClass(statusOk);
      healthBuy.className = healthClass(buyOk);
      healthSell.className = healthClass(sellOk);

      healthStatus.textContent = statusOk ? 'OK' : 'FAIL';
      healthBuy.textContent = buyOk ? 'OK' : 'FAIL';
      healthSell.textContent = sellOk ? 'OK' : 'FAIL';

      setText('queueValue', String(data.queueLength ?? 0));
      setText('processingValue', data.processing ? 'ON' : 'OFF');

      renderAutoBlock();
      renderStaticScore();
      renderLog(data.log || []);
    }

    async function runHealthChecks(){
      try{
        const data = await getStatus();
        renderStatus(data);
      }catch(e){
        console.error(e);
      }
    }

    async function performAction(url){
      try{
        const data = await postJSON(url, {});
        renderStatus(data.status || data);

        if(url === '/api/reset'){
          setTimeout(async () => {
            await runHealthChecks();
          }, 300);
        }
      }catch(e){
        console.error(e);
        try{
          await runHealthChecks();
        }catch{}
      }
    }

    async function manualSync(){
      try{
        const data = await getStatus();
        const log = Array.isArray(data.log) ? data.log.slice() : [];
        log.unshift({
          ts:new Date().toISOString(),
          type:'SYNC',
          msg:'Sync OK'
        });
        data.log = log;
        renderStatus(data);
      }catch(e){
        console.error(e);
      }
    }

    function applyDockHeight(){
      const open = document.body.classList.contains('dock-open');
      document.documentElement.style.setProperty(
        '--activeDockHeight',
        open ? 'var(--dockOpenH)' : 'var(--dockClosedH)'
      );
    }

    function toggleDock(){
      document.body.classList.toggle('dock-open');
      const meta = document.getElementById('dockMetaText');
      if(meta){
        meta.textContent = document.body.classList.contains('dock-open')
          ? 'quick actions'
          : 'tap to open';
      }
      applyDockHeight();
    }

    window.addEventListener('resize', applyDockHeight);
    window.addEventListener('orientationchange', applyDockHeight);

    async function boot(){
      applyDockHeight();
      renderStaticScore();
      renderAutoBlock();
      await runHealthChecks();

      setInterval(async () => {
        try{
          const data = await getStatus();
          renderStatus(data);
        }catch(e){
          console.error(e);
        }
      }, 2000);
    }

    boot();
  </script>
</body>
</html>
