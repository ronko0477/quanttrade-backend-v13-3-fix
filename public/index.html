<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V21.0 HARD LIVE</title>

<style>
:root{
  --bg:#0b0f2a;
  --card:#1c245a;
  --card2:#2a3380;
  --text:#f4f7ff;
  --muted:rgba(255,255,255,.65);

  --green:#a6ffb2;
  --red:#ffb3b3;
  --yellow:#ffe28a;

  --shadow:0 20px 50px rgba(0,0,0,.4);
}

{box-sizing:border-box;font-family:system-ui;margin:0;padding:0}

body{
  background:linear-gradient(180deg,#060913,#0b0f2a);
  color:var(--text);
  padding:14px;
}

/ HEADER /
.header{
  text-align:center;
  font-weight:700;
  margin-bottom:12px;
  letter-spacing:1px;
}

/ HERO /
.hero{
  background:linear-gradient(180deg,#4e5ecf,#6e7dff);
  border-radius:26px;
  padding:22px;
  text-align:center;
  box-shadow:var(--shadow);
}

.hero h1{
  font-size:48px;
  margin-bottom:6px;
}

.hero .sub{
  font-size:14px;
  opacity:.8;
}

.pnl{
  font-size:46px;
  margin:10px 0;
  font-weight:800;
}

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.2);
  font-size:12px;
  margin-top:6px;
}

.limits{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.limit{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.2);
}

/ GRID /
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.card{
  background:linear-gradient(180deg,#2a3380,#1c245a);
  padding:16px;
  border-radius:18px;
  text-align:center;
  box-shadow:var(--shadow);
}

.card h3{
  font-size:13px;
  color:var(--muted);
}

.card .value{
  font-size:22px;
  margin-top:6px;
  font-weight:700;
}

/ BUTTONS /
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

button{
  border:none;
  border-radius:18px;
  padding:16px;
  font-weight:700;
  font-size:14px;
}

.buy{background:linear-gradient(90deg,#a6ffb2,#d6ffd8)}
.sell{background:linear-gradient(90deg,#ffb3b3,#ffd6d6)}
.win{background:linear-gradient(90deg,#a6ffb2,#d6ffd8)}
.loss{background:linear-gradient(90deg,#ffb3b3,#ffd6d6)}

.reset{
  grid-column:1/3;
  background:linear-gradient(90deg,#ffe28a,#fff2b5);
}

/ AUTO /
.auto{
  margin-top:14px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(180deg,#2a3380,#1c245a);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.toggle{
  padding:8px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
}

/ SCORE /
.score{
  margin-top:14px;
  padding:18px;
  border-radius:22px;
  background:linear-gradient(180deg,#4e5ecf,#6e7dff);
}

.bar{
  height:10px;
  border-radius:10px;
  background:linear-gradient(90deg,#ffe28a,#a6ffb2);
  margin:10px 0;
}

.subgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.subbox{
  background:rgba(0,0,0,.2);
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.cooldown{
  margin-top:10px;
  font-size:12px;
  opacity:.8;
}

/ LOG */
.log{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:linear-gradient(180deg,#2a3380,#1c245a);
}

.log h3{
  margin-bottom:8px;
}

.log-entry{
  font-size:12px;
  margin-bottom:6px;
  opacity:.9;
}
</style>
</head>

<body>

<div class="header">V21.0 HARD LIVE ⚡ 🟢</div>

<div class="hero">
  <h1 id="status">READY</h1>
  <div class="sub" id="sub">System bereit.</div>
  <div class="pnl" id="pnl">0</div>
  <div>Net PnL</div>
  <div class="badge" id="mode">LIVE</div>

  <div class="limits">
    <div class="limit">LOSS LIMIT -20</div>
    <div class="limit">WIN TARGET +20</div>
  </div>
</div>

<div class="grid">
  <div class="card"><h3>STATUS</h3><div class="value" id="health">OK</div></div>
  <div class="card"><h3>BUY POST</h3><div class="value">OK</div></div>
  <div class="card"><h3>SELL POST</h3><div class="value">OK</div></div>
  <div class="card"><h3>CONF</h3><div class="value" id="conf">0%</div></div>
</div>

<div class="actions">
  <button class="buy" onclick="send('buy')">BUY</button>
  <button class="sell" onclick="send('sell')">SELL</button>
  <button class="win" onclick="send('win')">WIN</button>
  <button class="loss" onclick="send('loss')">LOSS</button>
  <button class="reset" onclick="send('reset')">RESET</button>
</div>

<div class="auto">
  <div>AUTO MODE</div>
  <div class="toggle" onclick="toggleAuto()" id="autoBtn">OFF</div>
</div>

<div class="score">
  <div style="display:flex;justify-content:space-between;">
    <div>AI SCORE</div>
    <div id="scoreVal">0</div>
  </div>
  <div class="bar"></div>

  <div class="subgrid">
    <div class="subbox">Trend<br><b id="trend">0</b></div>
    <div class="subbox">Volume<br><b id="volume">0</b></div>
    <div class="subbox">Structure<br><b id="structure">0</b></div>
    <div class="subbox">Volatility<br><b id="vol">0</b></div>
    <div class="subbox">Liquidity<br><b id="liq">0</b></div>
    <div class="subbox">Session<br><b id="session">0</b></div>
  </div>

  <div class="cooldown" id="cooldown"></div>
</div>

<div class="log">
  <h3>LOG</h3>
  <div id="log"></div>
</div>

<script>
let auto=false;

function toggleAuto(){
  auto=!auto;
  document.getElementById("autoBtn").innerText = auto ? "ON" : "OFF";
  fetch('/api/auto',{method:'POST'});
}

function send(type){
  fetch('/api/'+type,{method:'POST'});
}

async function load(){
  const res = await fetch('/api/state');
  const d = await res.json();

  document.getElementById("pnl").innerText = d.pnl;
  document.getElementById("status").innerText = d.status;
  document.getElementById("sub").innerText = d.message;
  document.getElementById("conf").innerText = d.conf+"%";
  document.getElementById("scoreVal").innerText = d.score;

  document.getElementById("trend").innerText = d.trend;
  document.getElementById("volume").innerText = d.volume;
  document.getElementById("structure").innerText = d.structure;
  document.getElementById("vol").innerText = d.volatility;
  document.getElementById("liq").innerText = d.liquidity;
  document.getElementById("session").innerText = d.session;

  document.getElementById("cooldown").innerText =
    d.cooldown ? "Cooldown aktiv ("+d.cooldown+"s)" : "";

  const log = document.getElementById("log");
  log.innerHTML = "";
  d.logs.slice(-10).reverse().forEach(l=>{
    const div=document.createElement("div");
    div.className="log-entry";
    div.innerText=l;
    log.appendChild(div);
  });
}

setInterval(load,1000);
load();
</script>

</body>
</html>
