<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V19.8.2 HARD LIVE ⚡</title>
  <style>
    :root{
      --bg1:#071247;
      --bg2:#020b3e;
      --card:#263374;
      --card2:#2d3a83;
      --line:rgba(255,255,255,.07);
      --text:#f4f7ff;
      --muted:#bfc7e8;
      --green:#b7e58f;
      --red:#efb0b0;
      --yellow:#edd77f;
      --cyan:#9eddf1;
      --safeBottom:env(safe-area-inset-bottom,0px);
      --dockH:98px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(74,89,175,.24), transparent 35%),
        linear-gradient(180deg, #1e2a73 0%, #071247 18%, #04104d 55%, #020a3a 100%);
      min-height:100vh;
    }

    .wrap{
      width:min(860px,100%);
      margin:0 auto;
      padding:
        calc(24px + env(safe-area-inset-top))
        18px
        calc(var(--dockH) + var(--safeBottom) + 44px);
    }

    .title{
      text-align:center;
      font-size:32px;
      font-weight:900;
      letter-spacing:.5px;
      margin:6px 0 22px;
      color:#f4f5f8;
      text-shadow:0 2px 16px rgba(0,0,0,.18);
    }

    .hero{
      background:linear-gradient(180deg, rgba(57,72,162,.56), rgba(35,48,118,.72));
      border:1px solid rgba(255,255,255,.06);
      border-radius:30px;
      padding:26px;
      box-shadow:0 16px 36px rgba(0,0,0,.18);
    }

    .heroInner{
      background:linear-gradient(180deg, rgba(67,79,170,.34), rgba(48,58,140,.44));
      border:1px solid rgba(255,255,255,.07);
      border-radius:32px;
      padding:34px 24px 28px;
      text-align:center;
    }

    .guard{
      font-size:86px;
      line-height:.95;
      font-weight:900;
      text-transform:uppercase;
      color:var(--green);
      letter-spacing:1px;
      word-break:break-word;
    }

    .guard.ready{color:var(--green)}
    .guard.locked{color:var(--cyan)}
    .guard.warn{color:var(--yellow)}
    .guard.blocked{color:var(--red)}
    .guard.session_limit{
      font-size:52px;
      line-height:1.05;
      text-align:center;
      word-break:break-word;
    }

    .guardSub{
      margin-top:8px;
      color:#d6dbef;
      font-size:15px;
      font-weight:800;
    }

    .pnl{
      margin-top:18px;
      font-size:84px;
      font-weight:900;
      line-height:1;
    }

    .pnl small{
      display:block;
      margin-top:10px;
      color:var(--muted);
      font-size:22px;
      font-weight:700;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(44,58,129,.95), rgba(37,49,116,.98));
      border:1px solid rgba(255,255,255,.06);
      border-radius:28px;
      padding:22px 24px;
      box-shadow:0 10px 30px rgba(0,0,0,.16);
    }

    .label{
      color:#ffffff;
      font-size:24px;
      font-weight:900;
      text-transform:uppercase;
    }

    .value{
      margin-top:18px;
      font-size:64px;
      font-weight:900;
      line-height:1;
    }

    .value.sm{
      font-size:34px;
      font-weight:800;
    }

    .ok{color:var(--green)}
    .bad{color:var(--red)}
    .mid{color:var(--yellow)}
    .soft{color:#dfe5ff}

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .btn{
      border:none;
      border-radius:24px;
      min-height:88px;
      font-size:28px;
      font-weight:900;
      color:white;
      box-shadow:0 10px 22px rgba(0,0,0,.14);
      cursor:pointer;
    }

    .btn:active{transform:scale(.985)}
    .btn.buy{background:linear-gradient(90deg,#bde5ae,#aeeaaf)}
    .btn.sell{background:linear-gradient(90deg,#e5b5b5,#e6c6c6)}
    .btn.win{background:linear-gradient(90deg,#b7e7b1,#bdeac9)}
    .btn.loss{background:linear-gradient(90deg,#ddb0b0,#d9bbbb)}
    .btn.reset{background:linear-gradient(90deg,#e5d286,#e1d795);grid-column:1 / -1}
    .btn.autoOn{background:linear-gradient(90deg,#aebdf8,#9bb5ff)}
    .btn.autoOff{background:linear-gradient(90deg,#8893c0,#9aa5c7)}
    .btn.secondary{min-height:80px;font-size:22px}

    .smallGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .mini{
      background:linear-gradient(180deg, rgba(35,48,111,.96), rgba(31,42,98,.98));
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      padding:18px 22px;
    }

    .miniTitle{
      color:#eef2ff;
      font-size:18px;
      font-weight:900;
      text-transform:uppercase;
    }

    .miniVal{
      margin-top:14px;
      font-size:34px;
      font-weight:900;
    }

    .scoreCard{
      margin-top:18px;
      background:linear-gradient(180deg, rgba(46,58,134,.98), rgba(37,49,116,.99));
      border:1px solid rgba(255,255,255,.06);
      border-radius:30px;
      padding:24px;
      box-shadow:0 16px 36px rgba(0,0,0,.16);
    }

    .scoreHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .scoreTitle{
      font-size:30px;
      font-weight:900;
      text-transform:uppercase;
    }

    .scoreValue{
      font-size:78px;
      font-weight:900;
      color:var(--cyan);
      line-height:1;
    }

    .barTrack{
      height:20px;
      border-radius:999px;
      margin-top:18px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
    }

    .barFill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#e8b0b0,#e1d483,#b5e098,#9dddf3);
      transition:width .25s ease;
    }

    .factorGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:20px;
    }

    .factor{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:22px;
      padding:18px 20px;
    }

    .factorTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .factorName{
      color:var(--muted);
      font-size:18px;
      font-weight:800;
    }

    .factorVal{
      font-size:28px;
      font-weight:900;
    }

    .logCard{
      margin-top:18px;
      background:linear-gradient(180deg, rgba(44,58,129,.98), rgba(37,49,116,.99));
      border:1px solid rgba(255,255,255,.06);
      border-radius:30px;
      padding:24px;
      box-shadow:0 16px 36px rgba(0,0,0,.14);
    }

    .logTitle{
      font-size:30px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .log{
      display:flex;
      flex-direction:column;
      gap:0;
      max-height:480px;
      overflow:auto;
      padding-right:4px;
    }

    .entry{
      padding:16px 2px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:22px;
      line-height:1.35;
      color:#dfe6ff;
    }

    .entry:last-child{border-bottom:none}
    .entry.processing{color:var(--yellow)}
    .entry.executed{color:#d6e0ff}
    .entry.queued{color:#c5ccff}
    .entry.win{color:var(--green)}
    .entry.loss,.entry.hard_block{color:var(--red)}
    .entry.reset,.entry.sync,.entry.auto,.entry.cooldown{color:#e5d79b}

    .dock{
      position:fixed;
      left:18px;
      right:18px;
      bottom:calc(var(--safeBottom) + 2px);
      z-index:60;
      pointer-events:none;
    }

    .dockPanel{
      pointer-events:auto;
      background:linear-gradient(180deg, rgba(70,83,178,.86), rgba(46,61,145,.9));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      overflow:hidden;
      backdrop-filter:blur(6px);
      box-shadow:0 6px 16px rgba(0,0,0,.18);
    }

    .dockHandle{
      min-height:56px;
      display:flex;
      align-items:center;
      padding:0 18px;
      font-size:18px;
      font-weight:800;
      color:#eef2ff;
      cursor:pointer;
      user-select:none;
    }

    .dockBody{
      max-height:0;
      overflow:hidden;
      transition:max-height .2s ease;
    }

    body.dock-open .dockBody{
      max-height:240px;
    }

    .dockButtons{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      padding:0 14px 14px;
    }

    .dockBtn{
      min-height:50px;
      border:none;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      color:white;
      box-shadow:none;
      cursor:pointer;
    }

    .dockBuy{background:linear-gradient(90deg,#93d4ff,#8fb4ff)}
    .dockSell{background:linear-gradient(90deg,#f1b1b1,#d6a7a7)}
    .dockSave{background:linear-gradient(90deg,#8d90ff,#6a8cff)}

    @media (max-width:760px){
      .wrap{
        padding:
          calc(20px + env(safe-area-inset-top))
          18px
          calc(var(--dockH) + var(--safeBottom) + 40px);
      }
      .title{font-size:22px}
      .hero{padding:18px}
      .heroInner{padding:30px 16px 22px}
      .guard{font-size:64px}
      .guard.session_limit{font-size:44px}
      .pnl{font-size:74px}
      .pnl small{font-size:18px}
      .label{font-size:20px}
      .value{font-size:42px}
      .value.sm,.miniVal{font-size:28px}
      .btn{min-height:82px;font-size:24px}
      .btn.secondary{min-height:74px;font-size:20px}
      .scoreTitle{font-size:24px}
      .scoreValue{font-size:64px}
      .factorName{font-size:16px}
      .factorVal{font-size:24px}
      .logTitle{font-size:24px}
      .entry{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">V19.8.2 HARD LIVE ⚡</div>

    <div class="hero">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="guardSub" class="guardSub">System bereit.</div>
        <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="label">STATUS</div>
        <div id="healthStatus" class="value sm ok">OK</div>
      </div>
      <div class="card">
        <div class="label">BUY POST</div>
        <div id="healthBuy" class="value sm ok">OK</div>
      </div>
      <div class="card">
        <div class="label">SELL POST</div>
        <div id="healthSell" class="value sm ok">OK</div>
      </div>
      <div class="card">
        <div class="label">CONF</div>
        <div id="confVal" class="value sm mid">62%</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn buy" onclick="performAction('/api/buy')">BUY</button>
      <button class="btn sell" onclick="performAction('/api/sell')">SELL</button>
      <button class="btn win" onclick="performAction('/api/win')">WIN</button>
      <button class="btn loss" onclick="performAction('/api/loss')">LOSS</button>
      <button class="btn reset" onclick="performAction('/api/reset')">RESET</button>
    </div>

    <div class="actions">
      <button class="btn secondary autoOn" onclick="performAction('/api/auto/on')">AUTO ON</button>
      <button class="btn secondary autoOff" onclick="performAction('/api/auto/off')">AUTO OFF</button>
    </div>

    <div class="smallGrid">
      <div class="mini">
        <div class="miniTitle">QUEUE</div>
        <div id="queueVal" class="miniVal soft">0</div>
      </div>
      <div class="mini">
        <div class="miniTitle">PROCESSING</div>
        <div id="processingVal" class="miniVal soft">OFF</div>
      </div>
      <div class="mini">
        <div class="miniTitle">AUTO</div>
        <div id="autoVal" class="miniVal soft">OFF</div>
      </div>
      <div class="mini">
        <div class="miniTitle">TRIGGER</div>
        <div id="triggerVal" class="miniVal soft">80</div>
      </div>
    </div>

    <div class="scoreCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreVal" class="scoreValue">82</div>
      </div>

      <div class="barTrack">
        <div id="scoreBar" class="barFill"></div>
      </div>

      <div class="factorGrid">
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Trend</div>
            <div id="trendVal" class="factorVal mid">72.3</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Volume</div>
            <div id="volumeVal" class="factorVal mid">65.5</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Structure</div>
            <div id="structureVal" class="factorVal ok">80.1</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Volatility</div>
            <div id="volatilityVal" class="factorVal bad">51.2</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Liquidity</div>
            <div id="liquidityVal" class="factorVal ok">81.9</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Session</div>
            <div id="sessionVal" class="factorVal mid">68.0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="logCard">
      <div class="logTitle">LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <div class="dock" id="dock">
    <div class="dockPanel">
      <div class="dockHandle" onclick="toggleDock()">Quick Dock</div>
      <div class="dockBody">
        <div class="dockButtons">
          <button class="dockBtn dockBuy" onclick="performAction('/api/buy')">BUY</button>
          <button class="dockBtn dockSell" onclick="performAction('/api/sell')">SELL</button>
          <button class="dockBtn dockSave" onclick="performAction('/api/sync')">SYNC</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function safeNum(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    async function getStatus() {
      const r = await fetch('/api/status', { cache: 'no-store' });
      if (!r.ok) throw new Error('Status failed');
      return r.json();
    }

    async function postJSON(url, body = {}) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await r.json();
      if (!r.ok) throw data;
      return data;
    }

    function setText(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function guardClass(guard) {
      switch (guard) {
        case 'READY': return 'ready';
        case 'LOCKED': return 'locked';
        case 'WARN': return 'warn';
        case 'BLOCKED': return 'blocked';
        case 'SESSION_LIMIT': return 'session_limit';
        case 'COOLDOWN': return 'warn';
        default: return 'ready';
      }
    }

    function guardLabel(guard) {
      switch (guard) {
        case 'SESSION_LIMIT': return 'SESSION LIMIT';
        default: return String(guard || 'READY').replaceAll('_', ' ');
      }
    }

    function logClass(type) {
      const t = String(type || '').toLowerCase();
      if (t === 'processing') return 'processing';
      if (t === 'executed') return 'executed';
      if (t === 'queued') return 'queued';
      if (t === 'win') return 'win';
      if (t === 'loss') return 'loss';
      if (t === 'hard_block') return 'hard_block';
      if (t === 'reset') return 'reset';
      if (t === 'sync') return 'sync';
      if (t === 'auto') return 'auto';
      if (t === 'cooldown') return 'cooldown';
      return '';
    }

    function renderLog(items) {
      const box = document.getElementById('log');
      if (!box) return;

      if (!items || !items.length) {
        box.innerHTML = '<div class="entry">Keine Einträge.</div>';
        return;
      }

      box.innerHTML = items.map(item => {
        return `<div class="entry ${logClass(item.type)}">${item.time} - ${item.type} ${item.msg}</div>`;
      }).join('');
    }

    function renderStatus(data) {
      const guardEl = document.getElementById('guard');
      const guard = guardLabel(data.guard);
      guardEl.textContent = guard;
      guardEl.className = `guard ${guardClass(data.guard)}`;

      setText('guardSub', data.reasonHint || 'System bereit.');
      document.getElementById('pnl').innerHTML = `${safeNum(data.pnl).toFixed(2)}<small>Net PnL</small>`;

      setText('healthStatus', data.health?.status ? 'OK' : 'FAIL');
      setText('healthBuy', data.health?.buy ? 'OK' : 'FAIL');
      setText('healthSell', data.health?.sell ? 'OK' : 'FAIL');

      document.getElementById('healthStatus').className = `value sm ${data.health?.status ? 'ok' : 'bad'}`;
      document.getElementById('healthBuy').className = `value sm ${data.health?.buy ? 'ok' : 'bad'}`;
      document.getElementById('healthSell').className = `value sm ${data.health?.sell ? 'ok' : 'bad'}`;

      setText('confVal', `${safeNum(data.confidence, 62)}%`);
      setText('queueVal', safeNum(data.queueLength, 0));
      setText('processingVal', data.processing ? 'ON' : 'OFF');
      setText('autoVal', data.autoEnabled ? 'ON' : 'OFF');
      setText('triggerVal', safeNum(data.trigger, 80));

      setText('scoreVal', safeNum(data.score, 82));
      document.getElementById('scoreBar').style.width = `${Math.max(0, Math.min(100, safeNum(data.score, 82)))}%`;

      setText('trendVal', safeNum(data.factors?.trend, 72.3).toFixed(1));
      setText('volumeVal', safeNum(data.factors?.volume, 65.5).toFixed(1));
      setText('structureVal', safeNum(data.factors?.structure, 80.1).toFixed(1));
      setText('volatilityVal', safeNum(data.factors?.volatility, 51.2).toFixed(1));
      setText('liquidityVal', safeNum(data.factors?.liquidity, 81.9).toFixed(1));
      setText('sessionVal', safeNum(data.factors?.session, 68.0).toFixed(1));

      renderLog(data.log || []);
    }

    async function runHealthChecks() {
      try { await postJSON('/api/buy', { dryRun: true }); } catch (_) {}
      try { await postJSON('/api/sell', { dryRun: true }); } catch (_) {}

      try {
        const data = await getStatus();
        renderStatus(data);
      } catch (e) {
        console.error(e);
      }
    }

    async function performAction(url) {
      try {
        const data = await postJSON(url, {});
        renderStatus(data.status || data);

        // FIX: nach RESET Health neu prüfen
        if (url === '/api/reset') {
          setTimeout(async () => {
            await runHealthChecks();
          }, 300);
        }
      } catch (e) {
        console.error(e);
        if (e && e.status) {
          renderStatus(e.status);
        }
      }
    }

    function toggleDock() {
      document.body.classList.toggle('dock-open');
    }

    async function boot() {
      await runHealthChecks();

      setInterval(async () => {
        try {
          const data = await getStatus();
          renderStatus(data);
        } catch (e) {
          console.error(e);
        }
      }, 2000);
    }

    boot();
  </script>
</body>
</html>
