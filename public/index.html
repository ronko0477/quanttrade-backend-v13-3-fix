<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>V19.8.10 HARD LIVE</title>

<style>
:root{
  --bg:#05070f;
  --card:#1b2150;
  --card2:#232a66;
  --text:#e8ecff;
  --muted:#9aa3c7;
  --green:#a9d18e;
  --red:#d6b3ad;
  --yellow:#e6d98a;
}

{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  font-family:-apple-system,system-ui;
  background:radial-gradient(circle at top,#0a0f2a,#05070f 60%);
  color:var(--text);
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:14px;
  padding-bottom:220px; / FIX: kein Dock overlap /
}

/ HEADER /
h1{
  text-align:center;
  font-size:18px;
  margin:8px 0 14px;
  opacity:.9;
}

/ HERO /
.hero{
  background:linear-gradient(180deg,var(--card2),var(--card));
  border-radius:24px;
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.heroInner{
  border-radius:18px;
  border:1px solid rgba(255,255,255,.05);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:320px; / FIX /
}

.hero h2{
  font-size:56px;
  margin:0;
  color:var(--green);
}

.pnl{
  font-size:46px;
  margin-top:8px;
}

.sub{
  font-size:14px;
  color:var(--muted);
}

/ GRID /
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.card{
  background:linear-gradient(180deg,var(--card2),var(--card));
  border-radius:16px;
  padding:14px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.label{
  font-size:12px;
  color:var(--muted);
}

.value{
  font-size:20px;
  margin-top:4px;
}

/ BUTTONS /
.btnGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.btn{
  border:none;
  border-radius:14px;
  padding:12px;
  font-size:16px;
  font-weight:600;
  color:#fff;
  opacity:.9;
  transition:all .15s ease;
}

.btn:active{
  transform:scale(0.97);
  filter:brightness(.95);
}

.buy{background:var(--green);color:#0a0f2a}
.sell{background:var(--red)}
.reset{background:var(--yellow);color:#000;grid-column:span 2}

/ AI SCORE /
.ai{
  margin-top:14px;
  background:linear-gradient(180deg,#2c3475,#232a66);
  border-radius:20px;
  padding:14px;
}

.bar{
  height:8px;
  border-radius:6px;
  background:#333a7a;
  margin-top:6px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:82%;
  background:linear-gradient(90deg,#f1c6a8,#b5d88f,#9ad0ff);
}

/ LOG /
.log{
  margin-top:12px;
  background:linear-gradient(180deg,var(--card2),var(--card));
  border-radius:18px;
  padding:14px;
}

.entry{
  font-size:13px;
  margin:6px 0;
  opacity:.92;
  font-weight:500;
}

.entry.processing{color:var(--yellow)}
.entry.executed{color:#e8ecff}
.entry.queued{color:#cfd5ff}

/ DOCK */
.dock{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:10px;
}

.dockInner{
  max-width:420px;
  margin:auto;
  background:linear-gradient(180deg,#7b86d6,#6c78d1);
  border-radius:18px;
  padding:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.dockHead{
  font-size:14px;
  opacity:.9;
  padding:12px 16px;
}

.dockBtns{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.dockBtn{
  border:none;
  border-radius:12px;
  padding:14px;
  font-size:18px;
  min-height:64px;
  font-weight:600;
}

.sync{background:#8ea2e3}
</style>
</head>

<body>
<div class="wrap">

<h1>V19.8.10 HARD LIVE ⚡</h1>

<div class="hero">
  <div class="heroInner">
    <h2>READY</h2>
    <div class="pnl">0.00</div>
    <div class="sub">Net PnL</div>
  </div>
</div>

<div class="grid">
  <div class="card"><div class="label">STATUS</div><div class="value">OK</div></div>
  <div class="card"><div class="label">BUY POST</div><div class="value">OK</div></div>
  <div class="card"><div class="label">SELL POST</div><div class="value">OK</div></div>
  <div class="card"><div class="label">CONF</div><div class="value">62%</div></div>
</div>

<div class="btnGrid">
  <button class="btn buy">BUY</button>
  <button class="btn sell">SELL</button>
  <button class="btn buy">WIN</button>
  <button class="btn sell">LOSS</button>
  <button class="btn reset">RESET</button>
</div>

<div class="grid">
  <div class="card"><div class="label">AUTO ON</div><div class="value">AUTO ON</div></div>
  <div class="card"><div class="label">AUTO OFF</div><div class="value">AUTO OFF</div></div>
  <div class="card"><div class="label">QUEUE</div><div class="value">0</div></div>
  <div class="card"><div class="label">PROCESSING</div><div class="value">OFF</div></div>
  <div class="card"><div class="label">AUTO</div><div class="value">OFF</div></div>
  <div class="card"><div class="label">TRIGGER</div><div class="value">80</div></div>
</div>

<div class="ai">
  <div style="display:flex;justify-content:space-between">
    <div>AI SCORE</div>
    <div style="font-size:28px">82</div>
  </div>
  <div class="bar"><div class="fill"></div></div>
</div>

<div class="log">
  <div style="margin-bottom:8px;font-weight:600">LOG</div>
  <div class="entry queued">QUEUED Order ...</div>
  <div class="entry processing">PROCESSING Order ...</div>
  <div class="entry executed">EXECUTED Order ...</div>
</div>

</div>

<div class="dock">
  <div class="dockInner">
    <div class="dockHead">Quick Dock • auto off • queue 0</div>
    <div class="dockBtns">
      <button class="dockBtn buy">BUY</button>
      <button class="dockBtn sell">SELL</button>
      <button class="dockBtn sync">SYNC</button>
    </div>
  </div>
</div>

</body>
</html>
