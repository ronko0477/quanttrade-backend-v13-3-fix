<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V17 PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#07132d;
  color:#fff;
}

.wrap{
  max-width:800px;
  margin:auto;
  padding:12px;
}

.title{
  text-align:center;
  font-weight:900;
  font-size:22px;
}

.hero{
  background:#1b2b5f;
  padding:16px;
  border-radius:20px;
  text-align:center;
  margin-top:12px;
}

.guard{
  font-size:48px;
  font-weight:900;
}

.pnl{
  font-size:36px;
  margin:10px 0;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.box{
  background:#243a7a;
  padding:10px;
  border-radius:12px;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.chartWrap{
  height:260px;
  margin-top:12px;
}

.log{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.entry{
  background:#2a3d80;
  padding:8px;
  border-radius:10px;
  font-size:13px;
}

.liveOn{background:#4caf50}
.liveOff{background:#b96d5f}
</style>
</head>

<body>
<div class="wrap">

<div class="title">V17 PRO</div>

<div class="hero">
  <div id="guard" class="guard">READY</div>
  <div id="pnl" class="pnl">0.00</div>

  <div class="stats">
    <div class="box">Orders: <span id="orders">0</span></div>
    <div class="box">Cooldown: <span id="cd">0</span></div>
    <div class="box">Wins: <span id="wins">0</span></div>
    <div class="box">Loss: <span id="loss">0</span></div>
    <div class="box">Session: <span id="session">0s</span></div>
    <div class="box">Target: <span id="target">0</span></div>
  </div>
</div>

<div class="chartWrap">
  <canvas id="chart"></canvas>
</div>

<div class="controls">
  <button onclick="act('/api/order')">SEND</button>
  <button onclick="act('/api/win')">WIN</button>
  <button onclick="act('/api/loss')">LOSS</button>
  <button onclick="act('/api/reset')">RESET</button>

  <button onclick="toggleLive()" id="liveBtn" class="liveOn">LIVE ON</button>
  <button onclick="act('/api/cooldown')">COOLDOWN</button>
</div>

<div id="log" class="log"></div>

</div>

<script>
let chart;
let history=[];
let live=true;
let sessionStart=Date.now();

function initChart(){
  const ctx=document.getElementById('chart').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{labels:[],datasets:[{data:[],borderColor:'#4fc3f7'}]},
    options:{responsive:true,maintainAspectRatio:false}
  });
}

function updateChart(v){
  history.push(v);
  if(history.length>50) history.shift();
  chart.data.labels=history.map((_,i)=>i);
  chart.data.datasets[0].data=history;
  chart.update();
}

function log(msg){
  const el=document.createElement('div');
  el.className='entry';
  el.innerText=new Date().toLocaleTimeString()+" - "+msg;
  document.getElementById('log').prepend(el);
}

async function load(){
  try{
    const r=await fetch('/api/status');
    const d=await r.json();

    document.getElementById('guard').innerText=d.guard;
    document.getElementById('pnl').innerText=d.pnl.toFixed(2);
    document.getElementById('orders').innerText=d.ordersToday;
    document.getElementById('cd').innerText=d.cooldownLeft;
    document.getElementById('wins').innerText=d.totalWins;
    document.getElementById('loss').innerText=d.totalLosses;

    document.getElementById('target').innerText=d.pnlTarget||0;

    updateChart(d.pnl);

  }catch(e){}
}

async function act(url){
  await fetch(url,{method:'POST'});
  log(url);
  load();
}

function toggleLive(){
  live=!live;
  const btn=document.getElementById('liveBtn');
  btn.innerText=live?'LIVE ON':'LIVE OFF';
  btn.className=live?'liveOn':'liveOff';
}

setInterval(()=>{
  if(live) load();
  document.getElementById('session').innerText=
    Math.floor((Date.now()-sessionStart)/1000)+'s';
},1000);

initChart();
load();
</script>

</body>
</html>
