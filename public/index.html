<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V19.8.1 HARD LIVE ⚡</title>
  <style>
    :root{
      --bg1:#07144a;
      --bg2:#03103e;
      --card:#1f2d72;
      --card2:#25357f;
      --line:rgba(255,255,255,.08);
      --text:#f4f7ff;
      --muted:#bcc6ea;
      --green:#b7ea98;
      --green2:#9ee28d;
      --red:#efb0b0;
      --red2:#e49f9f;
      --yellow:#e7d27c;
      --cyan:#a9e4ef;
      --blue:#aebcff;
      --dockH:86px;
      --safeBottom:env(safe-area-inset-bottom, 0px);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.04), transparent 24%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrap{
      width:min(920px,100%);
      margin:0 auto;
      padding:18px 18px calc(var(--dockH) + var(--safeBottom) + 44px);
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:900;
      letter-spacing:.4px;
      margin:14px 0 18px;
      text-shadow:0 2px 12px rgba(0,0,0,.25);
    }

    .hero{
      border:1px solid var(--line);
      border-radius:34px;
      background:linear-gradient(180deg, rgba(38,54,132,.96), rgba(29,44,117,.96));
      box-shadow:0 18px 44px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.03);
      padding:18px;
    }

    .heroInner{
      border:1px solid rgba(255,255,255,.06);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(47,61,144,.9), rgba(38,52,129,.9));
      min-height:280px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px 16px;
    }

    .guard{
      font-size:84px;
      line-height:.95;
      font-weight:900;
      letter-spacing:.8px;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .guard.ready{color:var(--green)}
    .guard.locked{color:var(--cyan)}
    .guard.warn{color:var(--yellow)}
    .guard.blocked{color:#e8a5a5}
    .guard.cooldown{color:#a9c8ff}
    . Öl guard.session_limit{
  font-size:52px;
  line-height:1.05;
  word-break:break-word;
  text-align:center;
}

    .guardSub{
      margin-top:8px;
      color:var(--muted);
      font-size:17px;
      font-weight:700;
    }

    .pnl{
      margin-top:14px;
      font-size:86px;
      line-height:1;
      font-weight:900;
    }

    .pnl small{
      display:block;
      margin-top:10px;
      font-size:17px;
      color:var(--muted);
      font-weight:700;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(35,48,123,.96), rgba(29,42,112,.96));
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:0 12px 28px rgba(0,0,0,.16);
    }

    .miniTitle{
      font-size:22px;
      font-weight:900;
      margin-bottom:18px;
    }

    .miniVal{
      font-size:36px;
      font-weight:900;
      line-height:1.05;
    }

    .ok{color:var(--green)}
    .bad{color:#e8a5a5}
    .mid{color:var(--yellow)}
    .muted{color:var(--muted)}

    .actionGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      width:100%;
      min-height:92px;
      border-radius:28px;
      color:#fff;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      transition:transform .12s ease, opacity .12s ease;
    }

    button:active{transform:scale(.985)}
    button:disabled{opacity:.55;cursor:not-allowed}

    .btnBuy{background:linear-gradient(90deg,#a9db9d,#b6e7aa)}
    .btnSell{background:linear-gradient(90deg,#e5b1b1,#e8bebc)}
    .btnWin{background:linear-gradient(90deg,#a9db9d,#b6e7aa)}
    .btnLoss{background:linear-gradient(90deg,#ddb0b0,#ddb5b5)}
    .btnReset{
      background:linear-gradient(90deg,#dacb7d,#e2d58e);
      grid-column:1 / -1;
      min-height:98px;
    }

    .autoGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .autoBtnOn{
      background:linear-gradient(90deg,#aebcff,#b8c5ff);
      min-height:88px;
      font-size:22px;
    }

    .autoBtnOff{
      background:linear-gradient(90deg,#8b94ba,#a1a8ca);
      min-height:88px;
      font-size:22px;
    }

    .infoGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .infoBox{
      background:linear-gradient(180deg, rgba(31,45,114,.96), rgba(26,38,101,.96));
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px 20px;
      min-height:118px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .infoName{
      font-size:18px;
      font-weight:800;
      color:#eef2ff;
      margin-bottom:10px;
    }

    .infoValue{
      font-size:32px;
      font-weight:900;
      line-height:1;
    }

    .scoreCard{
      margin-top:18px;
    }

    .scoreHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .scoreTitle{
      font-size:24px;
      font-weight:900;
    }

    .scoreValue{
      font-size:68px;
      font-weight:900;
      color:#a8e4ef;
      line-height:1;
    }

    .barTrack{
      height:18px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      overflow:hidden;
      margin-bottom:18px;
    }

    .barFill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#e9b4b4,#dfcf81,#b7ea98,#9edfed);
      transition:width .25s ease;
    }

    .factorGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .factor{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px 18px 16px;
      min-height:100px;
    }

    .factorTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .factorName{
      font-size:18px;
      color:var(--muted);
      font-weight:800;
    }

    .factorVal{
      font-size:28px;
      font-weight:900;
    }

    .logCard{
      margin-top:18px;
    }

    .logTitle{
      font-size:22px;
      font-weight:900;
      margin-bottom:12px;
    }

    .log{
      max-height:520px;
      overflow:auto;
      padding-right:4px;
    }

    .entry{
      padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:22px;
      line-height:1.35;
      color:#cfd8ff;
      word-break:break-word;
    }

    .entry:last-child{border-bottom:none}
    .entry.exec{color:#c8dbff}
    .entry.proc{color:#e7d27c}
    .entry.queue{color:#b8c4ff}
    .entry.loss{color:#e7b1b1}
    .entry.win{color:#b7ea98}
    .entry.hard{color:#d8b7ff}
    .entry.auto{color:#aebcff}
    .entry.reset{color:#d9d9d9}

    .dock{
      position:fixed;
      left:18px;
      right:18px;
      bottom:calc(var(--safeBottom) + 6px);
      z-index:50;
      pointer-events:none;
    }

    .dockPanel{
      pointer-events:auto;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(70,88,185,.96), rgba(53,67,150,.96));
      backdrop-filter:blur(10px);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .dockHandle{
      min-height:64px;
      display:flex;
      align-items:center;
      padding:0 22px;
      font-size:20px;
      color:#eef2ff;
      font-weight:500;
      cursor:pointer;
      user-select:none;
    }

    .dockBody{
      max-height:0;
      overflow:hidden;
      transition:max-height .22s ease;
    }

    body.dock-open .dockBody{
      max-height:190px;
    }

    .dockButtons{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      padding:0 14px 14px;
    }

    .dockBtn{
      min-height:52px;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      box-shadow:none;
    }

    .dockBtnBuy{background:linear-gradient(90deg,#a9db9d,#b6e7aa)}
    .dockBtnSell{background:linear-gradient(90deg,#e5b1b1,#e8bebc)}
    .dockBtnReset{background:linear-gradient(90deg,#dacb7d,#e2d58e)}

    @media (max-width:760px){
      .wrap{
        padding:16px 16px calc(var(--dockH) + var(--safeBottom) + 42px);
      }

      .title{
        font-size:26px;
        margin:12px 0 16px;
      }

      .heroInner{
        min-height:250px;
        padding:20px 14px;
      }

      .guard{font-size:72px}
      .guard.session_limit{font-size:56px}
      .guardSub{font-size:15px}
      .pnl{font-size:74px}
      .pnl small{font-size:15px}

      .grid2,
      .actionGrid,
      .autoGrid,
      .infoGrid,
      .factorGrid{
        gap:14px;
      }

      .card{padding:20px}
      .miniTitle{font-size:19px}
      .miniVal{font-size:30px}

      button{
        min-height:84px;
        font-size:22px;
        border-radius:24px;
      }

      .btnReset{min-height:90px}

      .infoBox{
        min-height:108px;
        padding:16px 18px;
      }

      .infoName{font-size:16px}
      .infoValue{font-size:28px}

      .scoreTitle{font-size:21px}
      .scoreValue{font-size:58px}
      .factorName{font-size:16px}
      .factorVal{font-size:24px}

      .entry{
        font-size:18px;
        padding:14px 0;
      }

      .dockHandle{
        min-height:60px;
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">V19.8 HARD LIVE ⚡</div>

    <div class="hero">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="guardSub" class="guardSub">System bereit.</div>
        <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="miniTitle">STATUS</div>
        <div id="statusHealth" class="miniVal ok">OK</div>
      </div>
      <div class="card">
        <div class="miniTitle">BUY POST</div>
        <div id="statusBuy" class="miniVal ok">OK</div>
      </div>
      <div class="card">
        <div class="miniTitle">SELL POST</div>
        <div id="statusSell" class="miniVal ok">OK</div>
      </div>
      <div class="card">
        <div class="miniTitle">CONF</div>
        <div id="conf" class="miniVal mid">62%</div>
      </div>
    </div>

    <div class="actionGrid">
      <button class="btnBuy" onclick="performAction('/api/buy')">BUY</button>
      <button class="btnSell" onclick="performAction('/api/sell')">SELL</button>
      <button class="btnWin" onclick="performAction('/api/win')">WIN</button>
      <button class="btnLoss" onclick="performAction('/api/loss')">LOSS</button>
      <button class="btnReset" onclick="performAction('/api/reset')">RESET</button>
    </div>

    <div class="autoGrid">
      <button class="autoBtnOn" onclick="setAuto(true)">AUTO ON</button>
      <button class="autoBtnOff" onclick="setAuto(false)">AUTO OFF</button>
    </div>

    <div class="infoGrid">
      <div class="infoBox">
        <div class="infoName">QUEUE</div>
        <div id="queueVal" class="infoValue">0</div>
      </div>
      <div class="infoBox">
        <div class="infoName">PROCESSING</div>
        <div id="processingVal" class="infoValue">OFF</div>
      </div>
      <div class="infoBox">
        <div class="infoName">AUTO</div>
        <div id="autoVal" class="infoValue">OFF</div>
      </div>
      <div class="infoBox">
        <div class="infoName">TRIGGER</div>
        <div id="triggerVal" class="infoValue">80</div>
      </div>
    </div>

    <div class="card scoreCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreValue" class="scoreValue">82</div>
      </div>
      <div class="barTrack">
        <div id="scoreBar" class="barFill"></div>
      </div>

      <div class="factorGrid">
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Trend</div>
            <div id="trendVal" class="factorVal mid">72.3</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Volume</div>
            <div id="volumeVal" class="factorVal mid">65.5</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Structure</div>
            <div id="structureVal" class="factorVal ok">80.1</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Volatility</div>
            <div id="volatilityVal" class="factorVal bad">51.2</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Liquidity</div>
            <div id="liquidityVal" class="factorVal ok">81.9</div>
          </div>
        </div>
        <div class="factor">
          <div class="factorTop">
            <div class="factorName">Session</div>
            <div id="sessionVal" class="factorVal mid">68.0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card logCard">
      <div class="logTitle">LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <div class="dock">
    <div class="dockPanel">
      <div class="dockHandle" onclick="toggleDock()">Quick Dock</div>
      <div class="dockBody">
        <div class="dockButtons">
          <button class="dockBtn dockBtnBuy" onclick="performAction('/api/buy')">BUY</button>
          <button class="dockBtn dockBtnSell" onclick="performAction('/api/sell')">SELL</button>
          <button class="dockBtn dockBtnReset" onclick="performAction('/api/reset')">RESET</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'v19_8_hard_live_state';
    const API_BASE = '';

    let app = {
      autoEnabled: false,
      autoTimer: null,
      autoTrigger: 80
    };

    function apiUrl(path){
      return `${API_BASE}${path}`;
    }

    function safeNum(v, fallback = 0){
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    async function getStatus(){
      const r = await fetch(apiUrl('/api/status'), { cache:'no-store' });
      if(!r.ok) throw new Error('status failed');
      return await r.json();
    }

    async function postJSON(path, body = {}){
      const r = await fetch(apiUrl(path), {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
      const txt = await r.text();
      let data = {};
      try { data = JSON.parse(txt); } catch { data = { raw: txt }; }
      if(!r.ok) throw data;
      return data;
    }

    function setText(id,val){
      const el = document.getElementById(id);
      if(el) el.textContent = val;
    }

    function setClass(el, cls){
      el.className = cls;
    }

    function guardClassName(guard){
      const key = String(guard || '').toLowerCase();
      if(key === 'ready') return 'guard ready';
      if(key === 'locked') return 'guard locked';
      if(key === 'warn') return 'guard warn';
      if(key === 'blocked') return 'guard blocked';
      if(key === 'cooldown') return 'guard cooldown';
      if(key === 'session_limit') return 'guard session_limit';
      return 'guard ready';
    }

    function logEntryClass(type){
      const t = String(type || '').toUpperCase();
      if(t.includes('EXECUTED')) return 'entry exec';
      if(t.includes('PROCESSING')) return 'entry proc';
      if(t.includes('QUEUED')) return 'entry queue';
      if(t.includes('LOSS')) return 'entry loss';
      if(t.includes('WIN')) return 'entry win';
      if(t.includes('HARD')) return 'entry hard';
      if(t.includes('AUTO')) return 'entry auto';
      if(t.includes('RESET')) return 'entry reset';
      return 'entry';
    }

    function formatLogLine(item){
      if(typeof item === 'string') return item;
      const ts = item.ts || item.time || '';
      const type = item.type || '';
      const msg = item.msg || '';
      if(ts && type && msg) return `${shortTime(ts)} - ${type} ${msg}`;
      if(ts && msg) return `${shortTime(ts)} - ${msg}`;
      return msg || JSON.stringify(item);
    }

    function shortTime(ts){
      try{
        const d = new Date(ts);
        return d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      }catch{
        return ts;
      }
    }

    function renderLog(log){
      const el = document.getElementById('log');
      const items = Array.isArray(log) ? log : [];
      el.innerHTML = items.map(item => {
        const type = (item && item.type) || '';
        return `<div class="${logEntryClass(type)}">${formatLogLine(item)}</div>`;
      }).join('');
    }

    function renderStatus(data){
      const guard = String(data.guard || 'READY');
      const reasonHint = data.reasonHint || 'System bereit.';
      const pnl = safeNum(data.pnl).toFixed(2);

      const guardEl = document.getElementById('guard');
      guardEl.className = guardClassName(guard);
      guardEl.textContent = guard;

      setText('guardSub', reasonHint);
      document.getElementById('pnl').innerHTML = `${pnl}<small>Net PnL</small>`;

      setText('statusHealth', 'OK');
      document.getElementById('statusHealth').className = 'miniVal ok';

      const buyOk = true;
      const sellOk = true;

      setText('statusBuy', buyOk ? 'OK' : 'FAIL');
      document.getElementById('statusBuy').className = buyOk ? 'miniVal ok' : 'miniVal bad';

      setText('statusSell', sellOk ? 'OK' : 'FAIL');
      document.getElementById('statusSell').className = sellOk ? 'miniVal ok' : 'miniVal bad';

      const conf = 62;
      setText('conf', `${conf}%`);

      setText('queueVal', safeNum(data.queueLength).toString());
      setText('processingVal', data.processing ? 'ON' : 'OFF');
      setText('autoVal', app.autoEnabled ? 'ON' : 'OFF');
      setText('triggerVal', app.autoTrigger);

      const trend = 72.3;
      const volume = 65.5;
      const structure = 80.1;
      const volatility = 51.2;
      const liquidity = 81.9;
      const session = 68.0;
      const score = 82;

      setText('scoreValue', score);
      document.getElementById('scoreBar').style.width = `${score}%`;

      setText('trendVal', trend.toFixed(1));
      setText('volumeVal', volume.toFixed(1));
      setText('structureVal', structure.toFixed(1));
      setText('volatilityVal', volatility.toFixed(1));
      setText('liquidityVal', liquidity.toFixed(1));
      setText('sessionVal', session.toFixed(1));

      renderLog(data.log || []);

      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        autoEnabled: app.autoEnabled
      }));
    }

    async function runHealthChecks(){
      try{
        await postJSON('/api/buy', { dryRun:true });
      } catch {}

      try{
        await postJSON('/api/sell', { dryRun:true });
      } catch {}

      try{
        const data = await getStatus();
        renderStatus(data);
      } catch (e) {
        console.error(e);
      }
    }

    async function performAction(url){
      try{
        const data = await postJSON(url, {});
        renderStatus(data.status || data);

        if(url === '/api/reset'){
          setTimeout(async () => {
            await runHealthChecks();
          }, 300);
        }
      } catch (e) {
        console.error(e);
      }
    }

    function setAuto(on){
      app.autoEnabled = !!on;
      if(app.autoTimer) clearInterval(app.autoTimer);
      if(app.autoEnabled){
        app.autoTimer = setInterval(async () => {
          try{
            const s = await getStatus();
            renderStatus(s);

            if(String(s.guard || '') !== 'READY') return;
            if(s.processing) return;
            if(s.queueLength > 0) return;

            const score = 82;
            if(score >= app.autoTrigger){
              await performAction('/api/buy');
            }
          } catch (e) {
            console.error(e);
          }
        }, 4000);
      }
      getStatus().then(renderStatus).catch(console.error);
    }

    function toggleDock(){
      document.body.classList.toggle('dock-open');
    }

    async function boot(){
      try{
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        app.autoEnabled = !!saved.autoEnabled;
      } catch {}

      await runHealthChecks();

      setInterval(async () => {
        try{
          const data = await getStatus();
          renderStatus(data);
        } catch (e) {
          console.error(e);
        }
      }, 2000);

      if(app.autoEnabled) setAuto(true);
    }

    boot();
  </script>
</body>
</html>
