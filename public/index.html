<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V19.8.10 HARD LIVE ⚡</title>

<style>
{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/ 🔥 Dark App Background /
body{
  background:linear-gradient(180deg,#05070f,#0a0f1f);
  color:#fff;
  padding:14px;
}

/ Header /
h1{
  text-align:center;
  margin-bottom:14px;
  font-size:18px;
  opacity:.9;
}

/ Cards /
.card{
  background:linear-gradient(180deg,#1b2350,#161c3a);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}

/ MAIN PANEL /
.main{
  text-align:center;
  padding:24px 12px;
}

.main h2{
  font-size:48px;
  color:#a8e07a;
}

.pnl{
  font-size:42px;
  margin:8px 0;
}

/ GRID /
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/ STATUS BOX /
.box{
  padding:14px;
  border-radius:16px;
  background:linear-gradient(180deg,#1e2760,#171e45);
  text-align:center;
}

.box span{
  display:block;
  font-size:14px;
  opacity:.7;
}

.box b{
  font-size:18px;
}

/ BUTTONS (🔧 kleiner & cleaner) /
.btn{
  min-height:72px;
  font-size:18px;
  border:none;
  border-radius:18px;
  font-weight:600;
  color:#fff;
}

/ MOBILE EXTRA /
@media(max-width:760px){
  .btn{
    min-height:64px;
    font-size:16px;
  }
}

/ 🎯 Weniger grelle Farben /
.buy{
  background:linear-gradient(90deg,#8fc97a,#a8d694);
}

.sell{
  background:linear-gradient(90deg,#c9aaaa,#d4b8b8);
}

.win{
  background:linear-gradient(90deg,#8ac978,#a2d38f);
}

.loss{
  background:linear-gradient(90deg,#c2a0a0,#cfb1b1);
}

.reset{
  background:linear-gradient(90deg,#b7aa66,#c9bd75);
  color:#fff;
}

/ AI SCORE /
.ai{
  padding:16px;
}

.bar{
  height:10px;
  border-radius:10px;
  background:#333;
  overflow:hidden;
  margin-top:8px;
}

.bar div{
  height:100%;
  width:82%;
  background:linear-gradient(90deg,#ffb199,#8fd3f4);
}

/ LOG /
.log{
  font-size:13px;
  opacity:.85;
  line-height:1.4;
}

/ QUICK DOCK */
.dock{
  position:fixed;
  bottom:14px;
  left:10px;
  right:10px;
  background:linear-gradient(180deg,#5d6df0,#4a5bd6);
  border-radius:20px;
  padding:12px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.dock small{
  opacity:.7;
}
</style>

</head>

<body>

<h1>V19.8.10 HARD LIVE ⚡</h1>

<div class="card main">
  <h2>READY</h2>
  <div class="pnl">0.00</div>
  <small>Net PnL</small>
</div>

<div class="grid">
  <div class="box"><span>STATUS</span><b>OK</b></div>
  <div class="box"><span>BUY POST</span><b>OK</b></div>
  <div class="box"><span>SELL POST</span><b>OK</b></div>
  <div class="box"><span>CONF</span><b>62%</b></div>
</div>

<br>

<div class="grid">
  <button class="btn buy">BUY</button>
  <button class="btn sell">SELL</button>
  <button class="btn win">WIN</button>
  <button class="btn loss">LOSS</button>
</div>

<br>

<button class="btn reset" style="width:100%">RESET</button>

<br><br>

<div class="grid">
  <div class="box"><span>AUTO ON</span><b>AUTO ON</b></div>
  <div class="box"><span>AUTO OFF</span><b>AUTO OFF</b></div>
  <div class="box"><span>QUEUE</span><b>0</b></div>
  <div class="box"><span>PROCESSING</span><b>OFF</b></div>
  <div class="box"><span>AUTO</span><b>OFF</b></div>
  <div class="box"><span>TRIGGER</span><b>80</b></div>
</div>

<br>

<div class="card ai">
  <div style="display:flex;justify-content:space-between;">
    <b>AI SCORE</b>
    <b style="font-size:28px">82</b>
  </div>
  <div class="bar"><div></div></div>
</div>

<div class="card log">
  Keine Einträge.
</div>

<div class="dock">
  <b>Quick Dock</b><br>
  <small>auto off • queue 0</small>
</div>

</body>
</html>
