<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>V20.1 HARD LIVE</title>
  <style>
    :root{
      --bg:#02040a;
      --panel:#252f79;
      --panelDeep:#1a2256;
      --panelHero1:#6473ea;
      --panelHero2:#3a49b2;
      --line:rgba(255,255,255,.07);
      --text:#f5f7ff;
      --muted:#bec5df;
      --green:#b9d99b;
      --red:#dfb8b8;
      --yellow:#ddd08a;
      --cyan:#afd8ef;
      --shadow:0 18px 42px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 11%, rgba(87,103,232,.12), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(20,33,105,.09), transparent 34%),
        linear-gradient(180deg,#010309 0%,#020713 100%);
    }

    .wrap{
      width:min(100%,460px);
      margin:0 auto;
      padding:12px 10px 28px;
    }

    .title{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-align:center;
      font-size:25px;
      font-weight:1000;
      letter-spacing:.35px;
      margin:2px 0 14px;
      text-shadow:0 2px 12px rgba(0,0,0,.34);
    }

    .liveDot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#8ef0ba;
      box-shadow:0 0 0 0 rgba(142,240,186,.55);
      animation:pulseDot 1.8s infinite;
      flex:0 0 auto;
    }

    @keyframes pulseDot{
      0%{box-shadow:0 0 0 0 rgba(142,240,186,.55)}
      70%{box-shadow:0 0 0 10px rgba(142,240,186,0)}
      100%{box-shadow:0 0 0 0 rgba(142,240,186,0)}
    }

    .hero{
      position:relative;
      border-radius:26px;
      padding:12px;
      background:linear-gradient(180deg, rgba(99,115,234,.95), rgba(58,73,178,.94));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,.10), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 28%);
      pointer-events:none;
    }

    .heroInner{
      position:relative;
      z-index:1;
      min-height:228px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:18px 14px;
    }

    .guard{
      margin:0;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:.9;
      letter-spacing:-1.8px;
      font-size:78px;
      font-weight:1000;
    }
    .guard.ready{color:var(--green)}
    .guard.warn{color:#bfd9ef}
    .guard.block{color:var(--yellow)}
    .guard.fail{color:#e2b4b4}

    .heroHint{
      margin-top:8px;
      min-height:22px;
      font-size:15px;
      font-weight:800;
      color:rgba(255,255,255,.72);
    }

    .pnl{
      margin-top:9px;
      font-size:78px;
      line-height:.94;
      letter-spacing:-2.2px;
      font-weight:1000;
    }

    .pnlSub{
      margin-top:4px;
      font-size:18px;
      font-weight:900;
      color:rgba(255,255,255,.76);
    }

    .heroMeta{
      margin-top:12px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:7px 12px;
      background:rgba(11,17,48,.18);
      border:1px solid rgba(255,255,255,.06);
      font-size:12px;
      font-weight:900;
      color:rgba(255,255,255,.78);
    }

    .grid2{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .card{
      min-height:108px;
      border-radius:22px;
      padding:15px 18px;
      background:linear-gradient(180deg, rgba(46,58,145,.98), rgba(29,39,101,.98));
      border:1px solid var(--line);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .cardLabel{
      font-size:16px;
      font-weight:900;
      color:rgba(255,255,255,.72);
      margin-bottom:8px;
      line-height:1;
      letter-spacing:.15px;
    }

    .cardVal{
      font-size:27px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.45px;
    }

    .ok{color:var(--green)}
    .fail{color:#e2b1b1}
    .mid{color:var(--yellow)}
    .ice{color:var(--cyan)}

    .actionGrid{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    button{
      border:none;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
      font-family:inherit;
      cursor:pointer;
      transition:transform .08s ease, opacity .15s ease, filter .15s ease, box-shadow .18s ease;
    }

    button:active{transform:scale(.985)}
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter:grayscale(.2) brightness(.85);
      box-shadow:none !important;
    }

    .actBtn{
      min-height:62px;
      border-radius:18px;
      font-size:15px;
      font-weight:1000;
      letter-spacing:.18px;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.15);
    }

    .actBtn.flash{
      animation:btnFlash .34s ease;
    }

    @keyframes btnFlash{
      0%{transform:scale(1)}
      35%{transform:scale(.98)}
      70%{transform:scale(1.015)}
      100%{transform:scale(1)}
    }

    .buyBtn,.winBtn{
      background:linear-gradient(90deg,#b9dca3,#a7d08f);
      color:#fff;
    }

    .sellBtn,.lossBtn{
      background:linear-gradient(90deg,#dcc8c8,#d2c0c0);
      color:#fff;
    }

    .resetBtn{
      grid-column:1 / -1;
      min-height:64px;
      background:linear-gradient(90deg,#d7cf8d,#d9d18c);
      color:#fff;
    }

    .miniGrid{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .miniCard, .miniBtn{
      min-height:90px;
      border-radius:22px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(46,58,145,.98), rgba(29,39,101,.98));
      border:1px solid var(--line);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      display:flex;
      flex-direction:column;
      justify-content:center;
      color:var(--text);
    }

    .miniTop{
      font-size:12px;
      font-weight:1000;
      color:rgba(255,255,255,.88);
      margin-bottom:8px;
      line-height:1;
      letter-spacing:.15px;
    }

    .miniBig{
      font-size:23px;
      line-height:1;
      font-weight:1000;
      letter-spacing:-.35px;
    }

    .miniBtn.active{
      box-shadow:var(--okGlow), 0 10px 24px rgba(0,0,0,.22);
    }

    .scoreCard{
      margin-top:12px;
      border-radius:24px;
      padding:16px;
      background:linear-gradient(180deg, rgba(71,85,198,.94), rgba(50,63,158,.94));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
    }

    .scoreHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
      margin-bottom:8px;
    }

    .scoreTitle{
      font-size:18px;
      font-weight:1000;
      line-height:1;
      letter-spacing:.18px;
      color:#f6f8ff;
    }

    .scoreVal{
      font-size:68px;
      line-height:.86;
      font-weight:1000;
      letter-spacing:-2px;
      color:var(--cyan);
    }

    .barTrack{
      height:16px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.05);
    }

    .barFill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#e6b7b3 0%,#dbd389 30%,#b7db98 60%,#a9d8ef 100%);
      transition:width .25s ease;
    }

    .factorGrid{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .factor{
      min-height:86px;
      border-radius:20px;
      padding:13px 14px;
      background:rgba(26,36,108,.46);
      border:1px solid rgba(255,255,255,.05);
      display:flex;
      flex-direction:column;
      justify-content:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }

    .factorTop{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.68);
      margin-bottom:8px;
      line-height:1;
    }

    .factorVal{
      font-size:24px;
      font-weight:1000;
      letter-spacing:-.35px;
      line-height:1;
    }

    .logCard{
      margin-top:12px;
      border-radius:24px;
      padding:16px;
      background:linear-gradient(180deg, rgba(42,54,137,.98), rgba(30,41,106,.98));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 12px 26px rgba(0,0,0,.24);
    }

    .logHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .logTitle{
      font-size:19px;
      font-weight:1000;
      line-height:1;
      color:#f6f8ff;
      letter-spacing:.16px;
    }

    .syncBadge{
      font-size:11px;
      font-weight:1000;
      color:rgba(255,255,255,.72);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
    }

    .logList{
      max-height:360px;
      overflow:auto;
      padding-right:4px;
      scrollbar-width:thin;
    }

    .logEntry{
      padding:11px 2px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
      line-height:1.38;
      word-break:break-word;
      color:rgba(243,246,255,.92);
    }
    .logEntry:last-child{border-bottom:none}
    .logQueued{color:#dbe0f8}
    .logProcessing{color:#e4cf84}
    .logExecuted{color:#eef2ff}
    .logWin{color:var(--green)}
    .logLoss{color:#e3b1b1}
    .logReset{color:#eef2ff}
    .logSystem{color:#d6ddf7}

    @media (max-width:420px){
      .wrap{padding-left:10px;padding-right:10px}
      .title{font-size:22px;margin-bottom:12px}
      .hero{padding:10px}
      .heroInner{min-height:210px}
      .guard{font-size:68px}
      .heroHint{font-size:14px}
      .pnl{font-size:68px}
      .pnlSub{font-size:16px}
      .grid2,.actionGrid,.miniGrid{gap:10px}
      .card{min-height:100px;padding:14px 16px}
      .cardLabel{font-size:15px}
      .cardVal{font-size:25px}
      .actBtn{min-height:58px;font-size:14px}
      .resetBtn{min-height:60px}
      .miniCard,.miniBtn{min-height:84px}
      .miniBig{font-size:21px}
      .scoreVal{font-size:60px}
      .factor{min-height:80px}
      .factorVal{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <span>V20.1 HARD LIVE ⚡</span>
      <span class="liveDot"></span>
    </div>

    <section class="hero">
      <div class="heroInner">
        <div id="guard" class="guard ready">READY</div>
        <div id="heroHint" class="heroHint">System bereit.</div>
        <div id="pnl" class="pnl">0</div>
        <div class="pnlSub">Net PnL</div>
        <div class="heroMeta">
          <span id="heroMetaText">LIVE</span>
        </div>
      </div>
    </section>

    <section class="grid2">
      <div class="card">
        <div class="cardLabel">STATUS</div>
        <div id="healthStatus" class="cardVal ok">OK</div>
      </div>
      <div class="card">
        <div class="cardLabel">BUY POST</div>
        <div id="healthBuy" class="cardVal ok">OK</div>
      </div>
      <div class="card">
        <div class="cardLabel">SELL POST</div>
        <div id="healthSell" class="cardVal ok">OK</div>
      </div>
      <div class="card">
        <div class="cardLabel">CONF</div>
        <div id="confVal" class="cardVal mid">62%</div>
      </div>
    </section>

    <section class="actionGrid">
      <button id="btnBuy" class="actBtn buyBtn">BUY</button>
      <button id="btnSell" class="actBtn sellBtn">SELL</button>
      <button id="btnWin" class="actBtn winBtn">WIN</button>
      <button id="btnLoss" class="actBtn lossBtn">LOSS</button>
      <button id="btnReset" class="actBtn resetBtn">RESET</button>
    </section>

    <section class="miniGrid">
      <button id="autoOnBtn" class="miniBtn">
        <div class="miniTop">AUTO ON</div>
        <div class="miniBig ice">AUTO ON</div>
      </button>
      <button id="autoOffBtn" class="miniBtn">
        <div class="miniTop">AUTO OFF</div>
        <div class="miniBig">AUTO OFF</div>
      </button>

      <div class="miniCard">
        <div class="miniTop">QUEUE</div>
        <div id="queueVal" class="miniBig">0</div>
      </div>
      <div class="miniCard">
        <div class="miniTop">PROCESSING</div>
        <div id="processingVal" class="miniBig">OFF</div>
      </div>
    </section>

    <section class="scoreCard">
      <div class="scoreHead">
        <div class="scoreTitle">AI SCORE</div>
        <div id="scoreVal" class="scoreVal">82</div>
      </div>
      <div class="barTrack">
        <div id="scoreBar" class="barFill"></div>
      </div>

      <div class="factorGrid">
        <div class="factor">
          <div class="factorTop">Trend</div>
          <div id="trendVal" class="factorVal mid">72.3</div>
        </div>
        <div class="factor">
          <div class="factorTop">Volume</div>
          <div id="volumeVal" class="factorVal mid">65.5</div>
        </div>
        <div class="factor">
          <div class="factorTop">Structure</div>
          <div id="structureVal" class="factorVal ok">80.1</div>
        </div>
        <div class="factor">
          <div class="factorTop">Volatility</div>
          <div id="volatilityVal" class="factorVal fail">51.2</div>
        </div>
        <div class="factor">
          <div class="factorTop">Liquidity</div>
          <div id="liquidityVal" class="factorVal ok">81.9</div>
        </div>
        <div class="factor">
          <div class="factorTop">Session</div>
          <div id="sessionVal" class="factorVal mid">68.0</div>
        </div>
      </div>
    </section>

    <section class="logCard">
      <div class="logHead">
        <div class="logTitle">LOG</div>
        <div id="syncBadge" class="syncBadge">SYNC</div>
      </div>
      <div id="logList" class="logList">
        <div class="logEntry">Keine Einträge.</div>
      </div>
    </section>
  </div>

  <script>
    const fallbackState = {
      pnl:0,
      guard:'READY',
      reasonHint:'System bereit.',
      processing:false,
      queueLength:0,
      confidence:62,
      score:82,
      autoEnabled:false,
      health:{ status:true, buy:true, sell:true },
      factors:{
        trend:72.3,
        volume:65.5,
        structure:80.1,
        volatility:51.2,
        liquidity:81.9,
        session:68.0
      },
      log:[]
    };

    const $ = id => document.getElementById(id);

    const els = {
      guard:$('guard'),
      heroHint:$('heroHint'),
      heroMetaText:$('heroMetaText'),
      pnl:$('pnl'),
      healthStatus:$('healthStatus'),
      healthBuy:$('healthBuy'),
      healthSell:$('healthSell'),
      confVal:$('confVal'),
      queueVal:$('queueVal'),
      processingVal:$('processingVal'),
      scoreVal:$('scoreVal'),
      scoreBar:$('scoreBar'),
      trendVal:$('trendVal'),
      volumeVal:$('volumeVal'),
      structureVal:$('structureVal'),
      volatilityVal:$('volatilityVal'),
      liquidityVal:$('liquidityVal'),
      sessionVal:$('sessionVal'),
      logList:$('logList'),
      syncBadge:$('syncBadge'),
      autoOnBtn:$('autoOnBtn'),
      autoOffBtn:$('autoOffBtn'),
      btnBuy:$('btnBuy'),
      btnSell:$('btnSell'),
      btnWin:$('btnWin'),
      btnLoss:$('btnLoss'),
      btnReset:$('btnReset')
    };

    function safeNum(v, fb=0){
      const n = Number(v);
      return Number.isFinite(n) ? n : fb;
    }

    function fmtPnL(v){
      const n = safeNum(v,0);
      return Number.isInteger(n) ? String(n) : n.toFixed(2);
    }

    function shortGuard(raw){
      const g = String(raw || '').toUpperCase().trim();
      if(g === 'READY' || g === 'SYSTEM_READY') return 'READY';
      if(g.includes('SESSION')) return 'SESSION...';
      if(g.includes('BLOCK') || g.includes('LOCK')) return 'LOCKED';
      if(g.includes('COOL')) return 'COOL...';
      if(g.includes('WARN')) return 'WARN...';
      if(g.includes('LOSS')) return 'LOSS...';
      return g || 'READY';
    }

    function guardClass(raw){
      const g = String(raw || '').toUpperCase();
      if(g.includes('READY')) return 'ready';
      if(g.includes('SESSION')) return 'block';
      if(g.includes('BLOCK') || g.includes('LOCK') || g.includes('LOSS')) return 'fail';
      return 'warn';
    }

    function boolText(v){ return v ? 'OK' : 'FAIL'; }
    function boolClass(v){ return v ? 'ok' : 'fail'; }

    function factorClass(v){
      const n = safeNum(v);
      if(n >= 75) return 'ok';
      if(n >= 60) return 'mid';
      return 'fail';
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function deriveHealth(state){
      const g = String(state.guard || '').toUpperCase();
      const tradable = g === 'READY' || g === 'SYSTEM_READY';
      return {
        status:true,
        buy:tradable,
        sell:tradable
      };
    }

    function normalizeState(api){
      const s = JSON.parse(JSON.stringify(fallbackState));

      s.pnl = safeNum(api.pnl, 0);
      s.guard = String(api.guard || api.reason || 'READY');
      s.reasonHint = String(api.reasonHint || api.label || 'System bereit.');
      s.processing = !!api.processing;
      s.queueLength = safeNum(api.queueLength, Array.isArray(api.queue) ? api.queue.length : 0);
      s.confidence = safeNum(api.confidence, 62);
      s.score = safeNum(api.score, api.aiScore ?? 82);
      s.autoEnabled = !!api.autoEnabled;

      s.health = api.health || deriveHealth(s);

      s.factors = {
        trend: safeNum(api.trend, api.factors?.trend ?? 72.3),
        volume: safeNum(api.volume, api.factors?.volume ?? 65.5),
        structure: safeNum(api.structure, api.factors?.structure ?? 80.1),
        volatility: safeNum(api.volatility, api.factors?.volatility ?? 51.2),
        liquidity: safeNum(api.liquidity, api.factors?.liquidity ?? 81.9),
        session: safeNum(api.session, api.factors?.session ?? 68.0)
      };

      s.log = Array.isArray(api.log) ? api.log.slice().reverse() : [];
      return s;
    }

    function renderHealth(el, ok){
      el.textContent = boolText(ok);
      el.className = `cardVal ${boolClass(ok)}`;
    }

    function renderFactor(el, value){
      el.textContent = safeNum(value).toFixed(1);
      el.className = `factorVal ${factorClass(value)}`;
    }

    function formatLogTime(input){
      if(!input) return '--:--:--';

      const str = String(input);
      if (/^\d{2}:\d{2}:\d{2}$/.test(str)) return str;

      const d = new Date(str);
      if (!Number.isNaN(d.getTime())) {
        const hh = String(d.getHours()).padStart(2,'0');
        const mm = String(d.getMinutes()).padStart(2,'0');
        const ss = String(d.getSeconds()).padStart(2,'0');
        return `${hh}:${mm}:${ss}`;
      }

      return str;
    }

    function renderLog(log){
      if(!Array.isArray(log) || !log.length){
        els.logList.innerHTML = `<div class="logEntry">Keine Einträge.</div>`;
        return;
      }

      const html = log.slice(0, 24).map(item=>{
        const type = String(item.type || '').toUpperCase();
        const time = escapeHtml(formatLogTime(item.localTime || item.time || item.ts));
        const msg = escapeHtml(item.msg || item.message || '-');

        let cls = 'logSystem';
        if(type.includes('QUEUE')) cls = 'logQueued';
        else if(type.includes('PROCESS')) cls = 'logProcessing';
        else if(type.includes('EXECUT')) cls = 'logExecuted';
        else if(type.includes('WIN')) cls = 'logWin';
        else if(type.includes('LOSS')) cls = 'logLoss';
        else if(type.includes('RESET')) cls = 'logReset';

        return `<div class="logEntry ${cls}">${time} - ${msg}</div>`;
      }).join('');

      els.logList.innerHTML = html;
    }

    function pulseButton(el){
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    }

    function renderMeta(state){
      const q = safeNum(state.queueLength, 0);
      if (String(state.guard).toUpperCase().includes('SESSION')) {
        els.heroMetaText.textContent = 'SESSION LIMIT';
      } else if (state.processing || q > 0) {
        els.heroMetaText.textContent = `QUEUE ${q}`;
      } else if (state.autoEnabled) {
        els.heroMetaText.textContent = 'AUTO ON';
      } else {
        els.heroMetaText.textContent = 'LIVE';
      }
    }

    function renderAuto(state){
      els.autoOnBtn.classList.toggle('active', !!state.autoEnabled);
      els.autoOffBtn.classList.toggle('active', !state.autoEnabled);
    }

    function render(state){
      els.guard.textContent = shortGuard(state.guard);
      els.guard.className = `guard ${guardClass(state.guard)}`;
      els.heroHint.textContent = state.reasonHint || 'System bereit.';
      els.pnl.textContent = fmtPnL(state.pnl);

      renderHealth(els.healthStatus, !!state.health.status);
      renderHealth(els.healthBuy, !!state.health.buy);
      renderHealth(els.healthSell, !!state.health.sell);

      els.confVal.textContent = `${safeNum(state.confidence,62)}%`;
      els.queueVal.textContent = String(safeNum(state.queueLength,0));
      els.processingVal.textContent = state.processing ? 'ON' : 'OFF';

      const score = Math.max(0, Math.min(100, safeNum(state.score,82)));
      els.scoreVal.textContent = String(Math.round(score));
      els.scoreBar.style.width = `${score}%`;

      renderFactor(els.trendVal, state.factors.trend);
      renderFactor(els.volumeVal, state.factors.volume);
      renderFactor(els.structureVal, state.factors.structure);
      renderFactor(els.volatilityVal, state.factors.volatility);
      renderFactor(els.liquidityVal, state.factors.liquidity);
      renderFactor(els.sessionVal, state.factors.session);

      renderMeta(state);
      renderAuto(state);
      renderLog(state.log);

      const disableTrades = state.processing || !state.health.buy || !state.health.sell;
      els.btnBuy.disabled = disableTrades;
      els.btnSell.disabled = disableTrades;
    }

    async function getStatus(){
      const res = await fetch('/api/status', { cache:'no-store' });
      if(!res.ok) throw new Error('status failed');
      return await res.json();
    }

    async function postJSON(url, body={}){
      const res = await fetch(url, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify(body)
      });
      if(!res.ok) throw new Error(`${url} failed`);
      return await res.json();
    }

    async function performAction(url, btn){
      try{
        if (btn) pulseButton(btn);
        const data = await postJSON(url,{});
        render(normalizeState(data.status || data));
        if(url === '/api/reset'){
          setTimeout(syncNow, 260);
        }
      }catch(e){
        console.error(e);
      }
    }

    async function syncNow(){
      els.syncBadge.textContent = 'SYNC...';
      try{
        const data = await getStatus();
        render(normalizeState(data));
        els.syncBadge.textContent = 'SYNC OK';
      }catch(e){
        console.error(e);
        els.syncBadge.textContent = 'SYNC FAIL';
      }
    }

    els.btnBuy.onclick = () => performAction('/api/buy', els.btnBuy);
    els.btnSell.onclick = () => performAction('/api/sell', els.btnSell);
    els.btnWin.onclick = () => performAction('/api/win', els.btnWin);
    els.btnLoss.onclick = () => performAction('/api/loss', els.btnLoss);
    els.btnReset.onclick = () => performAction('/api/reset', els.btnReset);

    els.autoOnBtn.onclick = () => performAction('/api/auto/on', els.autoOnBtn);
    els.autoOffBtn.onclick = () => performAction('/api/auto/off', els.autoOffBtn);

    render(fallbackState);
    syncNow();
    setInterval(syncNow, 2200);
  </script>
</body>
</html>
