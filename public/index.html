<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V19.4 HARD LIVE</title>
  <style>
    :root{
      --bg1:#04133d;
      --bg2:#020a25;
      --card:#1c2864;
      --line:rgba(255,255,255,.08);
      --text:#f3f6ff;
      --muted:#a9b3df;
      --green:#9cf0a8;
      --red:#ff9b9b;
      --yellow:#f4da7a;
      --blue:#9fd8ff;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, #0b1f67 0%, #05113b 38%, #02081f 100%);
    }

    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:18px 14px 120px;
    }

    .title{
      text-align:center;
      font-size:24px;
      font-weight:900;
      margin:8px 0 18px;
      letter-spacing:.4px;
    }

    .card{
      background:rgba(28,40,100,.96);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:0 14px 36px rgba(0,0,0,.24);
    }

    .hero{
      padding:26px 18px;
      text-align:center;
    }

    .guard{
      font-size:72px;
      font-weight:900;
      line-height:1;
    }

    .guard.ready{color:var(--green)}
    .guard.warn{color:var(--yellow)}
    .guard.blocked{color:var(--red)}
    .guard.locked{color:var(--blue)}
    .guard.cooldown{color:var(--yellow)}
    .guard.session_limit{color:var(--yellow)}

    .pnl{
      margin-top:10px;
      font-size:60px;
      font-weight:900;
      line-height:1;
    }

    .pnl small{
      display:block;
      font-size:14px;
      color:var(--muted);
      margin-top:10px;
      font-weight:700;
    }

    .grid4{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }

    .mini{
      padding:22px 20px;
      border-radius:22px;
      background:rgba(28,40,100,.96);
      border:1px solid var(--line);
      min-height:118px;
    }

    .miniLabel{
      font-size:17px;
      font-weight:900;
      margin-bottom:14px;
    }

    .miniVal{
      font-size:34px;
      line-height:1.1;
    }

    .actions{
      margin-top:16px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .actions .full{
      grid-column:1 / -1;
    }

    button{
      width:100%;
      min-height:74px;
      border:none;
      border-radius:22px;
      color:#fff;
      font-weight:900;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
      transition:transform .14s ease, opacity .14s ease, filter .14s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:scale(.985)}
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter:grayscale(.15);
    }

    .btnBuy{background:linear-gradient(90deg,#8adf97,#9cf0a8)}
    .btnSell{background:linear-gradient(90deg,#ef9c9c,#e7b0b0)}
    .btnWin{background:linear-gradient(90deg,#95e2a4,#a9efb4)}
    .btnLoss{background:linear-gradient(90deg,#d58e8e,#e5b1b1)}
    .btnReset{background:linear-gradient(90deg,#e7cf73,#f0df92)}
    .btnSecondary{background:linear-gradient(90deg,#8897ff,#b09cff)}

    .logCard{
      margin-top:16px;
      padding:22px 20px;
      min-height:220px;
    }

    .logTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:14px;
    }

    .log{
      max-height:260px;
      overflow:auto;
      color:#d9def8;
      line-height:1.55;
      font-size:16px;
    }

    .dock{
      position:fixed;
      left:14px;
      right:14px;
      bottom:16px;
      z-index:60;
    }

    .dockPanel{
      background:rgba(28,40,100,.96);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:0 14px 36px rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .dockHandle{
      padding:18px 18px;
      font-size:18px;
      color:#e6ebff;
      cursor:pointer;
      user-select:none;
    }

    .dockBody{
      max-height:0;
      overflow:hidden;
      transition:max-height .25s ease;
    }

    body.dock-open .dockBody{
      max-height:220px;
    }

    .dockBtns{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      padding:0 14px 14px;
    }

    .dockBtns button{
      min-height:54px;
      font-size:16px;
      border-radius:16px;
    }

    .ok{color:var(--green)!important}
    .mid{color:var(--yellow)!important}
    .bad{color:var(--red)!important}

    @media (max-width:760px){
      .guard{font-size:62px}
      .pnl{font-size:48px}
      .miniVal{font-size:30px}
      button{min-height:66px;font-size:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">V19.4 HARD LIVE ⚡</div>

    <div class="card hero">
      <div id="guard" class="guard ready">READY</div>
      <div id="pnl" class="pnl">0.00<small>Net PnL</small></div>
    </div>

    <div class="grid4">
      <div class="mini">
        <div class="miniLabel">STATUS</div>
        <div id="healthStatus" class="miniVal mid">CHECK</div>
      </div>

      <div class="mini">
        <div class="miniLabel">BUY POST</div>
        <div id="healthBuy" class="miniVal mid">CHECK</div>
      </div>

      <div class="mini">
        <div class="miniLabel">SELL POST</div>
        <div id="healthSell" class="miniVal mid">CHECK</div>
      </div>

      <div class="mini">
        <div class="miniLabel">CONF</div>
        <div id="confBox" class="miniVal mid">62%</div>
      </div>
    </div>

    <div class="actions">
      <button id="btnBuy" class="btnBuy" onclick="performAction('/api/buy')">BUY</button>
      <button id="btnSell" class="btnSell" onclick="performAction('/api/sell')">SELL</button>

      <button id="btnWin" class="btnWin" onclick="performAction('/api/win')">WIN</button>
      <button id="btnLoss" class="btnLoss" onclick="performAction('/api/loss')">LOSS</button>

      <button id="btnReset" class="btnReset full" onclick="performAction('/api/reset')">RESET</button>
    </div>

    <div class="logCard card">
      <div class="logTitle">LOG</div>
      <div id="log" class="log">keine Einträge</div>
    </div>
  </div>

  <div class="dock">
    <div class="dockPanel">
      <div class="dockHandle" onclick="toggleDock()">Quick Dock</div>
      <div class="dockBody">
        <div class="dockBtns">
          <button class="btnBuy" onclick="performAction('/api/buy')">BUY</button>
          <button class="btnSell" onclick="performAction('/api/sell')">SELL</button>
          <button class="btnSecondary" onclick="toggleAutoMode()">AUTO</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    const state = {
      autoEnabled:false,
      autoTrades:0,
      confidence:62,
      backendMode:'checking',
      side:'NONE',
      pnl:0
    };

    function apiUrl(path){
      return `${API_BASE}${path}`;
    }

    function setText(id, val){
      const el = document.getElementById(id);
      if(el) el.textContent = val;
    }

    function addLogLine(text){
      const box = document.getElementById('log');
      if(!box) return;

      if(box.textContent === 'keine Einträge'){
        box.innerHTML = '';
      }

      const line = document.createElement('div');
      line.textContent = text;
      box.prepend(line);
    }

    function renderLog(log){
      const box = document.getElementById('log');
      if(!box) return;

      if(!log || !log.length){
        box.textContent = 'keine Einträge';
        return;
      }

      box.innerHTML = log.map(row => {
        const time = new Date(row.ts).toLocaleTimeString('de-DE');
        return `<div>${time} - ${String(row.type).toLowerCase()} OK</div>`;
      }).join('');
    }

    async function postJSON(url, body = {}){
      const res = await fetch(apiUrl(url), {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify(body)
      });

      let data = {};
      try {
        data = await res.json();
      } catch {
        data = {};
      }

      if(!res.ok){
        const err = new Error('POST failed');
        err.data = data;
        throw err;
      }

      return data;
    }

    async function getStatus(){
      const res = await fetch(apiUrl('/api/status'));
      return await res.json();
    }

    function confClass(v){
      const n = Number(v || 0);
      if(n >= 70) return 'ok';
      if(n >= 40) return 'mid';
      return 'bad';
    }

    function canTradeNow(data){
      if(!data) return false;
      if(data.guard !== 'READY') return false;
      if(data.processing) return false;
      if((data.queueLength || 0) > 0) return false;
      return true;
    }

    function lockActionButtons(locked){
      const ids = ['btnBuy','btnSell','btnWin','btnLoss','btnReset'];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.disabled = !!locked;
      });
    }

    function setCheckingState(){
      setText('healthStatus', 'CHECK');
      setText('healthBuy', 'CHECK');
      setText('healthSell', 'CHECK');

      document.getElementById('healthStatus')?.classList.remove('ok','mid','bad');
      document.getElementById('healthBuy')?.classList.remove('ok','mid','bad');
      document.getElementById('healthSell')?.classList.remove('ok','mid','bad');

      document.getElementById('healthStatus')?.classList.add('mid');
      document.getElementById('healthBuy')?.classList.add('mid');
      document.getElementById('healthSell')?.classList.add('mid');
    }

    function renderStatus(data){
      if(!data) return;

      state.pnl = Number(data.pnl || 0);
      state.autoTrades = Number(data.autoTrades || 0);
      state.confidence = Number(data.confidence || 62);
      state.side = data.side || 'NONE';
      state.autoEnabled = !!data.autoEnabled;

      const pnlEl = document.getElementById('pnl');
      if(pnlEl){
        pnlEl.innerHTML = `${Number(state.pnl).toFixed(2)}<small>Net PnL</small>`;
      }

      const guard = (data.guard || 'CHECK').toLowerCase();
      const guardEl = document.getElementById('guard');
      if(guardEl){
        guardEl.textContent = data.guard || 'CHECK';
        guardEl.className = `guard ${guard}`;
      }

      const hs = document.getElementById('healthStatus');
      const hb = document.getElementById('healthBuy');
      const hsell = document.getElementById('healthSell');
      const conf = document.getElementById('confBox');

      if(hs){
        hs.textContent = 'OK';
        hs.classList.remove('ok','mid','bad');
        hs.classList.add('ok');
      }

      if(hb){
        hb.textContent = 'OK';
        hb.classList.remove('ok','mid','bad');
        hb.classList.add('ok');
      }

      if(hsell){
        hsell.textContent = 'OK';
        hsell.classList.remove('ok','mid','bad');
        hsell.classList.add('ok');
      }

      if(conf){
        conf.textContent = `${Number(data.confidence || 62)}%`;
        conf.classList.remove('ok','mid','bad');
        conf.classList.add(confClass(data.confidence || 62));
      }

      lockActionButtons(!!data.processing);
      renderLog(data.log || []);
    }

    async function runHealthChecks(){
      setCheckingState();

      let statusOk = false;
      let buyOk = false;
      let sellOk = false;

      try {
        const data = await getStatus();
        renderStatus(data);
        statusOk = true;
      } catch(e){
        console.error(e);
      }

      try {
        await postJSON('/api/buy', { dryRun:true });
        buyOk = true;
      } catch(e){
        buyOk = false;
      }

      try {
        await postJSON('/api/sell', { dryRun:true });
        sellOk = true;
      } catch(e){
        sellOk = false;
      }

      const hs = document.getElementById('healthStatus');
      const hb = document.getElementById('healthBuy');
      const hsell = document.getElementById('healthSell');

      if(hs){
        hs.textContent = statusOk ? 'OK' : 'FAIL';
        hs.classList.remove('ok','mid','bad');
        hs.classList.add(statusOk ? 'ok' : 'bad');
      }

      if(hb){
        hb.textContent = buyOk ? 'OK' : 'FAIL';
        hb.classList.remove('ok','mid','bad');
        hb.classList.add(buyOk ? 'ok' : 'bad');
      }

      if(hsell){
        hsell.textContent = sellOk ? 'OK' : 'FAIL';
        hsell.classList.remove('ok','mid','bad');
        hsell.classList.add(sellOk ? 'ok' : 'bad');
      }
    }

    async function performAction(url) {
      try {
        if (url === '/api/reset') {
          setCheckingState();
        }

        const data = await postJSON(url, {});
        renderStatus(data.status || data);

        if (url === '/api/reset') {
          setTimeout(async () => {
            await runHealthChecks();
          }, 300);
        }

      } catch (e) {
        console.error(e);
      }
    }

    function toggleDock(){
      document.body.classList.toggle('dock-open');
    }

    async function toggleAutoMode(){
      try{
        const data = await postJSON('/api/auto/toggle', {});
        renderStatus(data.status || data);
        addLogLine(state.autoEnabled ? 'AUTO ON' : 'AUTO OFF');
      }catch(e){
        console.error(e);
      }
    }

    async function autoEngineTick(){
      try {
        const data = await getStatus();
        renderStatus(data);

        if (!state.autoEnabled) return;
        if (!canTradeNow(data)) return;

        const conf = Number(data.confidence || 0);
        const side = data.side || 'NONE';

        if (conf < 80) return;

        if (side === 'BUY') {
          await postJSON('/api/buy', {});
          addLogLine('AUTO ENTRY BUY');
        } else if (side === 'SELL') {
          await postJSON('/api/sell', {});
          addLogLine('AUTO ENTRY SELL');
        }
      } catch(e){
        console.error(e);
      }
    }

    async function boot() {
      await runHealthChecks();

      setInterval(async () => {
        try {
          const data = await getStatus();
          renderStatus(data);
        } catch (e) {
          console.error(e);
        }
      }, 2000);

      setInterval(async () => {
        await autoEngineTick();
      }, 2500);
    }

    boot();
  </script>
</body>
</html>
