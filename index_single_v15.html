<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V15 Single File</title>
  <style>
    :root{
      --bg:#07154d;
      --card:#2f3f80;
      --btn:#7f8cff;
      --btn2:#7d86c9;
      --green:#8fbc7d;
      --red:#c97d70;
      --gold:#caa557;
      --purple:#8f7ad3;
      --text:#f3f5ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:820px;margin:0 auto;padding:22px 18px 40px}
    h1{margin:10px 0 22px;text-align:center;font-size:52px;font-weight:800;letter-spacing:.5px}
    .card{background:var(--card);border-radius:28px;padding:28px;margin-bottom:18px}
    .status{text-align:center}
    .guard{font-size:72px;font-weight:900;line-height:1;margin-bottom:12px}
    .sub{font-size:28px;font-weight:700;opacity:.95;margin-bottom:8px}
    .pnl{font-size:64px;font-weight:900;margin:10px 0 10px}
    .meta,.reason{font-size:22px;line-height:1.35;opacity:.95}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    button{
      border:none;border-radius:22px;padding:26px 18px;font-size:28px;font-weight:800;color:#fff;
      background:var(--btn);cursor:pointer;min-height:108px;
    }
    button.alt{background:var(--btn2)}
    button.green{background:var(--green)}
    button.red{background:var(--red)}
    button.gold{background:var(--gold)}
    button.purple{background:var(--purple)}
    .log h2{margin:0 0 16px;text-align:center;font-size:34px}
    .entry{background:rgba(255,255,255,.09);padding:18px 20px;border-radius:20px;margin-bottom:14px;font-size:17px;line-height:1.35;word-break:break-word}
    .toast{
      position:fixed;left:50%;top:22px;transform:translateX(-50%);
      background:#6db35e;color:#fff;padding:18px 26px;border-radius:22px;
      font-size:20px;font-weight:800;z-index:9999;display:none;box-shadow:0 10px 30px rgba(0,0,0,.25)
    }
    @media (max-width: 700px){
      .wrap{padding:18px 14px 30px}
      h1{font-size:34px;text-align:left}
      .card{padding:20px;border-radius:24px}
      .guard{font-size:42px}
      .sub{font-size:18px}
      .pnl{font-size:34px}
      .meta,.reason{font-size:14px}
      .grid{gap:14px}
      button{font-size:24px;min-height:92px;padding:18px 12px}
      .log h2{font-size:26px}
      .entry{font-size:13px;padding:14px 16px}
      .toast{font-size:16px;max-width:85vw;text-align:center}
    }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="wrap">
    <h1>V15 SINGLE FILE</h1>

    <div class="card status">
      <div id="guard" class="guard">READY</div>
      <div id="sub" class="sub">SYSTEM READY</div>
      <div id="pnl" class="pnl">PnL: 0</div>
      <div id="meta" class="meta">Orders: 0/10 · Queue: 0 · Cooldown: 0s · HardBlock: AUS</div>
      <div id="reason" class="reason">System bereit</div>
    </div>

    <div class="grid">
      <button id="sendBtn">SEND ORDER</button>
      <button id="refreshBtn" class="alt">REFRESH</button>
      <button id="winBtn" class="green">+WIN</button>
      <button id="lossBtn" class="red">-LOSS</button>
      <button id="resetBtn" class="gold">RESET</button>
      <button id="reloadBtn" class="purple">RELOAD</button>
    </div>

    <div class="card log">
      <h2>Log</h2>
      <div id="logBox"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://quanttrade-backend-v13-3-fix-1.onrender.com';
    const ENDPOINTS = {
      status: `${API_BASE}/api/status`,
      send: `${API_BASE}/api/send`,
      win: `${API_BASE}/api/win`,
      loss: `${API_BASE}/api/loss`,
      reset: `${API_BASE}/api/reset`
    };

    const els = {
      guard: document.getElementById('guard'),
      sub: document.getElementById('sub'),
      pnl: document.getElementById('pnl'),
      meta: document.getElementById('meta'),
      reason: document.getElementById('reason'),
      logBox: document.getElementById('logBox'),
      toast: document.getElementById('toast')
    };

    function showToast(msg, ok=true){
      els.toast.textContent = msg;
      els.toast.style.background = ok ? '#6db35e' : '#cf6e63';
      els.toast.style.display = 'block';
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=> els.toast.style.display = 'none', 2000);
    }

    function guardColor(guard){
      const g = String(guard || '').toUpperCase();
      if (g.includes('BLOCK')) return '#f2a39a';
      if (g.includes('COOLDOWN')) return '#b3c8ff';
      if (g.includes('WARN')) return '#f0d16d';
      if (g.includes('LOCK')) return '#f2a39a';
      return '#9be06d';
    }

    function renderLog(log){
      if (!Array.isArray(log) || log.length === 0) {
        els.logBox.innerHTML = '<div class="entry">Noch keine Einträge</div>';
        return;
      }
      els.logBox.innerHTML = log.slice().reverse().slice(0,20).map(item => {
        if (typeof item === 'string') return `<div class="entry">${item}</div>`;
        const type = item.type || item.event || 'INFO';
        const msg = item.message || item.text || JSON.stringify(item);
        const time = item.time || item.ts || item.timestamp || '';
        return `<div class="entry"><strong>${type}</strong> · ${msg}${time ? `<br>${time}`:''}</div>`;
      }).join('');
    }

    function renderStatus(data){
      const guard = data.guard || 'READY';
      const pnl = Number(data.pnl ?? 0);
      const reason = data.reasonLabel || data.reason || 'System bereit';
      const orders = data.ordersToday ?? 0;
      const maxOrders = data.maxOrdersPerSession ?? 10;
      const queue = data.queueLength ?? 0;
      const cooldown = data.cooldownLeft ?? 0;
      const hardBlocked = data.hardBlocked ? 'AN' : 'AUS';

      els.guard.textContent = String(guard).toUpperCase();
      els.guard.style.color = guardColor(guard);
      els.sub.textContent = String(reason).replaceAll('_',' ');
      els.pnl.textContent = `PnL: ${pnl}`;
      els.meta.textContent = `Orders: ${orders}/${maxOrders} · Queue: ${queue} · Cooldown: ${cooldown}s · HardBlock: ${hardBlocked}`;
      els.reason.textContent = data.processing ? 'Order wird verarbeitet' : 'System bereit';
      renderLog(data.log || []);
    }

    async function loadStatus(silent=false){
      try {
        const res = await fetch(ENDPOINTS.status, { cache: 'no-store' });
        const data = await res.json();
        renderStatus(data);
        if (!silent) showToast('Status geladen');
      } catch (e) {
        showToast('Status Fehler', false);
      }
    }

    async function postAction(url, okMsg, failMsg){
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        let data = null;
        const txt = await res.text();
        try { data = txt ? JSON.parse(txt) : null; } catch {}
        if (!res.ok) throw new Error(txt || res.statusText);
        showToast(okMsg);
        if (data && typeof data === 'object') renderStatus(data);
        else await loadStatus(true);
      } catch (e) {
        showToast(failMsg, false);
      }
    }

    document.getElementById('sendBtn').onclick = () => postAction(ENDPOINTS.send, 'Order gesendet', 'Send Fehler');
    document.getElementById('winBtn').onclick = () => postAction(ENDPOINTS.win, 'Win gebucht', 'Win Fehler');
    document.getElementById('lossBtn').onclick = () => postAction(ENDPOINTS.loss, 'Loss gebucht', 'Loss Fehler');
    document.getElementById('resetBtn').onclick = () => postAction(ENDPOINTS.reset, 'Reset fertig', 'Reset Fehler');
    document.getElementById('refreshBtn').onclick = () => loadStatus();
    document.getElementById('reloadBtn').onclick = () => location.reload();

    loadStatus(true);
    setInterval(() => loadStatus(true), 4000);
  </script>
</body>
</html>
